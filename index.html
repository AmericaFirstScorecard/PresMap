  <style>
    html, body { height: 100%; margin: 0; padding: 0; font-family: 'Inter', Arial, sans-serif; background: #11161b;}
    #header {
      background: #222; color: white; padding: 15px 20px;
      z-index: 1000; display: flex; flex-direction: column; align-items: center;
      position: relative;
    }
    .progress-container { width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 10px; }
    .progress-bar-wrapper {
      display: flex; align-items: center; position: relative;
      width: 100%; height: 20px; background: #444; border-radius: 10px; overflow: hidden;
    }
    .progress-bar { height: 100%; transition: width 0.5s ease-in-out; }
    .progress-bar.bush { background: #e74c3c; }
    .progress-bar.gore { background: #3498db; position: absolute; right: 0; }
    .vote-label {
      position: absolute; color: white; font-size: 12px;
      font-weight: bold; text-shadow: 0 0 2px rgba(0,0,0,0.7);
    }
    .threshold-marker {
      position: absolute; left: calc(270 / 538 * 100%);
      width: 2px; height: 100%; background: #fff; z-index: 10;
    }
    .threshold-label {
      position: relative; left: calc(270 / 538 * 100% - 20px);

    .candidate-row {

    .candidate-image-small {

    .reporting-bar {

    }
    .reporting-fill {
      height: 100%; background: #4CAF50; transition: width 0.5s ease-in-out;

    #projection-ticker-wrap {

    .needle-svg-wrap {

    .needle-checkmark {
      position: absolute;

    .needle-checkmark.gore { left: auto; right: 36px; }
    .arc-label {
      font-size: 15px;

    .arc-label-center {

    .needle-arrow { fill: #fff; stroke: #222; stroke-width: 2.2; filter: drop-shadow(0 2px 6px #0008);}
    .needle-dot { fill: #191d22; stroke: #fff; stroke-width: 3.5; filter: drop-shadow(0 1px 8px #000a);}
    .arc-very-likely-bush { stroke: #e74c3c; }
    .arc-likely-bush { stroke: #f7a49a; }
    .arc-lean-bush { stroke: #ffe5d2; }
    .arc-tossup { stroke: #cccccc; }
    .arc-lean-gore { stroke: #b8d8f8; }
    .arc-likely-gore { stroke: #74b0e7; }
    .arc-very-likely-gore { stroke: #3498db; }
    .needle-candidate-labels {
      width: 100%; display: flex; justify-content: center;
      margin-top: 16px;
      font-size: 2.0rem;
      font-weight: 800;
      text-shadow: 0 2px 10px #000d;
      gap: 40px;
    }
    .needle-bush-label { color: #e74c3c; }
    .needle-gore-label { color: #3498db; }
    .nyt-prob-row {
      margin-top: 24px; text-align: center;
      font-size: 1.65rem; font-weight: 900; letter-spacing: 0.3px;
      text-shadow: 0 1px 4px #000b;

    .proj-big-num { font-size: 2.1rem; font-weight: 900; margin: 0 8px;}
    .proj-big-num.bush { color: #e74c3c;}
    .proj-big-num.gore { color: #3498db;}
    .proj-divider { font-size: 1.6rem; font-weight: 800; color: #fff; margin: 0 8px;}
    @media (max-width:700px){
      .needle-svg-wrap { width: 99vw;}
      .needle-img-candidate { width: 44px; height: 44px; top: 125px;}
      .needle-checkmark { width: 22px; height: 22px; top: 148px; left: 19px;}
      .needle-checkmark.gore { right: 19px;}
      .arc-label { font-size: 11px;}
      .arc-label-center { font-size: 13px;}
    }
    #box-out-btn {
      display: none;

      top: 20px;
      right: 32px;
      z-index: 1100;

      color: #fff;
      padding: 10px 22px;
      border: none;
      border-radius: 10px;

      cursor: pointer;
      transition: background: 0.2s;
    }
    #box-out-btn:hover {
      background: #303540;
    }
  </style>
</head>
<body>

<script>
// ========== USER CONFIG ==============
mapboxgl.accessToken = 'pk.eyJ1IjoiNW00Y2s3NyIsImEiOiJjbWI4eXFqeDkwbzY1MmpwcDFzZDIwMmVqIn0.6JGe7JWhk28z5D3TLIJQwg';
const STATE_CSV_URL = 'https://docs.google.com/spreadsheets/d/10zbHap425MtnS4jgsELt__DhtEQbXI8GlnD-6vkB4yg/export?format=csv';
const COUNTY_CSV_URL = 'https://docs.google.com/spreadsheets/d/1edopYcOoeeom30K3WsCmzVwvJ8rHcdYH7xB7B7QCQBI/export?format=csv';
// ========== END USER CONFIG ===========

let countiesGeoJSON = null;
let countyElectionStats = {};
let statesGeoJSON = null;
let stateStats = {};
let mainMap = null;
let statePopup = null;
let countyPopup = null;
let stateHoverHandlers = { mousemove: null, mouseleave: null };
let countyHoverHandlers = { mousemove: null, mouseleave: null };
let currentState = null;

const stateNameToFips = {
  "alabama": "01", "alaska": "02", "arizona": "04", "arkansas": "05", "california": "06",
  "colorado": "08", "connecticut": "09", "delaware": "10", "florida": "12", "georgia": "13",
  "hawaii": "15", "idaho": "16", "illinois": "17", "indiana": "18", "iowa": "19",
  "kansas": "20", "kentucky": "21", "louisiana": "22", "maine": "23", "maryland": "24",
  "massachusetts": "25", "michigan": "26", "minnesota": "27", "mississippi": "28", "missouri": "29",
  "montana": "30", "nebraska": "31", "nevada": "32", "new hampshire": "33", "new jersey": "34",
  "new mexico": "35", "new york": "36", "north carolina": "37", "north dakota": "38", "ohio": "39",
  "oklahoma": "40", "oregon": "41", "pennsylvania": "42", "rhode island": "44", "south carolina": "45",
  "south dakota": "46", "tennessee": "47", "texas": "48", "utah": "49", "vermont": "50",
  "virginia": "51", "washington": "53", "west virginia": "54", "wisconsin": "55", "wyoming": "56",
  "district of columbia": "11", "puerto rico": "72"
};
const stateFipsMap = { ...stateNameToFips };

// Helper function for exact column key matching
function getColumnKey(row, key) {
  const lowerKey = key.toLowerCase().trim();
  return Object.keys(row).find(k => k.toLowerCase().trim() === lowerKey) || key;
}

// ----------- COUNTY CSV PARSER ---------------
function populateCountyStatsFromCSV(rows) {
  console.log('County CSV rows received:', rows);
  const newCountyStats = {};
  for (const row of rows) {
    const stateKey = getColumnKey(row, 'state');
    const fipsKey = getColumnKey(row, 'county_fips');
    const partyKey = getColumnKey(row, 'party');
    const votesKey = getColumnKey(row, 'candidatevotes');
    const totalVotesKey = getColumnKey(row, 'totalvotes');

    let fips = (row[fipsKey] || '').toString().padStart(5, "0");
    if (!/^\d{5}$/.test(fips)) continue;

    let party = (row[partyKey] || "").trim().toUpperCase();
    let votes = parseInt(row[votesKey] || "0", 10);
    let totalVotes = parseInt(row[totalVotesKey] || "0", 10);
    let stateName = (row[stateKey] || '').trim().toLowerCase();

    if (!newCountyStats[fips]) {
      newCountyStats[fips] = {
        state: stateName,
        bush_votes: 0,
        gore_votes: 0,
        other_votes: 0,
        totalvotes: totalVotes,
        winner: ""
      };
    }
    if (party === "REPUBLICAN") {
      newCountyStats[fips].bush_votes += votes;
    } else if (party === "DEMOCRAT") {
      newCountyStats[fips].gore_votes += votes;
    } else {
      newCountyStats[fips].other_votes += votes;
    }
  }
  for (const fips in newCountyStats) {
    const stats = newCountyStats[fips];
    stats.totalvotes = stats.bush_votes + stats.gore_votes + stats.other_votes; // Recalculate total
    if (stats.bush_votes > stats.gore_votes) stats.winner = "Bush";
    else if (stats.gore_votes > stats.bush_votes) stats.winner = "Gore";
    else stats.winner = "Tied";
  }
  console.log('Parsed countyElectionStats:', newCountyStats);
  countyElectionStats = newCountyStats;
}

// ----------- STATE CSV PARSER ---------------
function populateStateStatsFromCSV(rows) {
  console.log('State CSV rows received:', rows);
  const newStateStats = {};
  for (const row of rows) {
    const stateKey = getColumnKey(row, 'State');
    let stateName = (row[stateKey] || '').trim().toLowerCase();
    if (!stateName) continue;

    const statusKey = getColumnKey(row, 'Election status');
    const winnerKey = getColumnKey(row, 'Winner');
    const evKey = getColumnKey(row, 'Electoral Votes');
    const reportingKey = getColumnKey(row, 'Reporting %');

    newStateStats[stateName] = {
      state: row[stateKey],
      electoral_votes: parseInt(row[evKey] || "0", 10),
      winner: (row[winnerKey] || '').trim(),
      status: (row[statusKey] || 'Uncalled').trim(),
      reporting: parseFloat(row[reportingKey] || "0")
    };
  }
  console.log('Parsed stateStats:', newStateStats);
  stateStats = newStateStats;
}

// Populate state FIPS map from GeoJSON
function populateStateFipsMapFromGeoJSON(statesGeoJSON) {
  if (statesGeoJSON?.features?.length > 0) {
    statesGeoJSON.features.forEach(f => {
      const prop = f.properties || {};
      const nameKey = Object.keys(prop).find(k => k.toLowerCase().includes('name')) || 'name';
      const fipsKey = Object.keys(prop).find(k => k.toLowerCase().includes('statefp') || k.toLowerCase().includes('fips')) || 'STATEFP';
      const name = (prop[nameKey] || '').trim().toLowerCase();
      const fips = (prop[fipsKey] || '').toString().padStart(2, '0');
      if (name && fips && fips !== '00') stateFipsMap[name] = fips;
    });
  }
}

// Update GeoJSON and Map with election data
function updateGeoJSONAndMap() {
  if (!statesGeoJSON || !countiesGeoJSON) {
    console.warn('GeoJSON data not loaded yet');
    return;
  }

  // Aggregate county votes to state totals
  const stateVoteTotals = {};
  for (const fips in countyElectionStats) {
    const stats = countyElectionStats[fips];
    const stateName = stats.state.toLowerCase();
    if (!stateVoteTotals[stateName]) {
      stateVoteTotals[stateName] = { bush_votes: 0, gore_votes: 0, other_votes: 0, total_votes: 0 };
    }
    stateVoteTotals[stateName].bush_votes += stats.bush_votes || 0;
    stateVoteTotals[stateName].gore_votes += stats.gore_votes || 0;
    stateVoteTotals[stateName].other_votes += stats.other_votes || 0;
    stateVoteTotals[stateName].total_votes += stats.totalvotes || 0;
  }
  console.log('Aggregated stateVoteTotals:', stateVoteTotals);

  // Update state GeoJSON properties
  statesGeoJSON.features.forEach(f => {
    const nameKey = Object.keys(f.properties).find(key => key.toLowerCase().includes('name')) || 'name';
    const geoName = (f.properties[nameKey] || '').trim().toLowerCase();
    const stateData = stateStats[geoName];
    const voteTotals = stateVoteTotals[geoName] || { bush_votes: 0, gore_votes: 0, other_votes: 0, total_votes: 0 };

    let status = 'Uncalled';
    let winner = 'Tied';
    if (voteTotals.bush_votes > voteTotals.gore_votes) {
      winner = 'Bush';
      if (stateData && stateData.status === 'Called') status = 'GOP Win';
    } else if (voteTotals.gore_votes > voteTotals.bush_votes) {
      winner = 'Gore';
      if (stateData && stateData.status === 'Called') status = 'DEM Win';
    }

    f.properties = {
      ...f.properties,
      state: stateData ? stateData.state : geoName,
      electoral_votes: stateData ? stateData.electoral_votes : 0,
      votes_gop: voteTotals.bush_votes,
      votes_dem: voteTotals.gore_votes,
      votes_other: voteTotals.other_votes,
      total_votes: voteTotals.total_votes,
      winner: winner,
      status: status,
      reporting: stateData ? stateData.reporting : 0
    };
  });

  // Update county GeoJSON properties
  countiesGeoJSON.features.forEach(f => {
    const fips = f.properties.GEOID;
    const stats = countyElectionStats[fips];
    if (stats) {
      f.properties.bush_votes = stats.bush_votes;
      f.properties.gore_votes = stats.gore_votes;
      f.properties.other_votes = stats.other_votes;
      f.properties.total_votes = stats.totalvotes;
      f.properties.winner = stats.winner;
    } else {
      f.properties.bush_votes = 0;
      f.properties.gore_votes = 0;
      f.properties.other_votes = 0;
      f.properties.total_votes = 0;
      f.properties.winner = 'Tied';
    }
  });

  if (mainMap && mainMap.getSource('states')) {
    mainMap.getSource('states').setData(statesGeoJSON);
    if (currentState) {
      addCountiesLayer(currentState);
    }
    mainMap.triggerRepaint();
  }
  updateUIElements();
}

// Update UI elements (header, progress bars, etc.)
function updateUIElements() {
  let ev_bush = 0, ev_gore = 0;
  let national_bush_votes = 0, national_gore_votes = 0, national_total_votes = 0;
  let totalReporting = 0, numStates = 0;

  statesGeoJSON.features.forEach(f => {
    const ev = f.properties.electoral_votes || 0;
    const winner = f.properties.winner;
    if (winner === 'Bush' && f.properties.status === 'GOP Win') ev_bush += ev;
    else if (winner === 'Gore' && f.properties.status === 'DEM Win') ev_gore += ev;

    national_bush_votes += f.properties.votes_gop || 0;
    national_gore_votes += f.properties.votes_dem || 0;
    national_total_votes += f.properties.total_votes || 0;

    if (f.properties.reporting) {
      totalReporting += f.properties.reporting;
      numStates++;
    }
  });

  // Electoral votes
  document.getElementById('bush-votes').textContent = ev_bush;
  document.getElementById('gore-votes').textContent = ev_gore;
  const totalEV = ev_bush + ev_gore || 538; // Default to 538 if no votes yet
  const bushEVPerc = (ev_bush / totalEV * 100).toFixed(1);
  const goreEVPerc = (ev_gore / totalEV * 100).toFixed(1);
  document.getElementById('bush-bar').style.width = `${bushEVPerc}%`;
  document.getElementById('gore-bar').style.width = `${goreEVPerc}%`;
  document.getElementById('bush-label').textContent = `${bushEVPerc}%`;
  document.getElementById('gore-label').textContent = `${goreEVPerc}%`;

  // Popular votes
  document.getElementById('bush-pop').textContent = national_bush_votes.toLocaleString();
  document.getElementById('gore-pop').textContent = national_gore_votes.toLocaleString();

  // Reporting percentage
  const avgReporting = numStates > 0 ? (totalReporting / numStates).toFixed(1) : 0;
  document.getElementById('reporting').textContent = `Reporting: ${avgReporting}%`;

  // Projection needle
  const bushProj = ev_bush / 270;
  const goreProj = ev_gore / 270;
  let projBush = 0.5, projGore = 0.5;
  if (ev_bush >= 270) { projBush = 1; projGore = 0; }
  else if (ev_gore >= 270) { projBush = 0; projGore = 1; }
  else if (bushProj + goreProj > 0) {
    projBush = bushProj / (bushProj + goreProj);
    projGore = goreProj / (bushProj + goreProj);
  }
  const angle = -90 + 180 * projGore;
  document.getElementById('needle-group').setAttribute('transform', `rotate(${angle},250,154)`);
  document.getElementById('nyt-proj-bush-big').textContent = `${Math.round(projBush * 100)}%`;
  document.getElementById('nyt-proj-gore-big').textContent = `${Math.round(projGore * 100)}%`;
  document.getElementById('needle-check-bush').style.display = projBush === 1 ? 'block' : 'none';
  document.getElementById('needle-check-gore').style.display = projGore === 1 ? 'block' : 'none';
}

// Fetch and parse election data
function refreshElectionData() {
  Promise.all([
    new Promise((resolve, reject) => {
      Papa.parse(STATE_CSV_URL, {
        download: true,
        header: true,
        skipEmptyLines: true,
        transformHeader: header => header.trim(),
        complete: (results) => {
          console.log('State CSV headers:', results.meta.fields);
          populateStateStatsFromCSV(results.data);
          resolve();
        },
        error: (err) => reject(err)
      });
    }),
    new Promise((resolve, reject) => {
      Papa.parse(COUNTY_CSV_URL, {
        download: true,
        header: true,
        skipEmptyLines: true,
        transformHeader: header => header.trim(),
        complete: (results) => {
          console.log('County CSV headers:', results.meta.fields);
          populateCountyStatsFromCSV(results.data);
          resolve();
        },
        error: (err) => reject(err)
      });
    })
  ]).then(() => {
    updateGeoJSONAndMap();
    console.log('Election data refreshed successfully');
  }).catch(err => {
    console.error('Error refreshing election data:', err);
  });
}

// Initial data load
Promise.all([
  fetch('data/county-geo.json').then(r => r.json()).then(data => { countiesGeoJSON = data; }),
  fetch('data/us-states.geo.json').then(r => r.json()).then(data => { statesGeoJSON = data; populateStateFipsMapFromGeoJSON(statesGeoJSON); })
]).then(() => {

  initializeMainMap();

}).catch(err => console.error('Initial data load failed:', err));

// Arc segments for projection needle
const arcSegs = [
  { label: "Very likely Bush", start: -90, end: -60 },
  { label: "Likely Bush", start: -60, end: -30 },
  { label: "Lean Bush", start: -30, end: -10 },
  { label: "Tossup", start: -10, end: 10 },
  { label: "Lean Gore", start: 10, end: 30 },
  { label: "Likely Gore", start: 30, end: 60 },
  { label: "Very likely Gore", start: 60, end: 90 }
];
const svgCx = 250, svgCy = 154, arcR = 110;
function arcPath(cx, cy, r, startAngle, endAngle) {
  const start = polar(cx, cy, r, startAngle);
  const end = polar(cx, cy, r, endAngle);
  const arcSweep = endAngle - startAngle <= 180 ? "0" : "1";
  return `M ${start.x} ${start.y} A ${r} ${r} 0 ${arcSweep} 1 ${end.x} ${end.y}`;
}
function polar(cx, cy, r, angleDeg) {
  const angle = (angleDeg - 90) * Math.PI / 180;
  return { x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) };
}
function setArcSegs() {
  document.getElementById('arc-vl-bush').setAttribute('d', arcPath(svgCx, svgCy, arcR, -90, -60));
  document.getElementById('arc-l-bush').setAttribute('d', arcPath(svgCx, svgCy, arcR, -60, -30));
  document.getElementById('arc-le-bush').setAttribute('d', arcPath(svgCx, svgCy, arcR, -30, -10));
  document.getElementById('arc-tossup').setAttribute('d', arcPath(svgCx, svgCy, arcR, -10, 10));
  document.getElementById('arc-le-gore').setAttribute('d', arcPath(svgCx, svgCy, arcR, 10, 30));
  document.getElementById('arc-l-gore').setAttribute('d', arcPath(svgCx, svgCy, arcR, 30, 60));
  document.getElementById('arc-vl-gore').setAttribute('d', arcPath(svgCx, svgCy, arcR, 60, 90));
}
setArcSegs();

// Helper functions
function getStateFP(stateName) {
  return stateName ? stateFipsMap[stateName.trim().toLowerCase()] || null : null;
}

// State hover popup
function enableStateHover() {
  if (!mainMap || !mainMap.getLayer('states-fill')) {
    console.warn('Map or states-fill layer not ready for state hover');
    return;
  }
  if (stateHoverHandlers.mousemove) {
    console.log('State hover handlers already enabled');
    return;
  }

  stateHoverHandlers.mousemove = (e) => {
    if (statePopup) {
      statePopup.remove();
      statePopup = null;
    }
    if (!e.features || !e.features[0]) return;
    const p = e.features[0].properties;
    const nameKey = Object.keys(p).find(key => key.toLowerCase().includes('name')) || 'name';
    const total = p.votes_gop + p.votes_dem + p.votes_other;
    const gopPerc = total > 0 ? ((p.votes_gop / total) * 100).toFixed(1) : 0;
    const demPerc = total > 0 ? ((p.votes_dem / total) * 100).toFixed(1) : 0;
    console.log(`Showing state popup for: ${p[nameKey]}`);
    statePopup = new mapboxgl.Popup({ closeButton: false })
      .setLngLat(e.lngLat)
      .setHTML(`
        <strong>${p[nameKey]}</strong><br/>
        Electoral Votes: ${p.electoral_votes}<br/>
        Bush: ${p.votes_gop.toLocaleString()} (${gopPerc}%)<br/>
        Gore: ${p.votes_dem.toLocaleString()} (${demPerc}%)<br/>
        Status: ${p.status}
      `)
      .addTo(mainMap);
  };

  stateHoverHandlers.mouseleave = () => {
    if (statePopup) {
      console.log('Removing state popup');
      statePopup.remove();
      statePopup = null;
    }
  };

  mainMap.on('mousemove', 'states-fill', stateHoverHandlers.mousemove);
  mainMap.on('mouseleave', 'states-fill', stateHoverHandlers.mouseleave);
  console.log('State hover enabled');
}

function disableStateHover() {
  if (stateHoverHandlers.mousemove) {
    mainMap.off('mousemove', 'states-fill', stateHoverHandlers.mousemove);
    console.log('Removed state mousemove handler');
  }
  if (stateHoverHandlers.mouseleave) {
    mainMap.off('mouseleave', 'states-fill', stateHoverHandlers.mouseleave);
    console.log('Removed state mouseleave handler');
  }
  stateHoverHandlers.mousemove = null;
  stateHoverHandlers.mouseleave = null;
  if (statePopup) {
    console.log('Removing state popup on disable');
    statePopup.remove();
    statePopup = null;
  }
  console.log('State hover disabled');
}

// Map initialization
function initializeMainMap() {
  mainMap = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/light-v10',
    center: [-98.5795, 39.8283],
    zoom: 3
  });

  mainMap.on('load', () => {
    mainMap.addSource('states', { type: 'geojson', data: statesGeoJSON });
    mainMap.addLayer({
      id: 'states-fill',
      type: 'fill',
      source: 'states',
      paint: {
        'fill-color': [
          'match', ['get', 'status'],
          'GOP Win', '#e74c3c',
          'DEM Win', '#3498db',
          'Uncalled', [
            'case',
            ['>', ['get', 'votes_gop'], ['get', 'votes_dem']], '#f4a6a6',
            ['>', ['get', 'votes_dem'], ['get', 'votes_gop']], '#a6c8f4',
            '#cccccc'
          ],
          '#ffffff'
        ],
        'fill-opacity': 0.9
      }
    });
    mainMap.addLayer({
      id: 'states-outline',
      type: 'line',
      source: 'states',
      paint: { 'line-color': '#000000', 'line-width': 1 }
    });

    enableStateHover();

    mainMap.on('click', 'states-fill', (e) => {
      const p = e.features[0].properties;
      const nameKey = Object.keys(p).find(key => key.toLowerCase().includes('name')) || 'name';
      const stateName = p[nameKey];
      if (!stateName) return;
      currentState = stateName;
      addCountiesLayer(stateName);
      const bounds = getStateBounds(stateName);
      if (bounds) mainMap.fitBounds(bounds, { padding: 40, duration: 1100 });
      document.getElementById('header').style.display = 'none';
      document.getElementById('box-out-btn').style.display = 'block';
      document.getElementById('projection-ticker-wrap').style.display = 'none';
      disableStateHover();
    });
  });
}

// Add counties layer for a specific state
function addCountiesLayer(stateName) {
  const stateFP = getStateFP(stateName);
  if (!stateFP) {
    console.warn(`No FIPS code found for state: ${stateName}`);
    return;
  }

  const filtered = {
    type: 'FeatureCollection',
    features: countiesGeoJSON.features.filter(f => f.properties.STATEFP === stateFP)
  };

  if (mainMap.getSource('counties')) mainMap.removeSource('counties');
  mainMap.addSource('counties', { type: 'geojson', data: filtered });

  if (mainMap.getLayer('counties-fill')) mainMap.removeLayer('counties-fill');
  if (mainMap.getLayer('counties-outline')) mainMap.removeLayer('counties-outline');

  mainMap.addLayer({
    id: 'counties-fill',
    type: 'fill',
    source: 'counties',
    paint: {
      'fill-color': [
        'match', ['get', 'winner'],
        'Bush', '#e74c3c',
        'Gore', '#3498db',
        '#cccccc'
      ],
      'fill-opacity': 0.85
    }
  });
  mainMap.addLayer({
    id: 'counties-outline',
    type: 'line',
    source: 'counties',
    paint: { 'line-color': '#ffffff', 'line-width': 0.5 }
  });

  // Remove any existing county hover handlers
  if (countyHoverHandlers.mousemove) {
    mainMap.off('mousemove', 'counties-fill', countyHoverHandlers.mousemove);
    console.log('Removed previous county mousemove handler');
  }
  if (countyHoverHandlers.mouseleave) {
    mainMap.off('mouseleave', 'counties-fill', countyHoverHandlers.mouseleave);
    console.log('Removed previous county mouseleave handler');
  }

  // County hover popup
  countyHoverHandlers.mousemove = (e) => {
    if (countyPopup) {
      countyPopup.remove();
      countyPopup = null;
    }
    if (!e.features || !e.features[0]) return;
    const f = e.features[0];
    const stats = countyElectionStats[f.properties.GEOID] || {
      bush_votes: 0, gore_votes: 0, other_votes: 0, totalvotes: 0, winner: 'Tied'
    };
    const total = stats.bush_votes + stats.gore_votes + stats.other_votes;
    const bushPerc = total > 0 ? ((stats.bush_votes / total) * 100).toFixed(1) : 0;
    const gorePerc = total > 0 ? ((stats.gore_votes / total) * 100).toFixed(1) : 0;
    console.log(`Showing county popup for: ${f.properties.NAME}`);
    countyPopup = new mapboxgl.Popup({ closeButton: false })
      .setLngLat(e.lngLat)
      .setHTML(`
        <strong>${f.properties.NAME} County</strong><br/>
        Bush: ${stats.bush_votes.toLocaleString()} (${bushPerc}%)<br/>
        Gore: ${stats.gore_votes.toLocaleString()} (${gorePerc}%)<br/>
        Winner: ${stats.winner}
      `)
      .addTo(mainMap);
  };

  countyHoverHandlers.mouseleave = () => {
    if (countyPopup) {
      console.log('Removing county popup');
      countyPopup.remove();
      countyPopup = null;
    }
  };

  mainMap.on('mousemove', 'counties-fill', countyHoverHandlers.mousemove);
  mainMap.on('mouseleave', 'counties-fill', countyHoverHandlers.mouseleave);
  console.log('County hover enabled');

  // Update sidebar
  const stateFeature = statesGeoJSON.features.find(f => {
    const nameKey = Object.keys(f.properties).find(key => key.toLowerCase().includes('name')) || 'name';
    return f.properties[nameKey].toLowerCase() === stateName.toLowerCase();
  });
  if (stateFeature) {
    const p = stateFeature.properties;
    document.getElementById('state-sidebar-title').textContent = `President: ${p.state}`;
    document.getElementById('state-electoral-votes').textContent = `${p.electoral_votes} electoral votes`;
    const total = p.votes_gop + p.votes_dem + p.votes_other;
    const bushPerc = total > 0 ? ((p.votes_gop / total) * 100).toFixed(1) : 0;
    const gorePerc = total > 0 ? ((p.votes_dem / total) * 100).toFixed(1) : 0;
    const otherPerc = total > 0 ? ((p.votes_other / total) * 100).toFixed(1) : 0;
    document.getElementById('candidate-stats').innerHTML = `
      <div class="candidate-row">
        <img src="images/George-W-Bush.jpg" alt="Bush" class="candidate-image-small">
        <div class="bar-graph"><div class="bar-fill bush" style="width: ${bushPerc}%"></div></div>
        <div class="candidate-details">Bush: ${p.votes_gop.toLocaleString()} (${bushPerc}%)</div>
      </div>
      <div class="candidate-row">
        <img src="images/Al_Gore.jpg" alt="Gore" class="candidate-image-small">
        <div class="bar-graph"><div class="bar-fill gore" style="width: ${gorePerc}%"></div></div>
        <div class="candidate-details">Gore: ${p.votes_dem.toLocaleString()} (${gorePerc}%)</div>
      </div>
      <div class="candidate-row">
        <img src="https://via.placeholder.com/40?text=?" alt="Other" class="candidate-image-small">
        <div class="bar-graph"><div class="bar-fill other" style="width: ${otherPerc}%"></div></div>
        <div class="candidate-details">Other: ${p.votes_other.toLocaleString()} (${otherPerc}%)</div>
      </div>
    `;
    document.getElementById('reporting-fill').style.width = `${p.reporting}%`;
    document.getElementById('reporting-status').textContent = `Reporting: ${p.reporting}%`;
    document.getElementById('last-updated').textContent = `Updated: ${new Date().toLocaleTimeString()}`;
    document.getElementById('state-sidebar').style.display = 'block';
  }
}

function getStateBounds(stateName) {
  const stateFP = getStateFP(stateName);
  if (!stateFP) return null;
  const stateFeature = statesGeoJSON.features.find(f => {
    const nameKey = Object.keys(f.properties).find(key => key.toLowerCase().includes('name')) || 'name';
    return f.properties[nameKey].toLowerCase() === stateName.toLowerCase();
  });
  if (!stateFeature) return null;

  const coords = stateFeature.geometry.type === 'Polygon' ? stateFeature.geometry.coordinates[0] : stateFeature.geometry.coordinates.flat(2);
  let minLng = 180, minLat = 90, maxLng = -180, maxLat = -90;
  coords.forEach(coord => {
    minLng = Math.min(minLng, coord[0]);
    maxLng = Math.max(maxLng, coord[0]);
    minLat = Math.min(minLat, coord[1]);
    maxLat = Math.max(maxLat, coord[1]);
  });
  return [[minLng, minLat], [maxLng, maxLat]];
}

// Exit state view
function exitStateView() {
  if (mainMap.getLayer('counties-fill')) mainMap.removeLayer('counties-fill');
  if (mainMap.getLayer('counties-outline')) mainMap.removeLayer('counties-outline');
  if (mainMap.getSource('counties')) mainMap.removeSource('counties');

  // Remove county hover handlers
  if (countyHoverHandlers.mousemove) {
    mainMap.off('mousemove', 'counties-fill', countyHoverHandlers.mousemove);
    console.log('Removed county mousemove handler');
  }
  if (countyHoverHandlers.mouseleave) {
    mainMap.off('mouseleave', 'counties-fill', countyHoverHandlers.mouseleave);
    console.log('Removed county mouseleave handler');
  }
  countyHoverHandlers.mousemove = null;
  countyHoverHandlers.mouseleave = null;
  if (countyPopup) {
    console.log('Removing county popup');
    countyPopup.remove();
    countyPopup = null;
  }

  document.getElementById('state-sidebar').style.display = 'none';
  document.getElementById('header').style.display = 'flex';
  document.getElementById('box-out-btn').style.display = 'none';
  document.getElementById('projection-ticker-wrap').style.display = 'flex';
  mainMap.flyTo({ center: [-98.5795, 39.8283], zoom: 3 });
  disableStateHover(); // Ensure state hover is disabled before re-enabling
  enableStateHover();
  currentState = null;
}

document.getElementById('box-out-btn').onclick = exitStateView;
document.getElementById('close-sidebar-btn').onclick = exitStateView;
