<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>2000 Live Election Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://api.mapbox.com/mapbox-gl-js/v2.13.0/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.13.0/mapbox-gl.css" rel="stylesheet" />
  <style>
    html, body { height: 100%; margin: 0; padding: 0; font-family: sans-serif; }
    #header {
      background: #222; color: white; padding: 15px 20px;
      z-index: 1000; display: flex; flex-direction: column; align-items: center;
      position: relative;
    }
    .progress-container { width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 10px; }
    .progress-bar-wrapper {
      display: flex; align-items: center; position: relative;
      width: 100%; height: 20px; background: #444; border-radius: 10px; overflow: hidden;
    }
    .progress-bar { height: 100%; transition: width 0.5s ease-in-out; }
    .progress-bar.bush { background: #e74c3c; }
    .progress-bar.gore { background: #3498db; position: absolute; right: 0; }
    .vote-label {
      position: absolute; color: white; font-size: 12px;
      font-weight: bold; text-shadow: 0 0 2px rgba(0,0,0,0.7);
    }
    .threshold-marker {
      position: absolute; left: calc(270 / 538 * 100%);
      width: 2px; height: 100%; background: #fff; z-index: 10;
    }
    .threshold-label {
      position: relative; left: calc(270 / 538 * 100% - 20px);
      color: white; font-size: 12px; font-weight: bold;
      margin-bottom: 5px; text-align: left;
    }
    .candidate-labels {
      display: flex; justify-content: space-between;
      font-size: 14px; font-weight: bold; margin-bottom: 5px;
    }
    .stat-box { margin-top: 5px; font-size: 12px; }
    .candidate-image {
      width: 70px; height: 70px; border-radius: 50%; object-fit: cover;
    }
    .progress-bar-container {
      display: flex; align-items: center; width: 100%; gap: 15px;
    }
    .candidate-stats {
      display: flex; justify-content: space-between;
      width: 100%; max-width: 800px; font-size: 12px;
    }
    .candidate-stat-left, .candidate-stat-right {
      text-align: center; width: 150px;
    }
    .title {
      font-size: 30px; font-weight: bold; margin-bottom: 10px;
    }

    /* Map below header, fills viewport */
    #map {
      position: relative;
      width: 100vw;
      height: 70vh;
      min-height: 400px;
      max-height: 80vh;
      z-index: 1;
    }
    @media (max-width:700px) {
      #map { min-height: 300px; }
    }

    /* NYT-style needle ticker BELOW map */
    #projection-ticker-wrap {
      width: 100%;
      background: #191d22;
      padding: 60px 0 60px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 2;
      min-height: 330px;
      border-top: 2px solid #303540;
      margin-top: 0;
    }
    .nyt-projection-title {
      color: #fff;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
      text-align: center;
      text-shadow: 0 1px 8px #000;
    }
    .needle-svg-wrap {
      width: 390px;
      max-width: 90vw;
      margin: 0 auto;
      position: relative;
    }
    .needle-labels {
      width: 100%;
      display: flex;
      justify-content: space-between;
      font-weight: bold;
      font-size: 18px;
      margin-top: 8px;
      color: #fff;
      letter-spacing: 0.2px;
    }
    .needle-labels .left { color: #e74c3c; }
    .needle-labels .right { color: #3498db; }
    .nyt-prob-row {
      text-align: center;
      margin-top: 8px;
      color: #eee;
      font-size: 15px;
    }
    .arc-very-likely-bush { stroke: #e74c3c; }
    .arc-likely-bush { stroke: #f7a49a; }
    .arc-lean-bush { stroke: #ffd6c2; }
    .arc-tossup { stroke: #cccccc; }
    .arc-lean-gore { stroke: #b8d8f8; }
    .arc-likely-gore { stroke: #74b0e7; }
    .arc-very-likely-gore { stroke: #3498db; }
    .needle-arrow { fill: #444; stroke: #fff; stroke-width: 1.1; }
    .needle-dot { fill: #fff; stroke: #444; stroke-width: 2.3; }
    .arc-label {
      font-size: 12px;
      fill: #eee;
      font-weight: bold;
      text-shadow: 0 1px 6px #222, 0 0 3px #000;
      letter-spacing: 0.4px;
      pointer-events: none;
      font-family: sans-serif;
    }
    @media (max-width:500px){
      .needle-svg-wrap { width: 98vw; }
    }
  </style>
</head>
<body>
<div id="header">
  <div class="title">2000 Live Election Map</div>
  <div class="progress-container">
    <div class="candidate-labels">
      <span>Bush: <span id="bush-votes">0</span></span>
      <span>Gore: <span id="gore-votes">0</span></span>
    </div>
    <div class="progress-bar-container">
      <img src="images/George-W-Bush.jpg" alt="Bush" class="candidate-image">
      <div style="width: 100%; position: relative;">
        <div class="threshold-label">270 to Win</div>
        <div class="progress-bar-wrapper">
          <div class="threshold-marker"></div>
          <div class="progress-bar bush" id="bush-bar" style="width: 0%"></div>
          <div class="progress-bar gore" id="gore-bar" style="width: 0%"></div>
          <div class="vote-label" id="bush-label" style="left: 5px">0</div>
          <div class="vote-label" id="gore-label" style="right: 5px">0</div>
        </div>
      </div>
      <img src="images/Al_Gore.jpg" alt="Gore" class="candidate-image">
    </div>
  </div>
  <div class="candidate-stats">
    <div class="candidate-stat-left" id="bush-pv">Bush: 0 (0%)</div>
    <div class="stat-box" id="reporting">Reporting: 0%</div>
    <div class="candidate-stat-right" id="gore-pv">Gore: 0 (0%)</div>
  </div>
</div>
<div id="map"></div>

<!-- (optional) Any other content you want between map and ticker can go here -->

<div id="projection-ticker-wrap">
  <div class="nyt-projection-title">Chance of Winning (Projection)</div>
  <div class="needle-svg-wrap">
    <svg id="nyt-needle-svg" width="390" height="210" viewBox="0 0 390 210">
      <!-- Arc Segments -->
      <path id="arc-vl-bush" class="arc-very-likely-bush" fill="none" stroke-width="16"/>
      <path id="arc-l-bush" class="arc-likely-bush" fill="none" stroke-width="16"/>
      <path id="arc-le-bush" class="arc-lean-bush" fill="none" stroke-width="16"/>
      <path id="arc-tossup" class="arc-tossup" fill="none" stroke-width="16"/>
      <path id="arc-le-gore" class="arc-lean-gore" fill="none" stroke-width="16"/>
      <path id="arc-l-gore" class="arc-likely-gore" fill="none" stroke-width="16"/>
      <path id="arc-vl-gore" class="arc-very-likely-gore" fill="none" stroke-width="16"/>
      <!-- Arc Labels -->
      <text class="arc-label" x="38" y="95">Very likely Bush</text>
      <text class="arc-label" x="90" y="38">Likely Bush</text>
      <text class="arc-label" x="150" y="18">Lean Bush</text>
      <text class="arc-label" x="192" y="8">Tossup</text>
      <text class="arc-label" x="235" y="18">Lean Gore</text>
      <text class="arc-label" x="295" y="38">Likely Gore</text>
      <text class="arc-label" x="345" y="95">Very likely Gore</text>
      <!-- Needle -->
      <g id="needle-group">
        <polygon id="nyt-needle" class="needle-arrow"
          points="195,45 190,105 200,105"/>
        <circle id="needle-dot" class="needle-dot" cx="195" cy="105" r="9"/>
      </g>
    </svg>
    <div class="needle-labels">
      <span class="left">Bush</span>
      <span class="right">Gore</span>
    </div>
    <div class="nyt-prob-row">
      <span style="color:#e74c3c;font-weight:600">Bush</span>
      <span id="nyt-proj-bush" style="font-weight:600;"> -- % </span> &nbsp;|&nbsp;
      <span style="color:#3498db;font-weight:600">Gore</span>
      <span id="nyt-proj-gore" style="font-weight:600;"> -- % </span>
    </div>
  </div>
</div>

<script>
mapboxgl.accessToken = 'pk.eyJ1IjoiNW00Y2s3NyIsImEiOiJjbWI4eXFqeDkwbzY1MmpwcDFzZDIwMmVqIn0.6JGe7JWhk28z5D3TLIJQwg';

const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/light-v10',
  center: [-98.5795, 39.8283],
  zoom: 3
});

// ------- NYT Needle helpers ------
function arcPath(cx, cy, r, startAngle, endAngle) {
  // Angles in degrees. 0 = vertical up, +right.
  const start = polar(cx, cy, r, startAngle);
  const end = polar(cx, cy, r, endAngle);
  const arcSweep = endAngle - startAngle <= 180 ? "0" : "1";
  return [
    "M", start.x, start.y,
    "A", r, r, 0, arcSweep, 1, end.x, end.y
  ].join(" ");
}
function polar(cx, cy, r, angleDeg) {
  const angle = (angleDeg-90)*Math.PI/180;
  return { x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) };
}
function setArcSegs() {
  // 7 segments: [-90,-60] VL Bush | [-60,-30] L Bush | [-30,-10] Lean Bush | [-10,10] Tossup | [10,30] Lean Gore | [30,60] L Gore | [60,90] VL Gore
  const cx=195, cy=105, r=86;
  document.getElementById('arc-vl-bush').setAttribute('d', arcPath(cx,cy,r, -90, -60));
  document.getElementById('arc-l-bush').setAttribute('d', arcPath(cx,cy,r, -60, -30));
  document.getElementById('arc-le-bush').setAttribute('d', arcPath(cx,cy,r, -30, -10));
  document.getElementById('arc-tossup').setAttribute('d', arcPath(cx,cy,r, -10, 10));
  document.getElementById('arc-le-gore').setAttribute('d', arcPath(cx,cy,r, 10, 30));
  document.getElementById('arc-l-gore').setAttribute('d', arcPath(cx,cy,r, 30, 60));
  document.getElementById('arc-vl-gore').setAttribute('d', arcPath(cx,cy,r, 60, 90));
}
setArcSegs();
// ------- END Needle helpers ------

map.on('load', async () => {
  try {
    const [states, stats] = await Promise.all([
      fetch('data/us-states.geojson').then(r => r.json()),
      fetch('data/election2000-stats.json').then(r => r.json())
    ]);

    let ev_bush = 0, ev_gore = 0, total_gop_votes = 0, total_dem_votes = 0, total_votes = 0;

    states.features.forEach(f => {
      const stateName = f.properties.name;
      const s = stats[stateName];
      if (!s) {
        console.warn(`⚠️ No stats for: ${stateName}`);
        return;
      }

      Object.assign(f.properties, s);

      const gop = +s.votes_gop || 0;
      const dem = +s.votes_dem || 0;
      const reporting = +s.reporting || 0;
      const total = gop + dem;

      total_gop_votes += gop;
      total_dem_votes += dem;
      total_votes += total;

      if (reporting === 100) {
        if (gop > dem) ev_bush += +s.electoral_votes;
        else if (dem > gop) ev_gore += +s.electoral_votes;
      }
    });

    const total_registered = 105405100;
    const perc_gop = ((total_gop_votes / total_registered) * 100).toFixed(1);
    const perc_dem = ((total_dem_votes / total_registered) * 100).toFixed(1);
    const reporting_pct = ((total_votes / total_registered) * 100).toFixed(1);

    document.getElementById('bush-votes').textContent = ev_bush;
    document.getElementById('gore-votes').textContent = ev_gore;
    document.getElementById('bush-bar').style.width = `${(ev_bush / 538) * 100}%`;
    document.getElementById('gore-bar').style.width = `${(ev_gore / 538) * 100}%`;
    document.getElementById('bush-label').textContent = ev_bush;
    document.getElementById('gore-label').textContent = ev_gore;
    document.getElementById('bush-pv').textContent = `Bush: ${total_gop_votes.toLocaleString()} (${perc_gop}%)`;
    document.getElementById('gore-pv').textContent = `Gore: ${total_dem_votes.toLocaleString()} (${perc_dem}%)`;
    document.getElementById('reporting').textContent = `Reporting: ${reporting_pct}%`;

    // ------ NYT-STYLE PROJECTION NEEDLE LOGIC ------
    const bushProj = Math.min(ev_bush / 270, 1);
    const goreProj = Math.min(ev_gore / 270, 1);
    let projBush, projGore;
    if (ev_bush >= 270 && ev_bush > ev_gore) {
      projBush = 1; projGore = 0;
    } else if (ev_gore >= 270 && ev_gore > ev_bush) {
      projBush = 0; projGore = 1;
    } else if (bushProj + goreProj > 0) {
      projBush = bushProj / (bushProj + goreProj);
      projGore = goreProj / (bushProj + goreProj);
    } else {
      projBush = projGore = 0.5;
    }
    let angle;
    if (projBush === 1) angle = -90;
    else if (projGore === 1) angle = 90;
    else angle = -90 + 180 * projGore;

    const needleGroup = document.getElementById('needle-group');
    needleGroup.setAttribute('transform', `rotate(${angle},195,105)`);

    document.getElementById('nyt-proj-bush').textContent =
      Math.round(projBush*100) + " %";
    document.getElementById('nyt-proj-gore').textContent =
      Math.round(projGore*100) + " %";
    // ------ END NYT-STYLE PROJECTION ------

    map.addSource('states', { type: 'geojson', data: states });

    map.addLayer({
      id: 'states-fill',
      type: 'fill',
      source: 'states',
      paint: {
        'fill-color': [
          'match',
          ['get', 'status'],
          'GOP Win', '#d12c0f',
          'DEM Win', '#0e47e6',
          'Lean GOP', '#f4a6a6',
          'Lean DEM', '#a6c8f4',
          'Uncalled', '#cccccc',
          '#ffffff'
        ],
        'fill-opacity': 1.0
      }
    });

    map.addLayer({
      id: 'states-outline',
      type: 'line',
      source: 'states',
      paint: {
        'line-color': '#000000',
        'line-width': 2
      }
    });

    map.on('click', 'states-fill', (e) => {
      const p = e.features[0].properties;
      const gop = +p.votes_gop || 0;
      const dem = +p.votes_dem || 0;
      const total = gop + dem;
      const gopPerc = total > 0 ? ((gop / total) * 100).toFixed(1) : 0;
      const demPerc = total > 0 ? ((dem / total) * 100).toFixed(1) : 0;
      const winner = p.winner || 'Uncalled';
      const gopName = p.gop_candidate || 'Bush';
      const demName = p.dem_candidate || 'Gore';
      const gopCheck = winner === gopName ? '✓ ' : '';
      const demCheck = winner === demName ? '✓ ' : '';
      new mapboxgl.Popup()
        .setLngLat(e.lngLat)
        .setHTML(`
          <strong>${p.name}</strong><br/>
          <b>Electoral Votes:</b> ${p.electoral_votes}<br/>
          <b>Reporting:</b> ${p.reporting}%<br/>
          <b style="color:#d12c0f;">${gopCheck}${gopName}:</b> ${gop.toLocaleString()} (${gopPerc}%)<br/>
          <b style="color:#0e47e6;">${demCheck}${demName}:</b> ${dem.toLocaleString()} (${demPerc}%)<br/>
          <b>Winner:</b> ${winner}
        `)
        .addTo(map);
    });

    map.on('mouseenter', 'states-fill', () => {
      map.getCanvas().style.cursor = 'pointer';
    });
    map.on('mouseleave', 'states-fill', () => {
      map.getCanvas().style.cursor = '';
    });

  } catch (error) {
    console.error('Map load error:', error);
    document.getElementById('map').innerHTML = '<p style="color: red; text-align: center;">Failed to load map. Please check your data file and internet connection.</p>';
  }
});
</script>
</body>
</html>
