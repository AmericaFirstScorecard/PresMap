<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>2000 Election Map - Enhanced</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://api.mapbox.com/mapbox-gl-js/v2.13.0/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.13.0/mapbox-gl.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background-color: #f2f2f2;
      color: #222;
    }
    #map { position: absolute; top: 0; bottom: 0; left: 300px; right: 300px; }

    #sidebar, #news {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 300px;
      background: white;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      z-index: 1000;
      padding: 20px;
      overflow-y: auto;
    }
    #sidebar { left: 0; }
    #news { right: 0; }

    .toggle-group {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }
    .toggle-group button {
      padding: 5px 10px;
      border: none;
      border-radius: 4px;
      background: #ddd;
      cursor: pointer;
    }

    .headline {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .bar {
      background: #eee;
      height: 10px;
      border-radius: 5px;
      overflow: hidden;
      margin-bottom: 10px;
    }
    .bar-inner {
      height: 100%;
      transition: width 0.5s ease;
    }
    .bar-inner.gop { background: #d12c0f; }
    .bar-inner.dem { background: #0e47e6; }

    .status-filter {
      margin-top: 20px;
    }
    .status-filter select {
      width: 100%;
      padding: 5px;
    }
  </style>
</head>
<body>
  <div id="sidebar">
    <div class="headline">Victory Projection</div>
    <div class="bar">
      <div id="bar-gop" class="bar-inner gop" style="width: 0%"></div>
    </div>
    <div class="bar">
      <div id="bar-dem" class="bar-inner dem" style="width: 0%"></div>
    </div>
    <div class="toggle-group">
      <button onclick="toggleFade()">Toggle Vote Fade</button>
    </div>
    <div class="status-filter">
      <label for="status-select">Filter by Status:</label>
      <select id="status-select" onchange="filterByStatus()">
        <option value="all">All States</option>
        <option value="called">Called Only</option>
        <option value="uncalled">Uncalled Only</option>
      </select>
    </div>
  </div>

  <div id="news">
    <div class="headline">Live Updates</div>
    <ul>
      <li>Florida called for Gore, tipping balance eastward.</li>
      <li>Bush claims victory in key battlegrounds.</li>
      <li>Turnout highest in Midwest since 1984.</li>
    </ul>
  </div>

  <div id="map"></div>

  <script>
    mapboxgl.accessToken = 'YOUR_MAPBOX_ACCESS_TOKEN';
    const map = new mapboxgl.Map({
      container: 'map',
      style: 'mapbox://styles/mapbox/light-v10',
      center: [-98.5795, 39.8283],
      zoom: 3
    });

    let voteFade = false;
    let fullGeoJSON = null;

    function toggleFade() {
      voteFade = !voteFade;
      updateFillColor();
    }

    function updateFillColor() {
      const expression = voteFade
        ? [
            'interpolate', ['linear'], ['abs', ['-', ['get', 'votes_gop'], ['get', 'votes_dem']]],
            0, '#cccccc',
            2000000, [
              'match', ['get', 'status'],
              'GOP Win', '#d12c0f',
              'DEM Win', '#0e47e6',
              '#cccccc'
            ]
          ]
        : [
            'match', ['get', 'status'],
            'GOP Win', '#d12c0f',
            'DEM Win', '#0e47e6',
            'Lean GOP', '#f4a6a6',
            'Lean DEM', '#a6c8f4',
            'Uncalled', '#cccccc',
            '#ffffff'
          ];

      map.setPaintProperty('states-fill', 'fill-color', expression);
    }

    function filterByStatus() {
      const value = document.getElementById('status-select').value;
      const filter =
        value === 'called' ? ['!=', ['get', 'winner'], 'UNKNOWN'] :
        value === 'uncalled' ? ['==', ['get', 'winner'], 'UNKNOWN'] :
        true;
      map.setFilter('states-fill', filter);
    }

    map.on('load', async () => {
      const [states, stats] = await Promise.all([
        fetch('data/us-states.geojson').then(r => r.json()),
        fetch('data/election2000-full.json').then(r => r.json())
      ]);

      let ev_bush = 0, ev_gore = 0;

      states.features.forEach(f => {
        const name = f.properties.name;
        const s = stats[name];
        if (s) {
          Object.assign(f.properties, s);
          if (s.reporting === 100) {
            if (s.winner === 'Bush') ev_bush += s.electoral_votes;
            if (s.winner === 'Gore') ev_gore += s.electoral_votes;
          }
        } else {
          f.properties.winner = 'UNKNOWN';
        }
      });

      fullGeoJSON = states;

      map.addSource('states', { type: 'geojson', data: states });
      map.addLayer({
        id: 'states-fill',
        type: 'fill',
        source: 'states',
        paint: { 'fill-color': '#ccc', 'fill-opacity': 0.85 }
      });

      map.addLayer({
        id: 'states-outline',
        type: 'line',
        source: 'states',
        paint: { 'line-color': '#000', 'line-width': 1.5 }
      });

      updateFillColor();

      document.getElementById('bar-gop').style.width = `${(ev_bush / 538) * 100}%`;
      document.getElementById('bar-dem').style.width = `${(ev_gore / 538) * 100}%`;
    });
  </script>
</body>
</html>
