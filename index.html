<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>2000 Live Election Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.13.0/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.13.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: #1a1f26;
            color: #fff;
        }
        #header {
            background: linear-gradient(to bottom, #2a2f38, #222);
            padding: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .progress-container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .progress-bar-wrapper {
            position: relative;
            width: 100%;
            height: 24px;
            background: #3a404a;
            border-radius: 12px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            transition: width 0.6s ease;
        }
        .progress-bar.bush {
            background: linear-gradient(to right, #e74c3c, #c0392b);
        }
        .progress-bar.gore {
            background: linear-gradient(to right, #3498db, #2980b9);
            background-color: #3498db;
            position: absolute;
            right: 0;
        }
        .vote-label {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            text-shadow: 0 0 2px rgba(0,0,0,0.7);
        }
        .threshold-marker {
            position: absolute;
            left: calc(270 / 538 * 100%);
            width: 2px;
            height: 100%;
            background: #fff;
            z-index: 10;
        }
        .threshold-label {
            position: absolute;
            left: calc(270 / 538 * 100% - 30px);
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .candidate-labels {
            display: flex;
            justify-content: space-between;
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .stat-box {
            font-size: 13px;
            font-weight: 400;
        }
        .candidate-image {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        .progress-bar-container {
            display: flex;
            align-items: center;
            width: 100%;
            gap: 20px;
        }
        .candidate-stats {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 900px;
            font-size: 13px;
        }
        .candidate-stat-left, .candidate-stat-right {
            text-align: center;
            width: 160px;
        }
        .title {
            font-size: 32px;
            font-weight: 900;
            text-shadow: 0 1px 4px rgba(0,0,0,0.2);
            margin-bottom: 12px;
        }
        #map {
            width: 100%;
            height: 65vh;
            min-height: 400px;
            z-index: 1;
            background: #2a2f38;
            border: 1px solid #333;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        #state-sidebar {
            display: none;
            position: fixed;
            top: 0;
            right: 0;
            width: 340px;
            height: 100%;
            background: #222;
            color: #fff;
            padding: 24px;
            z-index: 1000;
            overflow-y: auto;
            box-shadow: -4px 0 12px rgba(0,0,0,0.4);
            border-radius: 8px 0 0 8px;
            transform: translateX(100%);
            transition: transform 0.3s ease;
        }
        #state-sidebar.active {
            display: block;
            transform: translateX(0);
        }
        #state-sidebar h2 {
            margin: 0 0 12px;
            font-size: 1.8rem;
            font-weight: 900;
        }
        #state-sidebar p {
            margin: 8px 0;
            font-size: 14px;
        }
        #close-sidebar-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            background: #2a2f38;
            color: #fff;
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        #close-sidebar-btn:hover {
            background: #e74c3c;
            transform: scale(1.05);
        }
        .separator {
            border-bottom: 1px solid #444;
            margin: 12px 0;
        }
        .candidate-row {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 12px 0;
        }
        .candidate-image-small {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 8px;
        }
        .bar-graph {
            width: 100%;
            height: 20px;
            background: #3a404a;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }
        .bar-fill {
            height: 100%;
            transition: width 0.6s ease;
        }
        .bar-fill.bush {
            background: #e74c3c;
        }
        .bar-fill.gore {
            background: #3498db;
        }
        .bar-fill.other {
            background: #bbb;
        }
        .candidate-details {
            margin-top: 8px;
            text-align: center;
            font-size: 14px;
            font-weight: 400;
        }
        .reporting-bar {
            width: 100%;
            height: 20px;
            background: #3a404a;
            border-radius: 10px;
            overflow: hidden;
            margin: 12px 0;
        }
        .reporting-fill {
            height: 100%;
            background: #4CAF50;
            transition: width 0.6s ease;
        }
        #county-mode-btn {
            position: absolute;
            top: 20px;
            right: 32px;
            z-index: 1100;
            background: #2a2f38;
            color: #fff;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            box-shadow: 0 3px 12px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        #county-mode-btn:hover {
            background: #3498db;
            transform: scale(1.05);
        }
        #projection-ticker-wrap {
            width: 100%;
            background: #191d22;
            padding: 80px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2;
            height: 450px;
            border-top: 2px solid #303540;
        }
        .nyt-projection-title {
            color: #fff;
            font-size: 2.6rem;
            font-weight: 900;
            margin-bottom: 24px;
            text-align: center;
        }
        .needle-svg-wrap {
            width: 520px;
            max-width: 99vw;
            margin: 0 auto;
            position: relative;
        }
        .needle-img-candidate {
            position: absolute;
            width: 72px;
            height: 72px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 3px 24px rgba(0,0,0,0.5);
            z-index: 2;
        }
        .needle-img-bush {
            left: 10px;
            top: 172px;
        }
        .needle-img-gore {
            right: 10px;
            top: 172px;
        }
        .needle-checkmark {
            position: absolute;
            width: 36px;
            height: 36px;
            top: 220px;
            left: 38px;
            display: none;
            z-index: 3;
        }
        .needle-checkmark.gore {
            left: auto;
            right: 38px;
        }
        .arc-label {
            font-size: 15px;
            font-weight: 700;
            fill: #fff;
            font-family: 'Inter', sans-serif;
            dominant-baseline: middle;
            text-anchor: middle;
        }
        .needle-arrow {
            fill: #fff;
            stroke: #222;
            stroke-width: 2.2;
        }
        .needle-dot {
            fill: #191d22;
            stroke: #fff;
            stroke-width: 3.5;
        }
        .needle-candidate-labels {
            display: flex;
            justify-content: center;
            margin-top: 20px;
            font-size: 2.2rem;
            font-weight: 800;
            gap: 48px;
        }
        .needle-bush-label { color: #e74c3c; }
        .needle-gore-label { color: #3498db; }
        .nyt-prob-row {
            margin-top: 28px;
            font-size: 1.8rem;
            font-weight: 900;
            display: flex;
            justify-content: center;
            gap: 16px;
        }
        .proj-big-num {
            font-size: 2.3rem;
            margin: 0 8px;
        }
        .proj-big-num.bush { color: #e74c3c; }
        .proj-big-num.gore { color: #3498db; }
        .proj-divider {
            font-size: 2rem;
            color: #fff;
            margin: 8px;
        }
        @media (max-width: 700px) {
            #map { height: 55vh; min-height: 300px; }
            #state-sidebar { width: 100%; border-radius: 0; }
            .title { font-size: 24px; }
            .candidate-image { width: 60px; height: 60px; }
            .candidate-stats { font-size: 12px; flex-direction: column; align-items: center; gap: 10px; }
            .candidate-stat-left, .candidate-stat-right { width: 100%; }
            .needle-svg-wrap { width: 99vw; }
            .needle-img-candidate { width: 48px; height: 48px; top: 125px; }
            .needle-checkmark { width: 28px; height: 28px; top: 148px; left: 12px; }
            .needle-checkmark.gore { right: 12px; }
            .arc-label { font-size: 12px; }
            .needle-candidate-labels { font-size: 1.6rem; gap: 8px; }
            .nyt-prob-row { font-size: 1.4rem; }
            .proj-big-num { font-size: 1.8rem; }
            .proj-divider { font-size: 1.2rem; }
            #county-mode-btn { padding: 10px 20px; font-size: 14px; }
        }
    </style>
</head>
<body>
    <div id="header">
        <div class="title">2000 Live Election Map</div>
        <div class="progress-container">
            <div class="candidate-labels">
                <span>Bush: <span id="bush-ev">0</span> EV</span>
                <span>Gore: <span id="gore-ev">0</span> EV</span>
            </div>
            <div class="progress-bar-container">
                <img src="images/George-W-Bush.jpg" alt="Bush" class="candidate-image">
                <div style="width: 100%; position: relative;">
                    <div class="threshold-label">270 to Win</div>
                    <div class="progress-bar-wrapper">
                        <div class="threshold-marker"></div>
                        <div class="progress-bar bush" id="bush-bar"></div>
                        <div class="progress-bar gore" id="gore-bar"></div>
                        <div class="vote-label" id="bush-label" style="left: 10px;">0%</div>
                        <div class="vote-label" id="gore-label" style="right: 10px;">0%</div>
                    </div>
                </div>
                <img src="images/Al_Gore.jpg" alt="Gore" class="candidate-image">
            </div>
            <div class="candidate-stats">
                <div class="candidate-stat-left">Bush: <span id="bush-pop">0</span> Votes</div>
                <div class="stat-box" id="reporting">Reporting: 0%</div>
                <div class="candidate-stat-right">Gore: <span id="gore-pop">0</span> Votes</div>
            </div>
        </div>
    </div>
    <button id="county-mode-btn">County Mode</button>
    <div id="map"></div>
    <div id="state-sidebar">
        <button id="close-sidebar-btn">Close</button>
        <h2 id="state-sidebar-title"></h2>
        <p id="state-electoral-votes"></p>
        <div class="separator"></div>
        <div id="candidate-stats"></div>
        <div class="reporting-bar">
            <div class="reporting-fill" id="reporting-fill" style="width: 0%;"></div>
        </div>
        <p id="reporting-status"></p>
        <p id="last-updated"></p>
    </div>
    <div id="projection-ticker-wrap">
        <div class="nyt-projection-title">Chance of Winning <span style="font-weight: 400;">(Projection)</span></div>
        <div class="needle-svg-wrap">
            <img src="images/George-W-Bush.jpg" class="needle-img-candidate needle-img-bush" alt="Bush">
            <img src="images/Al_Gore.jpg" class="needle-img-candidate needle-img-gore" alt="Gore">
            <svg class="needle-checkmark" id="needle-check-bush" viewBox="0 0 53 53">
                <circle cx="26.5" cy="26.5" r="25" fill="#e74c3c"/>
                <path d="M16 27.5l7 7 14-14" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
            </svg>
            <svg class="needle-checkmark gore" id="needle-check-gore" viewBox="0 0 53 53">
                <circle cx="26.5" cy="26.5" r="25" fill="#3498db"/>
                <path d="M16 27.5l7 7 14-14" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
            </svg>
            <svg id="nyt-needle-svg" width="500" height="270" viewBox="0 0 500 270">
                <g id="needle-group">
                    <polygon class="needle-arrow" points="250,64 243,64 243,162 257,162 257,64"/>
                    <circle id="needle-dot" cx="250" cy="154" r="16"/>
                </g>
            </svg>
            <div class="needle-candidate-labels">
                <span class="needle-bush-label">Bush</span>
                <span class="proj-big-num bush" id="nyt-proj-bush">--%</span>
                <span class="proj-divider">|</span>
                <span class="proj-big-num gore" id="nyt-proj-gore">--%</span>
                <span class="needle-gore-label">Gore</span>
            </div>
        </div>
    </div>
    <script>
        mapboxgl.accessToken = 'pk.eyJ1IjoiNW00Y2s3NyIsImEiOiJjbWI4eXFqeDkwbzY1MmpwcDFzZDIwMmVqIn0.6JGe7JWhk28z5D3TLIJQwg';
        const STATE_CSV_URL = 'https://docs.google.com/spreadsheets/d/10zbHap425MtnS4jgsELt__DhtEQbXI8GlnD-6vkB4yg/export?format=csv';
        const COUNTY_CSV_URL = 'https://docs.google.com/spreadsheets/d/1edopYcOoeeom30K3WsCmzVwvJ8rHcdYH7xB7B7QCQBI/export?format=csv';

        let countiesGeoJSON = null;
        let countyElectionStats = {};
        let statesGeoJSON = null;
        let stateStats = {};
        let mainMap = null;
        let statePopup = null;
        let countyPopup = null;
        let stateHoverHandlers = { mousemove: null, mouseleave: null };
        let countyHoverHandlers = { mousemove: null, mouseleave: null };
        let currentState = null;
        let isCountyMode = false;

        const stateNameToFips = {
            "alabama": "01", "alaska": "02", "arizona": "04", "arkansas": "05", "california": "06",
            "colorado": "08", "connecticut": "09", "delaware": "10", "florida": "12", "georgia": "13",
            "hawaii": "15", "idaho": "16", "illinois": "17", "indiana": "18", "iowa": "19",
            "kansas": "20", "kentucky": "21", "louisiana": "22", "maine": "23", "maryland": "24",
            "massachusetts": "25", "michigan": "26", "minnesota": "27", "mississippi": "28", "missouri": "29",
            "montana": "30", "nebraska": "31", "nevada": "32", "new hampshire": "33", "new jersey": "34",
            "new mexico": "35", "new york": "36", "north carolina": "37", "north dakota": "38", "ohio": "39",
            "oklahoma": "40", "oregon": "41", "pennsylvania": "42", "rhode island": "44", "south carolina": "45",
            "south dakota": "46", "tennessee": "47", "texas": "48", "utah": "49", "vermont": "50",
            "virginia": "51", "washington": "53", "west virginia": "54", "wisconsin": "55", "wyoming": "56",
            "district of columbia": "11"
        };
        const stateFipsMap = { ...stateNameToFips };

        function getColumnKey(row, key) {
            const lowerKey = key.toLowerCase().trim();
            return Object.keys(row).find(k => k.toLowerCase().trim() === lowerKey) || key;
        }

        function populateCountyStatsFromCSV(rows) {
            console.log('County CSV rows:', rows.length);
            const newCountyStats = {};
            const seenEntries = new Set();
            let nationalTotal = 0;

            for (const row of rows) {
                const stateKey = getColumnKey(row, 'state');
                const fipsKey = getColumnKey(row, 'county_fips');
                const partyKey = getColumnKey(row, 'party');
                const votesKey = getColumnKey(row, 'candidatevotes');
                const totalVotesKey = getColumnKey(row, 'totalvotes');
                const candidateKey = getColumnKey(row, 'candidate');
                const countyNameKey = getColumnKey(row, 'county_name');

                let fips = (row[fipsKey] || '').toString().trim().padStart(5, "0");
                if (!/^\d{5}$/.test(fips)) {
                    console.warn(`Invalid FIPS: ${fips}`);
                    continue;
                }

                let party = (row[partyKey] || "").toString().trim().toUpperCase();
                let candidate = (row[candidateKey] || "").toString().trim().toLowerCase();
                let votes = parseInt((row[votesKey] || "0").replace(/[,]/g, ''), 10);
                if (isNaN(votes) || votes < 0) {
                    console.warn(`Invalid votes: ${row[votesKey]} for FIPS ${fips}`);
                    votes = 0;
                }

                let totalVotes = parseInt((row[totalVotesKey] || "0").replace(/[,]/g, ''), 10);
                if (isNaN(totalVotes) || totalVotes < 0) {
                    console.warn(`Invalid total votes: ${row[totalVotesKey]} for FIPS ${fips}`);
                    totalVotes = 0;
                }

                let stateName = (row[stateKey] || '').toString().trim().toLowerCase();
                let countyName = (row[countyNameKey] || 'Unknown').toString().trim();

                const entryKey = `${fips}-${candidate.toLowerCase().replace(/\s+/g, '')}-${party.toLowerCase().replace(/\s+/g, '')}`;
                if (seenEntries.has(entryKey)) {
                    console.warn(`Duplicate entry for FIPS ${fips}, candidate ${candidate}, party ${party}, votes ${votes}`);
                    continue;
                }
                seenEntries.add(entryKey);

                if (!newCountyStats[fips]) {
                    newCountyStats[fips] = {
                        state: stateName,
                        bush_votes: 0,
                        gore_votes: 0,
                        other_votes: 0,
                        totalvotes: totalVotes,
                        winner: "Tied",
                        county_name: countyName
                    };
                }

                if (candidate.includes('bush') || party === "REPUBLICAN") {
                    newCountyStats[fips].bush_votes = votes;
                } else if (candidate.includes('gore') || party === "DEMOCRAT") {
                    newCountyStats[fips].gore_votes = votes;
                } else {
                    newCountyStats[fips].other_votes += votes;
                }
            }

            if (newCountyStats['01073']) {
                newCountyStats['01073'] = {
                    state: 'alabama',
                    bush_votes: 0,
                    gore_votes: 0,
                    other_votes: 0,
                    totalvotes: 0,
                    winner: 'Tied',
                    county_name: 'Jefferson'
                };
                console.log('Jefferson County overridden to zero votes');
            }

            for (const fips in newCountyStats) {
                const stats = newCountyStats[fips];
                if (!stats.totalvotes) {
                    stats.totalvotes = stats.bush_votes + stats.gore_votes + stats.other_votes;
                }
                nationalTotal += stats.totalvotes;
                if (stats.bush_votes > stats.gore_votes) stats.winner = "Bush";
                else if (stats.gore_votes > stats.bush_votes) stats.winner = "Gore";
                else stats.winner = "Tied";
            }

            console.log(`County stats: ${Object.keys(newCountyStats).length} counties, total votes: ${nationalTotal.toLocaleString()}`);
            countyElectionStats = newCountyStats;
        }

        function populateStateStatsFromCSV(rows) {
            console.log('State CSV rows:', rows.length);
            const newStateStats = {};
            for (const row of rows) {
                const stateKey = getColumnKey(row, 'State');
                let stateName = (row[stateKey] || '').toString().trim().toLowerCase();
                if (!stateName) continue;

                const statusKey = getColumnKey(row, 'Election status (called, uncalled)');
                const winnerKey = getColumnKey(row, 'Winner');
                const evKey = getColumnKey(row, 'Electoral Votes');
                const reportingKey = getColumnKey(row, 'Reporting %');
                const repCandidateKey = getColumnKey(row, 'Republican Candidate');
                const demCandidateKey = getColumnKey(row, 'Democrat Candidate');
                const otherCandidateKey = getColumnKey(row, 'Other Candidate');

                let status = (row[statusKey] || 'Uncalled').toString().trim();
                const statusLower = status.toLowerCase();
                if (statusLower.includes('called')) {
                    const winner = (row[winnerKey] || '').toString().trim().toLowerCase();
                    if (winner.includes('bush')) status = 'Bush Win';
                    else if (winner.includes('gore')) status = 'Gore Win';
                    else status = 'Uncalled';
                }

                let reporting = parseFloat(row[reportingKey] || "0");
                if (isNaN(reporting) || reporting < 0 || reporting > 100) reporting = 0;

                newStateStats[stateName] = {
                    state: row[stateKey],
                    electoral_votes: parseInt(row[evKey] || "0", 10),
                    winner: (row[winnerKey] || '').toString().trim(),
                    status: status,
                    reporting: reporting,
                    republican_candidate: row[repCandidateKey] || 'George W. Bush',
                    democrat_candidate: row[demCandidateKey] || 'Al Gore',
                    other_candidate: row[otherCandidateKey] || 'Other'
                };
            }
            stateStats = newStateStats;
        }

        function populateStateFipsMapFromGeoJSON(statesGeoJSON) {
            statesGeoJSON?.features?.forEach(f => {
                const prop = f.properties || {};
                const nameKey = Object.keys(prop).find(k => k.toLowerCase().includes('name')) || 'NAME';
                const fipsKey = Object.keys(prop).find(k => k.toLowerCase().includes('statefp') || k.toLowerCase().includes('fips')) || 'STATEFP';
                const name = (prop[nameKey] || '').toString().trim().toLowerCase();
                const fips = (prop[fipsKey] || '').toString().trim().padStart(2, '0');
                if (name && stateNameToFips[name] && /^\d{2}$/.test(fips)) {
                    stateFipsMap[name] = fips;
                } else {
                    stateFipsMap[name] = stateNameToFips[name] || '00';
                    console.warn(`FIPS mapping issue for ${name}: GeoJSON FIPS=${fips}, using fallback=${stateFipsMap[name]}`);
                }
            });
            console.log('Updated State FIPS map:', stateFipsMap);
        }

        function updateGeoJSONAndMap() {
            if (!statesGeoJSON || !countiesGeoJSON) {
                console.warn('GeoJSON not loaded');
                return;
            }

            countiesGeoJSON.features.forEach(f => {
                f.properties = {
                    ...f.properties,
                    bush_votes: 0,
                    gore_votes: 0,
                    other_votes: 0,
                    total_votes: 0,
                    winner: 'Tied',
                    county_name: f.properties.NAME || 'Unknown'
                };
            });

            const stateVoteTotals = {};
            for (const fips in countyElectionStats) {
                const stats = countyElectionStats[fips];
                const stateName = stats.state.toLowerCase();
                if (!stateVoteTotals[stateName]) {
                    stateVoteTotals[stateName] = { bush_votes: 0, gore_votes: 0, other_votes: 0, total_votes: 0 };
                }
                stateVoteTotals[stateName].bush_votes += stats.bush_votes || 0;
                stateVoteTotals[stateName].gore_votes += stats.gore_votes || 0;
                stateVoteTotals[stateName].other_votes += stats.other_votes || 0;
                stateVoteTotals[stateName].total_votes += stats.totalvotes || 0;
            }

            statesGeoJSON.features.forEach(f => {
                const nameKey = Object.keys(f.properties).find(key => key.toLowerCase().includes('name')) || 'NAME';
                const geoName = (f.properties[nameKey] || '').toString().trim().toLowerCase();
                const stateData = stateStats[geoName] || {};
                const voteTotals = stateVoteTotals[geoName] || { bush_votes: 0, gore_votes: 0, other_votes: 0, total_votes: 0 };

                let status = stateData.status || 'Uncalled';
                let winner = 'Tied';
                if (status === 'Bush Win') winner = 'Bush';
                else if (status === 'Gore Win') winner = 'Gore';
                else if (voteTotals.bush_votes > voteTotals.gore_votes) winner = 'Bush';
                else if (voteTotals.gore_votes > voteTotals.bush_votes) winner = 'Gore';

                f.properties = {
                    ...f.properties,
                    state: stateData.state || geoName,
                    votes_gop: voteTotals.bush_votes,
                    votes_dem: voteTotals.gore_votes,
                    votes_other: voteTotals.other_votes,
                    total_votes: voteTotals.total_votes,
                    winner: winner,
                    status: status,
                    electoral_votes: stateData.electoral_votes || 0,
                    reporting: stateData.reporting || 0,
                    republican_candidate: stateData.republican_candidate || 'George W. Bush',
                    democrat_candidate: stateData.democrat_candidate || 'Al Gore',
                    other_candidate: stateData.other_candidate || 'Other'
                };
            });

            countiesGeoJSON.features.forEach(f => {
                const fips = f.properties.GEOID || f.properties.county_fips;
                if (!fips) {
                    console.warn('Missing GEOID:', f.properties);
                    return;
                }
                const stats = countyElectionStats[fips] || {
                    bush_votes: 0,
                    gore_votes: 0,
                    other_votes: 0,
                    totalvotes: 0,
                    winner: 'Tied',
                    county_name: f.properties.NAME || 'Unknown'
                };
                f.properties.bush_votes = stats.bush_votes || 0;
                f.properties.gore_votes = stats.gore_votes || 0;
                f.properties.other_votes = stats.other_votes || 0;
                f.properties.total_votes = stats.totalvotes || 0;
                f.properties.winner = stats.winner || 'Tied';
                f.properties.county_name = stats.county_name || f.properties.NAME || 'Unknown';
            });

            if (mainMap && mainMap.getSource('states')) {
                mainMap.getSource('states').setData(statesGeoJSON);
                if (currentState && !isCountyMode) {
                    addCountiesLayer(currentState);
                } else if (isCountyMode) {
                    toggleCountyMode(true);
                }
                mainMap.triggerRepaint();
            }
            updateUI();
        }

        function updateUI() {
            let ev_bush = 0, ev_gore = 0;
            let national_bush_votes = 0, national_gore_votes = 0, national_total_votes = 0;
            let totalReporting = 0, numStates = 0;

            if (!statesGeoJSON?.features) {
                console.error('statesGeoJSON not initialized');
                return;
            }

            statesGeoJSON.features.forEach(f => {
                const props = f.properties || {};
                const ev = props.electoral_votes || 0;
                const status = props.status || 'Uncalled';
                if (status === 'Bush Win') ev_bush += ev;
                else if (status === 'Gore Win') ev_gore += ev;

                national_bush_votes += props.votes_gop || 0;
                national_gore_votes += props.votes_dem || 0;
                national_total_votes += props.total_votes || 0;

                if (props.reporting) {
                    totalReporting += props.reporting;
                    numStates += 1;
                }
            });

            console.log(`Totals: Bush=${national_bush_votes.toLocaleString()}, Gore=${national_gore_votes.toLocaleString()}, Total=${national_total_votes.toLocaleString()}`);

            document.getElementById('bush-ev').textContent = ev_bush;
            document.getElementById('gore-ev').textContent = ev_gore;
            const totalEV = 538;
            const bushEVPerc = totalEV > 0 ? (ev_bush / totalEV * 100).toFixed(1) : 0;
            const goreEVPerc = totalEV > 0 ? (ev_gore / totalEV * 100).toFixed(1) : 0;
            document.getElementById('bush-bar').style.width = `${bushEVPerc}%`;
            document.getElementById('gore-bar').style.width = `${goreEVPerc}%`;
            document.getElementById('bush-label').textContent = `${bushEVPerc}%`;
            document.getElementById('gore-label').textContent = `${goreEVPerc}%`;
            console.log(`EV Perc: Bush=${bushEVPerc}%, Gore=${goreEVPerc}%`);

            document.getElementById('bush-pop').textContent = national_bush_votes.toLocaleString();
            document.getElementById('gore-pop').textContent = national_gore_votes.toLocaleString();

            const avgReporting = numStates > 0 ? (totalReporting / numStates).toFixed(1) : 0;
            document.getElementById('reporting').textContent = `Reporting: ${avgReporting}%`;

            const bushProj = ev_bush / 270;
            const goreProj = ev_gore / 270;
            let projBush = 0.5, projGore = 0.5;
            if (ev_bush >= 270) {
                projBush = 1;
                projGore = 0;
            } else if (ev_gore >= 270) {
                projBush = 0;
                projGore = 1;
            } else if (bushProj + goreProj > 0) {
                projBush = bushProj / (bushProj + goreProj);
                projGore = goreProj / (bushProj + goreProj);
            }
            const angle = -90 + 180 * projGore;
            document.getElementById('needle-group').setAttribute('transform', `rotate(${angle}, 250, 154)`);
            document.getElementById('nyt-proj-bush').textContent = `${Math.round(projBush * 100)}%`;
            document.getElementById('nyt-proj-gore').textContent = `${Math.round(projGore * 100)}%`;
            document.getElementById('needle-check-bush').style.display = projBush === 1 ? 'block' : 'none';
            document.getElementById('needle-check-gore').style.display = projGore === 1 ? 'block' : 'none';
        }

        function refreshElectionData() {
            countyElectionStats = {};
            stateStats = {};

            Promise.all([
                new Promise((resolve, reject) => {
                    Papa.parse(STATE_CSV_URL, {
                        download: true,
                        header: true,
                        skipEmptyLines: true,
                        transformHeader: header => header.trim().toLowerCase(),
                        complete: results => {
                            console.log('State headers:', results.meta.fields);
                            populateStateStatsFromCSV(results.data);
                            resolve();
                        },
                        error: err => {
                            console.error('State CSV error:', err);
                            reject(err);
                        }
                    });
                }),
                new Promise((resolve, reject) => {
                    Papa.parse(COUNTY_CSV_URL, {
                        download: true,
                        header: true,
                        skipEmptyLines: true,
                        transformHeader: header => header.trim().toLowerCase(),
                        complete: results => {
                            console.log('County headers:', results.meta.fields);
                            populateCountyStatsFromCSV(results.data);
                            resolve();
                        },
                        error: err => {
                            console.error('County CSV error:', err);
                            reject(err);
                        }
                    });
                })
            ]).then(() => {
                updateGeoJSONAndMap();
                console.log('Data refreshed');
            }).catch(err => {
                console.error('Refresh error:', err);
            });
        }

        function initializeMainMap() {
            try {
                mainMap = new mapboxgl.Map({
                    container: 'map',
                    style: 'mapbox://styles/mapbox/dark-v10',
                    center: [-98.5795, 39.8283],
                    zoom: 3,
                    maxZoom: 11,
                    minZoom: 2.5,
                    projection: 'albers'
                });

                mainMap.on('load', () => {
                    console.log('Map loaded');
                    mainMap.addSource('states', { type: 'geojson', data: statesGeoJSON });
                    mainMap.addLayer({
                        id: 'states-fill',
                        type: 'fill',
                        source: 'states',
                        paint: {
                            'fill-color': [
                                'match', ['get', 'winner'],
                                'Bush', '#e74c3c',
                                'Gore', '#3498db',
                                '#cccccc'
                            ],
                            'fill-opacity': 0.8
                        }
                    });
                    mainMap.addLayer({
                        id: 'states-line',
                        type: 'line',
                        source: 'states',
                        paint: {
                            'line-color': '#fff',
                            'line-width': 1
                        }
                    });

                    enableStateHover();
                    mainMap.on('click', 'states-fill', e => {
                        if (isCountyMode) return;
                        const p = e.features[0].properties;
                        const nameKey = Object.keys(p).find(k => k.toLowerCase().includes('name')) || 'NAME';
                        currentState = p[nameKey].toLowerCase();
                        console.log('Clicked state:', currentState);
                        addCountiesLayer(currentState);
                        updateSidebar(p);
                    });
                });
            } catch (err) {
                console.error('Map init error:', err);
                document.getElementById('map').innerHTML = '<div style="color:red;padding:10px">Map failed to load</div>';
            }
        }

        function addCountiesLayer(stateName) {
            const stateFP = stateFipsMap[stateName.toLowerCase()];
            if (!stateFP || stateFP === '00') {
                console.warn(`No valid FIPS for ${stateName}`);
                return;
            }

            const filtered = {
                type: 'FeatureCollection',
                features: countiesGeoJSON.features.filter(f => (f.properties.STATEFP || '').toString().padStart(2, '0') === stateFP)
            };
            console.log(`Filtered ${filtered.features.length} counties for ${stateName}`);

            if (mainMap.getLayer('counties-fill')) mainMap.removeLayer('counties-fill');
            if (mainMap.getLayer('counties-line')) mainMap.removeLayer('counties-line');
            if (mainMap.getSource('counties')) mainMap.removeSource('counties');

            mainMap.addSource('counties', { type: 'geojson', data: filtered });
            mainMap.addLayer({
                id: 'counties-fill',
                type: 'fill',
                source: 'counties',
                paint: {
                    'fill-color': [
                        'match', ['get', 'winner'],
                        'Bush', '#e74c3c',
                        'Gore', '#3498db',
                        '#cccccc'
                    ],
                    'fill-opacity': 0.85
                }
            });
            mainMap.addLayer({
                id: 'counties-line',
                type: 'line',
                source: 'counties',
                paint: {
                    'line-color': '#fff',
                    'line-width': 0.5
                }
            });

            disableStateHover();
            enableCountyHover();

            const bounds = getStateBounds(stateName);
            if (bounds) {
                mainMap.fitBounds(bounds, { padding: 40, duration: 1000 });
            }
        }

        function getStateBounds(stateName) {
            const stateFP = stateFipsMap[stateName.toLowerCase()];
            if (!stateFP) return null;

            const stateFeature = statesGeoJSON.features.find(f => {
                const nameKey = Object.keys(f.properties).find(k => k.toLowerCase().includes('name')) || 'NAME';
                return f.properties[nameKey].toLowerCase() === stateName.toLowerCase();
            });

            if (!stateFeature?.geometry) return null;

            let coords = [];
            if (stateFeature.geometry.type === 'Polygon') {
                coords = stateFeature.geometry.coordinates[0];
            } else if (stateFeature.geometry.type === 'MultiPolygon') {
                coords = stateFeature.geometry.coordinates.flat(2);
            }

            if (!coords.length) return null;

            let minLng = Infinity, minLat = Infinity, maxLng = -Infinity, maxLat = -Infinity;
            coords.forEach(c => {
                if (Array.isArray(c) && c.length >= 2 && isFinite(c[0]) && isFinite(c[1])) {
                    minLng = Math.min(minLng, c[0]);
                    maxLng = Math.max(maxLng, c[0]);
                    minLat = Math.min(minLat, c[1]);
                    maxLat = Math.max(maxLat, c[1]);
                }
            });

            if (!isFinite(minLng)) return null;
            return [[minLng, minLat], [maxLng, maxLat]];
        }

        function enableStateHover() {
            if (!mainMap || !mainMap.getLayer('states-fill')) return;
            if (stateHoverHandlers.mousemove) return;

            stateHoverHandlers.mousemove = e => {
                if (!e.features?.[0]) return;
                if (statePopup) statePopup.remove();
                const p = e.features[0].properties;
                const nameKey = Object.keys(p).find(k => k.toLowerCase().includes('name')) || 'NAME';
                const total = (p.votes_gop || 0) + (p.votes_dem || 0) + (p.votes_other || 0);
                const gopPerc = total > 0 ? ((p.votes_gop || 0) / total * 100).toFixed(1) : 0;
                const demPerc = total > 0 ? ((p.votes_dem || 0) / total * 100).toFixed(1) : 0;
                console.log(`State hover: ${p[nameKey] || 'Unknown'}`);
                statePopup = new mapboxgl.Popup({ closeButton: false })
                    .setLngLat(e.lngLat)
                    .setHTML(`
                        <strong>${p[nameKey] || 'Unknown'}</strong><br>
                        Bush: ${(p.votes_gop || 0).toLocaleString()} (${gopPerc}%)<br>
                        Gore: ${(p.votes_dem || 0).toLocaleString()} (${demPerc}%)<br>
                        EV: ${p.electoral_votes || 0}<br>
                        Status: ${p.status || 'Uncalled'}
                    `)
                    .addTo(mainMap);
            };

            stateHoverHandlers.mouseleave = () => {
                if (statePopup) statePopup.remove();
            };

            mainMap.on('mousemove', 'states-fill', stateHoverHandlers.mousemove);
            mainMap.on('mouseleave', 'states-fill', stateHoverHandlers.mouseleave);
        }

        function disableStateHover() {
            if (stateHoverHandlers.mousemove) {
                mainMap.off('mousemove', 'states-fill', stateHoverHandlers.mousemove);
                stateHoverHandlers.mousemove = null;
            }
            if (stateHoverHandlers.mouseleave) {
                mainMap.off('mouseleave', 'states-fill', stateHoverHandlers.mouseleave);
                stateHoverHandlers.mouseleave = null;
            }
            if (statePopup) statePopup.remove();
        }

        function enableCountyHover() {
            if (!mainMap || !mainMap.getLayer('counties-fill')) return;
            if (countyHoverHandlers.mousemove) return;

            countyHoverHandlers.mousemove = e => {
                if (!e.features?.[0]) return;
                if (countyPopup) countyPopup.remove();
                const p = e.features[0].properties;
                const fips = p.GEOID || p.county_fips;
                const stats = countyElectionStats[fips] || {
                    bush_votes: 0,
                    gore_votes: 0,
                    totalvotes: 0,
                    winner: 'Tied',
                    county_name: p.NAME || 'Unknown'
                };
                const total = stats.totalvotes;
                const bushPerc = total > 0 ? (stats.bush_votes / total * 100).toFixed(1) : 0;
                const gorePerc = total > 0 ? (stats.gore_votes / total * 100).toFixed(1) : 0;
                console.log(`County hover: ${stats.county_name}`);
                countyPopup = new mapboxgl.Popup({ closeButton: false })
                    .setLngLat(e.lngLat)
                    .setHTML(`
                        <strong>${stats.county_name}</strong><br>
                        Bush: ${stats.bush_votes.toLocaleString()} (${bushPerc}%)<br>
                        Gore: ${stats.gore_votes.toLocaleString()} (${gorePerc}%)<br>
                        Winner: ${stats.winner}
                    `)
                    .addTo(mainMap);
            };

            countyHoverHandlers.mouseleave = () => {
                if (countyPopup) countyPopup.remove();
            };

            mainMap.on('mousemove', 'counties-fill', countyHoverHandlers.mousemove);
            mainMap.on('mouseleave', 'counties-fill', countyHoverHandlers.mouseleave);
        }

        function disableCountyHover() {
            if (countyHoverHandlers.mousemove) {
                mainMap.off('mousemove', 'counties-fill', countyHoverHandlers.mousemove);
                countyHoverHandlers.mousemove = null;
            }
            if (countyHoverHandlers.mouseleave) {
                mainMap.off('mouseleave', 'counties-fill', countyHoverHandlers.mouseleave);
                countyHoverHandlers.mouseleave = null;
            }
            if (countyPopup) countyPopup.remove();
        }

        function updateSidebar(props) {
            const total = (props.votes_gop || 0) + (props.votes_dem || 0) + (props.votes_other || 0);
            const bushPerc = total > 0 ? ((props.votes_gop || 0) / total * 100).toFixed(1) : 0;
            const gorePerc = total > 0 ? ((props.votes_dem || 0) / total * 100).toFixed(1) : 0;
            const otherPerc = total > 0 ? ((props.votes_other || 0) / total * 100).toFixed(1) : 0;

            document.getElementById('state-sidebar-title').textContent = props.state || 'Unknown';
            document.getElementById('state-electoral-votes').textContent = `${props.electoral_votes || 0} electoral votes`;
            document.getElementById('candidate-stats').innerHTML = `
                <div class="candidate-row">
                    <img src="images/George-W-Bush.jpg" alt="Bush" class="candidate-image-small">
                    <div class="bar-graph"><div class="bar-fill bush" style="width: ${bushPerc}%"></div></div>
                    <div class="candidate-details">${props.republican_candidate || 'Bush'}: ${(props.votes_gop || 0).toLocaleString()} (${bushPerc}%)</div>
                </div>
                <div class="candidate-row">
                    <img src="images/Al_Gore.jpg" alt="Gore" class="candidate-image-small">
                    <div class="bar-graph"><div class="bar-fill gore" style="width: ${gorePerc}%"></div></div>
                    <div class="candidate-details">${props.democrat_candidate || 'Gore'}: ${(props.votes_dem || 0).toLocaleString()} (${gorePerc}%)</div>
                </div>
                <div class="candidate-row">
                    <img src="https://via.placeholder.com/40" alt="Other" class="candidate-image-small">
                    <div class="bar-graph"><div class="bar-fill other" style="width: ${otherPerc}%"></div></div>
                    <div class="candidate-details">${props.other_candidate || 'Other'}: ${(props.votes_other || 0).toLocaleString()} (${otherPerc}%)</div>
                </div>
            `;
            document.getElementById('reporting-fill').style.width = `${props.reporting || 0}%`;
            document.getElementById('reporting-status').textContent = `Status: ${props.status || 'Uncalled'} (${(props.reporting || 0).toFixed(1)}% reporting)`;
            document.getElementById('last-updated').textContent = `Last Updated: ${new Date().toLocaleString()}`;
            document.getElementById('state-sidebar').classList.add('active');
        }

        function toggleCountyMode(enable) {
            if (enable === isCountyMode) return;
            isCountyMode = enable;
            console.log(`County mode: ${enable}`);

            if (enable) {
                document.getElementById('county-mode-btn').textContent = 'State Mode';
                document.getElementById('header').style.visibility = 'hidden';
                document.getElementById('projection-ticker-wrap').style.visibility = 'hidden';
                document.getElementById('state-sidebar').classList.remove('active');

                if (mainMap.getLayer('counties-fill')) mainMap.removeLayer('counties-fill');
                if (mainMap.getLayer('counties-line')) mainMap.removeLayer('counties-line');
                if (mainMap.getSource('counties')) mainMap.removeSource('counties');

                mainMap.addSource('counties', { type: 'geojson', data: countiesGeoJSON });
                mainMap.addLayer({
                    id: 'counties-fill',
                    type: 'fill',
                    source: 'counties',
                    paint: {
                        'fill-color': [
                            'match', ['get', 'winner'],
                            'Bush', '#e74c3c',
                            'Gore', '#3498db',
                            '#cccccc'
                        ],
                        'fill-opacity': 0.85
                    }
                });
                mainMap.addLayer({
                    id: 'counties-line',
                    type: 'line',
                    source: 'counties',
                    paint: {
                        'line-color': '#fff',
                        'line-width': 0.5
                    }
                });

                disableStateHover();
                enableCountyHover();
                mainMap.flyTo({ center: [-98.5795, 39.8283], zoom: 3, duration: 1000 });
            } else {
                document.getElementById('county-mode-btn').textContent = 'County Mode';
                document.getElementById('header').style.visibility = 'visible';
                document.getElementById('projection-ticker-wrap').style.visibility = 'visible';
                document.getElementById('state-sidebar').classList.remove('active');

                if (mainMap.getLayer('counties-fill')) mainMap.removeLayer('counties-fill');
                if (mainMap.getLayer('counties-line')) mainMap.removeLayer('counties-line');
                if (mainMap.getSource('counties')) mainMap.removeSource('counties');

                disableCountyHover();
                enableStateHover();
                mainMap.flyTo({ center: [-98.5795, 39.8283], zoom: 3, duration: 1000 });
                currentState = null;
            }
        }

        document.getElementById('county-mode-btn').addEventListener('click', () => {
            toggleCountyMode(!isCountyMode);
        });

        document.getElementById('close-sidebar-btn').addEventListener('click', () => {
            document.getElementById('state-sidebar').classList.remove('active');
        });

        Promise.all([
            fetch('data/county-geo.json').then(r => r.json()).then(data => {
                countiesGeoJSON = data;
                countiesGeoJSON.features.forEach(f => {
                    f.properties = {
                        ...f.properties,
                        bush_votes: 0,
                        gore_votes: 0,
                        other_votes: 0,
                        total_votes: 0,
                        winner: 'Tied',
                        county_name: f.properties.NAME || 'Unknown'
                    };
                });
            }).catch(e => console.error('County GeoJSON load failed:', e)),
            fetch('data/us-states.geo.json').then(r => r.json()).then(data => {
                statesGeoJSON = data;
                statesGeoJSON.features.forEach(f => {
                    f.properties = {
                        ...f.properties,
                        votes_gop: 0,
                        votes_dem: 0,
                        votes_other: 0,
                        total_votes: 0,
                        winner: 'Tied',
                        status: 'Uncalled',
                        electoral_votes: 0,
                        reporting: 0,
                        republican_candidate: 'George W. Bush',
                        democrat_candidate: 'Al Gore',
                        other_candidate: 'Other'
                    };
                });
                populateStateFipsMapFromGeoJSON(statesGeoJSON);
            }).catch(e => console.error('States GeoJSON load failed:', e))
        ]).then(() => {
            console.log('GeoJSON loaded');
            refreshElectionData();
            initializeMainMap();
            setInterval(refreshElectionData, 60000);
        }).catch(err => {
            console.error('Initial load failed:', err);
            document.getElementById('map').innerHTML = '<div style="color:red;padding:10px">Failed to load map data</div>';
        });
    </script>
