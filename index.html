<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>2000 Live Election Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Mapbox GL JS & CSS -->
  <script src="https://api.mapbox.com/mapbox-gl-js/v2.13.0/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.13.0/mapbox-gl.css" rel="stylesheet" />
  <!-- PapaParse for CSV parsing -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <!-- Turf.js for geometry bounding boxes -->
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf/turf.min.js"></script>

  <!-- Custom CSS -->
  <link href="style.css" rel="stylesheet" />
</head>
<body>
  <!-- HEADER -->
  <div id="header">
    <div class="title">2000 Live Election Map</div>
    <div class="progress-container" id="progress-container"></div>
    <div class="candidate-stats" id="candidate-stats-summary"></div>
  </div>

  <!-- MAIN MAP -->
  <div id="map"></div>

  <!-- SIDEBAR (state or county results, appears dynamically) -->
  <div id="sidebar"></div>
  <button id="box-out-btn" style="display: none;">Box Out</button>

  <!-- PROJECTION TICKER (NYT-style needle, optional) -->
  <div id="projection-ticker-wrap"></div>

  <!-- SCRIPTS: Modular JavaScript (order matters) -->
  <script src="config.js"></script>
  <script src="assets.js"></script>
  <script src="utils.js"></script>
  <script src="election-state.js"></script>
  <script src="election-counties.js"></script>
  <script src="sidebar.js"></script>
  <script src="map-code.js"></script>
</body>
</html>
