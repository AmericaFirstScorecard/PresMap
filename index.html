<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>2000 Live Election Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Mapbox GL JS -->
  <script src="https://api.mapbox.com/mapbox-gl-js/v2.13.0/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.13.0/mapbox-gl.css" rel="stylesheet" />
  <!-- PapaParse for CSV parsing -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <style>
    html, body { height: 100%; margin: 0; padding: 0; font-family: 'Inter', Arial, sans-serif; background: #11161b;}
    #header {
      background: #222; color: white; padding: 15px 20px;
      z-index: 1000; display: flex; flex-direction: column; align-items: center;
      position: relative;
    }
    .progress-container { width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 10px; }
    .progress-bar-wrapper {
      display: flex; align-items: center; position: relative;
      width: 100%; height: 20px; background: #444; border-radius: 10px; overflow: hidden;
    }
    .progress-bar { height: 100%; transition: width 0.5s ease-in-out; }
    .progress-bar.bush { background: #e74c3c; }
    .progress-bar.gore { background: #3498db; position: absolute; right: 0; }
    .vote-label {
      position: absolute; color: white; font-size: 12px;
      font-weight: bold; text-shadow: 0 0 2px rgba(0,0,0,0.7);
    }
    .threshold-marker {
      position: absolute; left: calc(270 / 538 * 100%);
      width: 2px; height: 100%; background: #fff; z-index: 10;
    }
    .threshold-label {
      position: relative; left: calc(270 / 538 * 100% - 20px);
      color: white; font-size: 12px; font-weight: bold;
      margin-bottom: 5px; text-align: left;
    }
    .candidate-labels {
      display: flex; justify-content: space-between;
      font-size: 14px; font-weight: bold; margin-bottom: 5px;
    }
    .stat-box { margin-top: 5px; font-size: 12px; }
    .candidate-image {
      width: 70px; height: 70px; border-radius: 50%; object-fit: cover;
    }
    .progress-bar-container {
      display: flex; align-items: center; width: 100%; gap: 15px;
    }
    .candidate-stats {
      display: flex; justify-content: space-between;
      width: 100%; max-width: 800px; font-size: 12px;
    }
    .candidate-stat-left, .candidate-stat-right {
      text-align: center; width: 150px;
    }
    .title {
      font-size: 30px; font-weight: bold; margin-bottom: 10px;
    }
    #map {
      position: relative;
      width: 100vw;
      height: 70vh;
      min-height: 400px;
      max-height: 80vh;
      z-index: 1;
      background: #ccc;
    }
    #state-sidebar {
      display: none; position: fixed; top: 0; right: 0; width: 340px; height: 100%;
      background: #222; color: white; padding: 20px; z-index: 1000; overflow-y: auto;
    }
    #state-sidebar h2 { margin: 0 0 10px; font-size: 1.5rem; }
    #state-sidebar p { margin: 5px 0; }
    #candidate-stats div { margin: 10px 0; display: flex; align-items: center; gap: 10px; }
    #close-sidebar-btn {
      background: #c43434; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; margin-bottom: 10px;
    }
    #close-sidebar-btn:hover { background: #e74c3c; }
    .separator { border-bottom: 1px solid #444; margin: 10px 0; }
    @media (max-width:700px) {
      #map { min-height: 300px; }
      #state-sidebar { width: 100%; }
    }
    #projection-ticker-wrap {
      width: 100%;
      background: #191d22;
      padding: 60px 0 60px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 2;
      min-height: 420px;
      border-top: 2px solid #303540;
      margin-top: 0;
    }
    .nyt-projection-title {
      color: #fff;
      font-size: 2.4rem;
      font-weight: 900;
      letter-spacing: 0.5px;
      margin-bottom: 22px;
      text-align: center;
      text-shadow: 0 2px 16px #000, 0 0 10px #111;
    }
    .needle-svg-wrap {
      width: 500px; max-width: 99vw; margin: 0 auto; position: relative;
    }
    .needle-img-candidate {
      position: absolute;
      width: 68px; height: 68px;
      border-radius: 50%; object-fit: cover;
      box-shadow: 0 3px 24px #000b, 0 1px 8px #222a;
      background: #fff;
      z-index: 2;
    }
    .needle-img-bush { left: 10px; top: 162px; }
    .needle-img-gore { right: 10px; top: 162px; }
    .needle-checkmark {
      position: absolute;
      width: 32px; height: 32px;
      top: 210px;
      left: 36px;
      background: none;
      display: none;
      z-index: 3;
      pointer-events: none;
    }
    .needle-checkmark.gore { left: auto; right: 36px; }
    .arc-label {
      font-size: 15px;
      font-weight: 700;
      fill: #fff;
      text-shadow: 0 2px 8px #111a, 0 0 3px #111;
      font-family: 'Inter', sans-serif;
      pointer-events: none;
      dominant-baseline: middle;
      text-anchor: middle;
    }
    .arc-label-center {
      font-size: 17px;
      font-weight: 900;
      fill: #fff;
    }
    .needle-arrow { fill: #fff; stroke: #222; stroke-width: 2.2; filter: drop-shadow(0 2px 6px #0008);}
    .needle-dot { fill: #191d22; stroke: #fff; stroke-width: 3.5; filter: drop-shadow(0 1px 8px #000a);}
    .arc-very-likely-bush { stroke: #e74c3c; }
    .arc-likely-bush { stroke: #f7a49a; }
    .arc-lean-bush { stroke: #ffe5d2; }
    .arc-tossup { stroke: #cccccc; }
    .arc-lean-gore { stroke: #b8d8f8; }
    .arc-likely-gore { stroke: #74b0e7; }
    .arc-very-likely-gore { stroke: #3498db; }
    .needle-candidate-labels {
      width: 100%; display: flex; justify-content: center;
      margin-top: 16px;
      font-size: 2.0rem;
      font-weight: 800;
      text-shadow: 0 2px 10px #000d;
      gap: 40px;
    }
    .needle-bush-label { color: #e74c3c; }
    .needle-gore-label { color: #3498db; }
    .nyt-prob-row {
      margin-top: 24px; text-align: center;
      font-size: 1.65rem; font-weight: 900; letter-spacing: 0.3px;
      text-shadow: 0 1px 4px #000b;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
    }
    .proj-big-num { font-size: 2.1rem; font-weight: 900; margin: 0 8px;}
    .proj-big-num.bush { color: #e74c3c;}
    .proj-big-num.gore { color: #3498db;}
    .proj-divider { font-size: 1.6rem; font-weight: 800; color: #fff; margin: 0 8px;}
    @media (max-width:700px){
      .needle-svg-wrap { width: 99vw;}
      .needle-img-candidate { width: 44px; height: 44px; top: 125px;}
      .needle-checkmark { width: 22px; height: 22px; top: 148px; left: 19px;}
      .needle-checkmark.gore { right: 19px;}
      .arc-label { font-size: 11px;}
      .arc-label-center { font-size: 13px;}
    }
    #box-out-btn {
      display: none;
      position: absolute;
      top: 20px;
      right: 32px;
      z-index: 1100;
      background: #23272e;
      color: #fff;
      padding: 10px 22px;
      border: none;
      border-radius: 10px;
      font-size: 17px;
      font-weight: 800;
      box-shadow: 0 3px 18px #0008;
      cursor: pointer;
      transition: background 0.2s;
    }
    #box-out-btn:hover {
      background: #303540;
    }
  </style>
</head>
<body>
<div id="header">
  <div class="title">2000 Live Election Map</div>
  <div class="progress-container">
    <div class="candidate-labels">
      <span>Bush: <span id="bush-votes">0</span></span>
      <span>Gore: <span id="gore-votes">0</span></span>
    </div>
    <div class="progress-bar-container">
      <img src="images/George-W-Bush.jpg" alt="Bush" class="candidate-image">
      <div style="width: 100%; position: relative;">
        <div class="threshold-label">270 to Win</div>
        <div class="progress-bar-wrapper">
          <div class="threshold-marker"></div>
          <div class="progress-bar bush" id="bush-bar" style="width: 0%"></div>
          <div class="progress-bar gore" id="gore-bar" style="width: 0%"></div>
          <div class="vote-label" id="bush-label" style="left: 5px">0%</div>
          <div class="vote-label" id="gore-label" style="right: 5px">0%</div>
        </div>
      </div>
      <img src="images/Al_Gore.jpg" alt="Gore" class="candidate-image">
    </div>
  </div>
  <div class="candidate-stats">
    <div class="candidate-stat-left" id="bush-pv">Bush: 0 (0%)</div>
    <div class="stat-box" id="reporting">Reporting: 0%</div>
    <div class="candidate-stat-right" id="gore-pv">Gore: 0 (0%)</div>
  </div>
</div>
<div id="map"></div>
<button id="box-out-btn">Box Out</button>
<div id="state-sidebar">
  <button id="close-sidebar-btn">×</button>
  <h2 id="state-sidebar-title"></h2>
  <p id="state-electoral-votes"></p>
  <div class="separator"></div>
  <div id="candidate-stats"></div>
  <div class="separator"></div>
  <p id="reporting-status"></p>
  <p id="last-updated"></p>
</div>
<div id="projection-ticker-wrap">
  <div class="nyt-projection-title">Chance of Winning <span style="font-weight:400;">(Projection)</span></div>
  <div class="needle-svg-wrap" style="position: relative;">
    <img src="images/George-W-Bush.jpg" class="needle-img-candidate needle-img-bush" id="needle-img-bush" alt="Bush"/>
    <img src="images/Al_Gore.jpg" class="needle-img-candidate needle-img-gore" id="needle-img-gore" alt="Gore"/>
    <svg class="needle-checkmark" id="needle-check-bush" viewBox="0 0 53 53"><circle cx="26.5" cy="26.5" r="25" fill="#e74c3c"/><path d="M16 27.5l7 7 14-14" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round"/></svg>
    <svg class="needle-checkmark gore" id="needle-check-gore" viewBox="0 0 53 53"><circle cx="26.5" cy="26.5" r="25" fill="#3498db"/><path d="M16 27.5l7 7 14-14" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round"/></svg>
    <svg id="nyt-needle-svg" width="500" height="270" viewBox="0 0 500 270">
      <path id="arc-vl-bush" class="arc-very-likely-bush" fill="none" stroke-width="20"/>
      <path id="arc-l-bush" class="arc-likely-bush" fill="none" stroke-width="20"/>
      <path id="arc-le-bush" class="arc-lean-bush" fill="none" stroke-width="20"/>
      <path id="arc-tossup" class="arc-tossup" fill="none" stroke-width="20"/>
      <path id="arc-le-gore" class="arc-lean-gore" fill="none" stroke-width="20"/>
      <path id="arc-l-gore" class="arc-likely-gore" fill="none" stroke-width="20"/>
      <path id="arc-vl-gore" class="arc-very-likely-gore" fill="none" stroke-width="20"/>
      <g id="arc-labels-group"></g>
      <g id="needle-group">
        <polygon id="nyt-needle" class="needle-arrow" points="250,64 243,162 257,162"/>
        <circle id="needle-dot" class="needle-dot" cx="250" cy="154" r="16"/>
      </g>
    </svg>
    <div class="needle-candidate-labels">
      <span class="needle-bush-label">Bush</span>
      <span class="proj-big-num bush" id="nyt-proj-bush-big">--%</span>
      <span class="proj-divider">|</span>
      <span class="proj-big-num gore" id="nyt-proj-gore-big">--%</span>
      <span class="needle-gore-label">Gore</span>
    </div>
  </div>
</div>

<script>
mapboxgl.accessToken = 'pk.eyJ1IjoiNW00Y2s3NyIsImEiOiJjbWI4eXFqeDkwbzY1MmpwcDFzZDIwMmVqIn0.6JGe7JWhk28z5D3TLIJQwg';

let countiesGeoJSON = null;
let countyElectionStats = {};
let statesGeoJSON = null;
let stateStats = {};
let mainMap = null;
let statePopup = null;
let stateHoverHandlers = {mousemove:null, mouseleave:null};

// State FIPS mapping
const stateNameToFips = {
  "alabama": "01", "alaska": "02", "arizona": "04", "arkansas": "05", "california": "06",
  "colorado": "08", "connecticut": "09", "delaware": "10", "florida": "12", "georgia": "13",
  "hawaii": "15", "idaho": "16", "illinois": "17", "indiana": "18", "iowa": "19",
  "kansas": "20", "kentucky": "21", "louisiana": "22", "maine": "23", "maryland": "24",
  "massachusetts": "25", "michigan": "26", "minnesota": "27", "mississippi": "28", "missouri": "29",
  "montana": "30", "nebraska": "31", "nevada": "32", "new hampshire": "33", "new jersey": "34",
  "new mexico": "35", "new york": "36", "north carolina": "37", "north dakota": "38", "ohio": "39",
  "oklahoma": "40", "oregon": "41", "pennsylvania": "42", "rhode island": "44", "south carolina": "45",
  "south dakota": "46", "tennessee": "47", "texas": "48", "utah": "49", "vermont": "50",
  "virginia": "51", "washington": "53", "west virginia": "54", "wisconsin": "55", "wyoming": "56",
  "district of columbia": "11", "puerto rico": "72"
};
const stateFipsMap = {...stateNameToFips};

function populateStateFipsMapFromGeoJSON(statesGeoJSON) {
  if (statesGeoJSON?.features?.length > 0) {
    statesGeoJSON.features.forEach(f => {
      const prop = f.properties || {};
      const nameKey = Object.keys(prop).find(k => k.toLowerCase().includes('name')) || 'name';
      const fipsKey = Object.keys(prop).find(k => k.toLowerCase().includes('statefp') || k.toLowerCase().includes('fips')) || 'STATEFP';
      const name = (prop[nameKey] || '').trim().toLowerCase();
      const fips = (prop[fipsKey] || '').toString().padStart(2, '0');
      if (name && fips && fips !== '00') stateFipsMap[name] = fips;
    });
  }
}

Promise.all([
  fetch('data/county-geo.json')
    .then(r => r.json())
    .then(data => { countiesGeoJSON = data; }),
  fetch('data/us-states.geo.json')
    .then(r => r.json())
    .then(data => { 
      statesGeoJSON = data;
      populateStateFipsMapFromGeoJSON(statesGeoJSON);
    }),
  fetch('data/election2000-stats.json')
    .then(r => r.json())
    .then(data => { stateStats = data; }),
]).then(() => {
  Papa.parse('data/countypres20.csv', {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: function(results) {
      for (const row of results.data) {
        if (row.year !== "2000" || !row.county_fips) continue;
        const fips = row.county_fips.padStart(5, "0");
        if (!countyElectionStats[fips]) {
          countyElectionStats[fips] = {
            bush_votes: 0,
            gore_votes: 0,
            other_votes: 0,
            totalvotes: +row.totalvotes || 0
          };
        }
        if (row.candidate === "George W. Bush" && row.party === "REPUBLICAN") {
          countyElectionStats[fips].bush_votes += +row.candidatevotes || 0;
        } else if (row.candidate === "Al Gore" && row.party === "DEMOCRAT") {
          countyElectionStats[fips].gore_votes += +row.candidatevotes || 0;
        } else {
          countyElectionStats[fips].other_votes += +row.candidatevotes || 0;
        }
      }
      for (const fips in countyElectionStats) {
        const c = countyElectionStats[fips];
        if (c.bush_votes > c.gore_votes) c.winner = "Bush";
        else if (c.gore_votes > c.bush_votes) c.winner = "Gore";
        else c.winner = "Tied";
      }
      setArcSegs();
      initializeMainMap();
    }
  });
});

// --- Arc SVG helpers ---
const arcSegs = [
  { label: "Very likely Bush", start: -90, end: -60 },
  { label: "Likely Bush", start: -60, end: -30 },
  { label: "Lean Bush", start: -30, end: -10 },
  { label: "Tossup", start: -10, end: 10 },
  { label: "Lean Gore", start: 10, end: 30 },
  { label: "Likely Gore", start: 30, end: 60 },
  { label: "Very likely Gore", start: 60, end: 90 }
];
const svgCx = 250, svgCy = 154, arcR = 110;
function arcPath(cx, cy, r, startAngle, endAngle) {
  const start = polar(cx, cy, r, startAngle);
  const end = polar(cx, cy, r, endAngle);
  const arcSweep = endAngle - startAngle <= 180 ? "0" : "1";
  return [
    "M", start.x, start.y,
    "A", r, r, 0, arcSweep, 1, end.x, end.y
  ].join(" ");
}
function polar(cx, cy, r, angleDeg) {
  const angle = (angleDeg-90)*Math.PI/180;
  return { x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) };
}
function setArcSegs() {
  document.getElementById('arc-vl-bush').setAttribute('d', arcPath(svgCx,svgCy,arcR, -90, -60));
  document.getElementById('arc-l-bush').setAttribute('d', arcPath(svgCx,svgCy,arcR, -60, -30));
  document.getElementById('arc-le-bush').setAttribute('d', arcPath(svgCx,svgCy,arcR, -30, -10));
  document.getElementById('arc-tossup').setAttribute('d', arcPath(svgCx,svgCy,arcR, -10, 10));
  document.getElementById('arc-le-gore').setAttribute('d', arcPath(svgCx,svgCy,arcR, 10, 30));
  document.getElementById('arc-l-gore').setAttribute('d', arcPath(svgCx,svgCy,arcR, 30, 60));
  document.getElementById('arc-vl-gore').setAttribute('d', arcPath(svgCx,svgCy,arcR, 60, 90));
}

// --- Utility for checkmark SVG ---
function checkmarkSvg(color="#fff", size=20) {
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" style="vertical-align:middle;">
    <circle cx="12" cy="12" r="12" fill="${color}" opacity="0.6"/>
    <polyline points="7,13 11,17 17,8" fill="none" stroke="#fff" stroke-width="2"/>
  </svg>`;
}

// --- State FIPS utility ---
function getStateFP(stateName) {
  if (!stateName) return null;
  return stateFipsMap[stateName.trim().toLowerCase()] || null;
}

// --------- STATE HOVER ENABLE/DISABLE HANDLERS ----------
function enableStateHover() {
  if (!mainMap || !mainMap.getLayer('states-fill')) return;
  if (stateHoverHandlers.mousemove) return;
  stateHoverHandlers.mousemove = function(e) {
    const p = e.features[0].properties;
    const nameKey = Object.keys(p).find(key => key.toLowerCase().includes('name')) || 'name';
    const gop = +p.votes_gop || 0, dem = +p.votes_dem || 0, total = gop + dem;
    const gopPerc = total > 0 ? ((gop / total) * 100).toFixed(1) : 0;
    const demPerc = total > 0 ? ((dem / total) * 100).toFixed(1) : 0;
    const winner = p.winner || 'Uncalled';
    const gopName = p.gop_candidate || 'Bush';
    const demName = p.dem_candidate || 'Gore';
    const gopCheck = winner === gopName ? '✓ ' : '';
    const demCheck = winner === demName ? '✓ ' : '';
    if (statePopup) statePopup.remove();
    statePopup = new mapboxgl.Popup({ closeButton: false, closeOnClick: false })
      .setLngLat(e.lngLat)
      .setHTML(
        `<strong>${p[nameKey]}</strong><br/>
        <b>Electoral Votes:</b> ${p.electoral_votes || 'N/A'}<br/>
        <b>Reporting:</b> ${p.reporting || 0}%<br/>
        <b style="color:#d12c0f;">${gopCheck}${gopName}:</b> ${gop.toLocaleString()} (${gopPerc}%)<br/>
        <b style="color:#0e47e6;">${demCheck}${demName}:</b> ${dem.toLocaleString()} (${demPerc}%)<br/>
        <b>Winner:</b> ${winner}`
      )
      .addTo(mainMap);
  };
  stateHoverHandlers.mouseleave = function() { if (statePopup) statePopup.remove(); };
  mainMap.on('mousemove', 'states-fill', stateHoverHandlers.mousemove);
  mainMap.on('mouseleave', 'states-fill', stateHoverHandlers.mouseleave);
}
function disableStateHover() {
  if (!mainMap || !mainMap.getLayer('states-fill')) return;
  if (stateHoverHandlers.mousemove)
    mainMap.off('mousemove', 'states-fill', stateHoverHandlers.mousemove);
  if (stateHoverHandlers.mouseleave)
    mainMap.off('mouseleave', 'states-fill', stateHoverHandlers.mouseleave);
  stateHoverHandlers.mousemove = null;
  stateHoverHandlers.mouseleave = null;
  if (statePopup) statePopup.remove();
}

// --------- MAIN MAP LOGIC -----------
function initializeMainMap() {
  mainMap = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/light-v10',
    center: [-98.5795, 39.8283],
    zoom: 3
  });
  mainMap.on('load', () => {
    // Build state geojson if missing (edge case)
    if (!statesGeoJSON || !statesGeoJSON.features) {
      const stateFeatures = {};
      countiesGeoJSON.features.forEach(f => {
        const stateFP = f.properties.STATEFP;
        if (!stateFeatures[stateFP]) {
          stateFeatures[stateFP] = {
            type: "Feature",
            properties: { STATEFP: stateFP, name: Object.keys(stateFipsMap).find(key => stateFipsMap[key] === stateFP) || `State ${stateFP}` },
            geometry: { type: "MultiPolygon", coordinates: [] }
          };
        }
        if (f.geometry.type === "Polygon") {
          stateFeatures[stateFP].geometry.coordinates.push(f.geometry.coordinates);
        } else if (f.geometry.type === "MultiPolygon") {
          stateFeatures[stateFP].geometry.coordinates.push(...f.geometry.coordinates);
        }
      });
      statesGeoJSON = { type: "FeatureCollection", features: Object.values(stateFeatures) };
    }

    // Assign stats from election json to states
    statesGeoJSON.features.forEach(f => {
      const nameKey = Object.keys(f.properties).find(key => key.toLowerCase().includes('name')) || 'name';
      const stateName = f.properties[nameKey];
      const s = stateStats[stateName];
      if (s) Object.assign(f.properties, s);
    });

    // Add state layers
    mainMap.addSource('states', { type: 'geojson', data: statesGeoJSON });
    mainMap.addLayer({
      id: 'states-fill',
      type: 'fill',
      source: 'states',
      paint: {
        'fill-color': [
          'case',
          ['==', ['get', 'status'], 'GOP Win'], '#d12c0f',
          ['==', ['get', 'status'], 'DEM Win'], '#0e47e6',
          ['==', ['get', 'status'], 'Lean GOP'], '#f4a6a6',
          ['==', ['get', 'status'], 'Lean DEM'], '#a6c8f4',
          ['==', ['get', 'status'], 'Uncalled'], '#cccccc',
          '#ffffff'
        ],
        'fill-opacity': 1.0
      }
    });
    mainMap.addLayer({
      id: 'states-outline',
      type: 'line',
      source: 'states',
      paint: { 'line-color': '#000000', 'line-width': 2 }
    });

    // State statistics for header
    let ev_bush = 0, ev_gore = 0, total_gop_votes = 0, total_dem_votes = 0, total_votes = 0;
    statesGeoJSON.features.forEach(f => {
      const nameKey = Object.keys(f.properties).find(key => key.toLowerCase().includes('name')) || 'name';
      const stateName = f.properties[nameKey];
      let stateGopVotes = 0, stateDemVotes = 0;
      const stateFP = getStateFP(stateName);
      if (stateFP) {
        countiesGeoJSON.features.forEach(c => {
          if (c.properties.STATEFP === stateFP) {
            const countyFIPS = c.properties.GEOID;
            const stats = countyElectionStats[countyFIPS];
            if (stats) {
              stateGopVotes += stats.bush_votes || 0;
              stateDemVotes += stats.gore_votes || 0;
            }
          }
        });
      }
      const total = stateGopVotes + stateDemVotes;
      if (total > 0) {
        f.properties.votes_gop = stateGopVotes;
        f.properties.votes_dem = stateDemVotes;
        f.properties.reporting = 100;
        if (stateGopVotes > stateDemVotes) {
          ev_bush += f.properties.electoral_votes || 0;
          f.properties.status = 'GOP Win';
          f.properties.winner = 'Bush';
        } else if (stateDemVotes > stateGopVotes) {
          ev_gore += f.properties.electoral_votes || 0;
          f.properties.status = 'DEM Win';
          f.properties.winner = 'Gore';
        } else {
          f.properties.status = 'Uncalled';
        }
        total_gop_votes += stateGopVotes;
        total_dem_votes += stateDemVotes;
        total_votes += total;
      } else {
        f.properties.status = 'Uncalled';
      }
    });

    const totalVotes = total_gop_votes + total_dem_votes;
    const bushPercentage = totalVotes > 0 ? (total_gop_votes / totalVotes * 100).toFixed(1) : 0;
    const gorePercentage = totalVotes > 0 ? (total_dem_votes / totalVotes * 100).toFixed(1) : 0;
    const total_registered = 105405100;
    const perc_gop = ((total_gop_votes / total_registered) * 100).toFixed(1);
    const perc_dem = ((total_dem_votes / total_registered) * 100).toFixed(1);
    const reporting_pct = ((total_votes / total_registered) * 100).toFixed(1);

    document.getElementById('bush-votes').textContent = ev_bush;
    document.getElementById('gore-votes').textContent = ev_gore;
    document.getElementById('bush-bar').style.width = `${bushPercentage}%`;
    document.getElementById('gore-bar').style.width = `${gorePercentage}%`;
    document.getElementById('bush-label').textContent = `${bushPercentage}%`;
    document.getElementById('gore-label').textContent = `${gorePercentage}%`;
    document.getElementById('bush-pv').textContent = `Bush: ${total_gop_votes.toLocaleString()} (${perc_gop}%)`;
    document.getElementById('gore-pv').textContent = `Gore: ${total_dem_votes.toLocaleString()} (${perc_dem}%)`;
    document.getElementById('reporting').textContent = `Reporting: ${reporting_pct}%`;

    // Needle projection
    const bushProj = Math.min(ev_bush / 270, 1);
    const goreProj = Math.min(ev_gore / 270, 1);
    let projBush, projGore;
    if (ev_bush >= 270 && ev_bush > ev_gore) { projBush = 1; projGore = 0; }
    else if (ev_gore >= 270 && ev_gore > ev_bush) { projBush = 0; projGore = 1; }
    else if (bushProj + goreProj > 0) {
      projBush = bushProj / (bushProj + goreProj);
      projGore = goreProj / (bushProj + goreProj);
    } else { projBush = projGore = 0.5; }
    let angle;
    if (projBush === 1) angle = -90;
    else if (projGore === 1) angle = 90;
    else angle = -90 + 180 * projGore;
    document.getElementById('needle-group').setAttribute('transform', `rotate(${angle},250,154)`);
    document.getElementById('nyt-proj-bush-big').textContent = Math.round(projBush*100) + "%";
    document.getElementById('nyt-proj-gore-big').textContent = Math.round(projGore*100) + "%";
    document.getElementById('needle-check-bush').style.display = (projBush === 1) ? 'block' : 'none';
    document.getElementById('needle-check-gore').style.display = (projGore === 1) ? 'block' : 'none';

    // Enable state hover handlers for the main view
    enableStateHover();

    // State click: show counties, hide hover
    mainMap.on('click', 'states-fill', (e) => {
      const p = e.features[0].properties;
      const nameKey = Object.keys(p).find(key => key.toLowerCase().includes('name')) || 'name';
      const stateName = p[nameKey];
      if (!stateName) return;
      addCountiesLayer(stateName);
      const bounds = getStateBounds(stateName);
      if (bounds) {
        mainMap.fitBounds(bounds, { padding: 40, duration: 1100 });
      } else {
        mainMap.flyTo({ center: e.lngLat, zoom: 6 });
      }
      document.getElementById('header').style.display = 'none';
      document.getElementById('box-out-btn').style.display = 'block';
      disableStateHover();
    });
  });
}

// --- Get bounds for fit ---
function getStateBounds(stateName) {
  const stateFP = getStateFP(stateName);
  if (!stateFP) return null;
  if (!statesGeoJSON || !statesGeoJSON.features) {
    const countyFeatures = countiesGeoJSON.features.filter(f => f.properties.STATEFP === stateFP);
    if (!countyFeatures.length) return null;
    let minLng = 180, minLat = 90, maxLng = -180, maxLat = -90;
    countyFeatures.forEach(f => {
      const coords = f.geometry.type === "Polygon" ? f.geometry.coordinates[0] : f.geometry.coordinates.flat(2);
      coords.forEach(coord => {
        if (Array.isArray(coord) && coord.length >= 2) {
          minLng = Math.min(minLng, coord[0]);
          maxLng = Math.max(maxLng, coord[0]);
          minLat = Math.min(minLat, coord[1]);
          maxLat = Math.max(maxLat, coord[1]);
        }
      });
    });
    if (minLng === 180 || maxLng === -180 || minLat === 90 || maxLat === -90) return null;
    return [[minLng, minLat], [maxLng, maxLat]];
  }
  const stateFeature = statesGeoJSON.features.find(f => {
    const nameKey = Object.keys(f.properties).find(key => key.toLowerCase().includes('name')) || 'name';
    return (f.properties[nameKey] || '').trim().toLowerCase() === stateName.trim().toLowerCase();
  });
  if (!stateFeature) return null;
  let coords = [];
  if (stateFeature.geometry.type === "Polygon") {
    coords = stateFeature.geometry.coordinates[0];
  } else if (stateFeature.geometry.type === "MultiPolygon") {
    coords = stateFeature.geometry.coordinates.flat(2);
  }
  if (!coords.length) return null;
  let minLng = 180, minLat = 90, maxLng = -180, maxLat = -90;
  coords.forEach(coord => {
    if (Array.isArray(coord) && coord.length >= 2) {
      minLng = Math.min(minLng, coord[0]);
      maxLng = Math.max(maxLng, coord[0]);
      minLat = Math.min(minLat, coord[1]);
      maxLat = Math.max(maxLat, coord[1]);
    }
  });
  return [[minLng, minLat], [maxLng, maxLat]];
}

// --- COUNTIES LAYER AND SIDEBAR ---
function addCountiesLayer(stateName) {
  const stateFP = getStateFP(stateName);
  if (!stateFP) return;
  const filtered = {
    ...countiesGeoJSON,
    features: countiesGeoJSON.features.filter(f => f.properties.STATEFP === stateFP)
  };
  filtered.features.forEach(f => {
    const fips = f.properties.GEOID;
    const stats = countyElectionStats[fips];
    if (stats) {
      const total = stats.bush_votes + stats.gore_votes + stats.other_votes;
      const margin = total > 0 ? Math.abs(stats.bush_votes - stats.gore_votes) / total * 100 : 0;
      f.properties.winner = stats.winner;
      f.properties.margin = margin;
    } else {
      f.properties.winner = "Tied";
      f.properties.margin = 0;
    }
  });

  // Remove previous if present
  if (mainMap.getLayer('main-counties-fill')) mainMap.removeLayer('main-counties-fill');
  if (mainMap.getLayer('main-counties-outline')) mainMap.removeLayer('main-counties-outline');
  if (mainMap.getSource('main-counties')) mainMap.removeSource('main-counties');

  if (filtered.features.length > 0) {
    mainMap.addSource('main-counties', { type: 'geojson', data: filtered });
    mainMap.addLayer({
      id: 'main-counties-fill',
      type: 'fill',
      source: 'main-counties',
      paint: {
        'fill-color': [
          'case',
          ['==', ['get', 'winner'], 'Bush'],
          ['interpolate', ['linear'], ['get', 'margin'],
            0, '#f4a6a6',
            10, '#e74c3c',
            20, '#d12c0f'
          ],
          ['==', ['get', 'winner'], 'Gore'],
          ['interpolate', ['linear'], ['get', 'margin'],
            0, '#a6c8f4',
            10, '#3498db',
            20, '#0e47e6'
          ],
          '#b5b5b5'
        ],
        'fill-opacity': 0.85
      }
    });
    mainMap.addLayer({
      id: 'main-counties-outline',
      type: 'line',
      source: 'main-counties',
      paint: { 'line-color': '#ffffff', 'line-width': 0.5 }
    });

    // County popup on hover
    let countyPopup = null;
    mainMap.on('mousemove', 'main-counties-fill', (e) => {
      mainMap.getCanvas().style.cursor = 'pointer';
      const f = e.features[0];
      const geoid = f.properties.GEOID;
      const stats = countyElectionStats[geoid];
      let html = `<strong>${f.properties.NAME} County</strong>`;
      if (stats) {
        html += `<br>Bush: ${stats.bush_votes.toLocaleString()}`;
        html += `<br>Gore: ${stats.gore_votes.toLocaleString()}`;
        if (stats.other_votes > 0) html += `<br>Other: ${stats.other_votes.toLocaleString()}`;
        html += `<br>Winner: <b style="color:${stats.winner==='Bush'?'#e74c3c':'#3498db'}">${stats.winner}${(stats.winner==='Bush'||stats.winner==='Gore')?' '+checkmarkSvg(stats.winner==='Bush'?'#e74c3c':'#3498db',18):''}</b>`;
      } else {
        html += `<br>No data.`;
      }
      if (countyPopup) countyPopup.remove();
      countyPopup = new mapboxgl.Popup({ closeButton: false, closeOnClick: false })
        .setLngLat(e.lngLat)
        .setHTML(html)
        .addTo(mainMap);
    });
    mainMap.on('mouseleave', 'main-counties-fill', () => {
      mainMap.getCanvas().style.cursor = '';
      if (countyPopup) countyPopup.remove();
      countyPopup = null;
    });
  }

  // Sidebar details
  const stateFeature = statesGeoJSON.features.find(f => {
    const nameKey = Object.keys(f.properties).find(key => key.toLowerCase().includes('name')) || 'name';
    return (f.properties[nameKey] || '').trim().toLowerCase() === stateName.trim().toLowerCase();
  });
  const electoralVotes = stateFeature ? stateFeature.properties.electoral_votes : 'N/A';
  const candidateStatsDiv = document.getElementById('candidate-stats');
  candidateStatsDiv.innerHTML = '';

  // State-level stats from counties
  let stateGopVotes = 0, stateDemVotes = 0, stateOtherVotes = 0, stateTotalVotes = 0;
  filtered.features.forEach(c => {
    const countyFIPS = c.properties.GEOID;
    const stats = countyElectionStats[countyFIPS];
    if (stats) {
      stateGopVotes += stats.bush_votes || 0;
      stateDemVotes += stats.gore_votes || 0;
      stateOtherVotes += stats.other_votes || 0;
      stateTotalVotes += stats.bush_votes + stats.gore_votes + stats.other_votes;
    }
  });

  document.getElementById('state-sidebar-title').textContent = `President: ${stateName}`;
  document.getElementById('state-electoral-votes').textContent = `${electoralVotes} electoral votes`;

  if (stateTotalVotes > 0) {
    const bushPct = ((stateGopVotes / stateTotalVotes) * 100).toFixed(1);
    const gorePct = ((stateDemVotes / stateTotalVotes) * 100).toFixed(1);
    const otherPct = ((stateOtherVotes / stateTotalVotes) * 100).toFixed(1);

    candidateStatsDiv.innerHTML = `
      <div>
        <img src="images/George-W-Bush.jpg" alt="Bush" style="width:42px; height:42px; border-radius:50%; border:2.5px solid #e74c3c;">
        <span style="color:#e74c3c;font-weight:900;">Bush: ${bushPct}% (${stateGopVotes.toLocaleString()}) ${(stateGopVotes>stateDemVotes && stateGopVotes>stateOtherVotes)?checkmarkSvg("#e74c3c",18):''}</span>
      </div>
      <div>
        <img src="images/Al_Gore.jpg" alt="Gore" style="width:42px; height:42px; border-radius:50%; border:2.5px solid #3498db;">
        <span style="color:#3498db;font-weight:900;">Gore: ${gorePct}% (${stateDemVotes.toLocaleString()}) ${(stateDemVotes>stateGopVotes && stateDemVotes>stateOtherVotes)?checkmarkSvg("#3498db",18):''}</span>
      </div>
      ${stateOtherVotes>0?`<div>
        <span style="color:#bbb;">Other: ${otherPct}% (${stateOtherVotes.toLocaleString()})</span>
      </div>`:''}
      <div style="width:90%;margin:10px auto;">
        <div class="progress-bar-wrapper" style="height:15px;">
          <div class="progress-bar bush" style="width:${bushPct}%;background:#e74c3c;"></div>
          <div class="progress-bar gore" style="width:${gorePct}%;background:#3498db;position:absolute;right:0;"></div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:11px;">
          <span style="color:#e74c3c;">Bush</span>
          <span style="color:#3498db;">Gore</span>
        </div>
      </div>
      <div style="font-size:16px;font-weight:800;margin:10px 0 0;">
        Winner: 
        ${(stateGopVotes>stateDemVotes && stateGopVotes>stateOtherVotes)?
          `<span style="color:#e74c3c;">Bush ${checkmarkSvg("#e74c3c",18)}</span>`:
          (stateDemVotes>stateGopVotes && stateDemVotes>stateOtherVotes)?
          `<span style="color:#3498db;">Gore ${checkmarkSvg("#3498db",18)}</span>`:
          `<span style="color:#fff;">Tied</span>`}
      </div>
    `;
    document.getElementById('reporting-status').textContent = `Reporting: 100%`;
  } else {
    candidateStatsDiv.textContent = 'No data available';
    document.getElementById('reporting-status').textContent = '';
  }
  document.getElementById('last-updated').textContent = 'Updated: ' + new Date().toLocaleString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true, timeZoneName: 'short' });
  document.getElementById('state-sidebar').style.display = 'block';
}

// --- Remove counties, sidebar, and restore state hover handlers
function removeCountiesLayer() {
  if (mainMap.getLayer('main-counties-fill')) mainMap.removeLayer('main-counties-fill');
  if (mainMap.getLayer('main-counties-outline')) mainMap.removeLayer('main-counties-outline');
  if (mainMap.getSource('main-counties')) mainMap.removeSource('main-counties');
  document.getElementById('state-sidebar').style.display = 'none';
  document.getElementById('header').style.display = 'flex';
  enableStateHover(); // Restore state hover events
}

// --- UI controls for "box out" and closing sidebar
document.getElementById('box-out-btn').onclick = () => {
  removeCountiesLayer();
  mainMap.flyTo({ center: [-98.5795, 39.8283], zoom: 3 });
  document.getElementById('box-out-btn').style.display = 'none';
  document.getElementById('header').style.display = 'flex';
};
document.getElementById('close-sidebar-btn').onclick = () => {
  removeCountiesLayer();
  mainMap.flyTo({ center: [-98.5795, 39.8283], zoom: 3 });
  document.getElementById('box-out-btn').style.display = 'none';
  document.getElementById('header').style.display = 'flex';
};
</script>
