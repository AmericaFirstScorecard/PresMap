<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>2000 Live Election Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Mapbox GL JS -->
  <script src="https://api.mapbox.com/mapbox-gl-js/v2.13.0/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.13.0/mapbox-gl.css" rel="stylesheet" />
  <!-- PapaParse for CSV parsing -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <style>
    html, body { height: 100%; margin: 0; padding: 0; font-family: 'Inter', Arial, sans-serif; background: #11161b;}
    #header {
      background: #222; color: white; padding: 15px 20px;
      z-index: 1000; display: flex; flex-direction: column; align-items: center;
      position: relative;
    }
    .progress-container { width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 10px; }
    .progress-bar-wrapper {
      display: flex; align-items: center; position: relative;
      width: 100%; height: 20px; background: #444; border-radius: 10px; overflow: hidden;
    }
    .progress-bar { height: 100%; transition: width 0.5s ease-in-out; }
    .progress-bar.bush { background: #e74c3c; }
    .progress-bar.gore { background: #3498db; position: absolute; right: 0; }
    .vote-label {
      position: absolute; color: white; font-size: 12px;
      font-weight: bold; text-shadow: 0 0 2px rgba(0,0,0,0.7);
    }
    .threshold-marker {
      position: absolute; left: calc(270 / 538 * 100%);
      width: 2px; height: 100%; background: #fff; z-index: 10;
    }
    .threshold-label {
      position: relative; left: calc(270 / 538 * 100% - 20px);
      color: white; font-size: 12px; font-weight: bold;
      margin-bottom: 5px; text-align: left;
    }
    .candidate-labels {
      display: flex; justify-content: space-between;
      font-size: 14px; font-weight: bold; margin-bottom: 5px;
    }
    .stat-box { margin-top: 5px; font-size: 12px; }
    .candidate-image {
      width: 70px; height: 70px; border-radius: 50%; object-fit: cover;
    }
    .progress-bar-container {
      display: flex; align-items: center; width: 100%; gap: 15px;
    }
    .candidate-stats {
      display: flex; justify-content: space-between;
      width: 100%; max-width: 800px; font-size: 12px;
    }
    .candidate-stat-left, .candidate-stat-right {
      text-align: center; width: 150px;
    }
    .title {
      font-size: 30px; font-weight: bold; margin-bottom: 10px;
    }
    #map {
      position: relative;
      width: 100vw;
      height: 70vh;
      min-height: 400px;
      max-height: 80vh;
      z-index: 1;
      background: #ccc;
    }
    #state-sidebar {
      display: none; position: fixed; top: 0; right: 0; width: 420px; height: 100%;
      background: #222; color: white; padding: 0 0 40px 0; z-index: 1000; overflow-y: auto;
      box-shadow: -2px 0 30px #000b; border-left: 4px solid #e74c3c;
      transition: box-shadow 0.2s;
    }
    .sidebar-content {
      padding: 30px 32px 20px 32px;
      background: #222;
    }
    #state-sidebar .projected-winner {
      display: block;
      background: #e74c3c;
      color: #fff;
      font-size: 1.1rem;
      font-weight: bold;
      letter-spacing: 1px;
      padding: 7px 18px;
      border-radius: 8px 8px 0 0;
      margin-bottom: 13px;
      text-transform: uppercase;
      box-shadow: 0 2px 12px #000a;
      width: max-content;
    }
    #state-sidebar h2 {
      margin: 0 0 10px; font-size: 2.0rem; font-weight: 900;
    }
    .ev-summary {
      margin-bottom: 16px;
      font-size: 1.17rem;
      font-weight: 700;
      background: #2d2d2d;
      padding: 6px 14px;
      border-radius: 6px;
      display: inline-block;
    }
    .ev-summary span {
      font-weight: 900;
      font-size: 1.2rem;
    }
    .cand-table {
      width: 100%;
      margin-top: 12px;
      border-spacing: 0;
      background: #232323;
      border-radius: 12px;
      box-shadow: 0 1px 10px #0004;
      overflow: hidden;
    }
    .cand-row {
      display: flex;
      align-items: center;
      padding: 14px 0 14px 0;
      border-bottom: 1px solid #313131;
      position: relative;
    }
    .cand-row:last-child {
      border-bottom: none;
    }
    .cand-photo {
      width: 46px; height: 46px; border-radius: 50%;
      object-fit: cover; margin-left: 12px; margin-right: 18px; border: 2px solid #191d22;
      background: #eee;
    }
    .cand-photo.unknown { filter: grayscale(1); background: #999;}
    .cand-main {
      flex: 1; display: flex; flex-direction: column; gap: 2px;
    }
    .cand-main span {
      font-size: 1.12rem;
      font-weight: 800;
      letter-spacing: 0.4px;
      color: #fff;
    }
    .cand-party {
      font-size: 0.97rem;
      color: #bbb;
      font-weight: 400;
      margin-top: 1px;
    }
    .cand-bar-wrap {
      width: 100%; height: 16px; background: #2b2e34;
      border-radius: 8px; margin-top: 6px; position: relative;
      margin-right: 18px;
    }
    .cand-bar {
      height: 100%; border-radius: 8px;
      transition: width 0.7s cubic-bezier(.6,0,.2,1);
      background: linear-gradient(90deg, #e74c3c 0%, #e74c3c 100%);
    }
    .cand-bar.dem { background: linear-gradient(90deg, #3498db 0%, #3498db 100%);}
    .cand-bar.green { background: linear-gradient(90deg, #9be949 0%, #4f8c2d 100%);}
    .cand-bar.lib { background: linear-gradient(90deg, #ffb51e 0%, #ff8c00 100%);}
    .cand-bar.other { background: linear-gradient(90deg, #bbb 0%, #888 100%);}
    .cand-results {
      min-width: 130px;
      text-align: right;
      margin-right: 16px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }
    .cand-results .cand-percent {
      font-size: 1.17rem; font-weight: 900; color: #fff; margin-bottom: 1px;
    }
    .cand-results .cand-votes {
      font-size: 1.08rem; font-weight: 700; color: #fff;
    }
    .cand-results .cand-check {
      color: #fff; margin-left: 7px; font-size: 1.18rem; vertical-align: middle;
    }
    .cand-results .cand-lead {
      font-size: 0.93rem; color: #d3d3d3; margin-top: 3px; font-weight: 400;
    }
    .cand-table .cand-row:not(:first-child):hover {
      background: #232323b3;
    }
    .sidebar-bottom {
      padding: 10px 32px 22px 32px;
      background: #232323;
      border-top: 1.5px solid #333;
      display: flex; flex-direction: column; align-items: flex-start;
    }
    .sidebar-bottom .reporting-bar-label {
      color: #bbb; font-size: 1.07rem; font-weight: 700; margin-bottom: 3px; margin-top: 5px;
    }
    .reporting-bar-wrap {
      width: 100%; height: 14px; background: #333;
      border-radius: 6px; overflow: hidden;
      margin-bottom: 7px;
    }
    .reporting-bar {
      height: 100%; background: linear-gradient(90deg, #91e63b, #257f1b);
      transition: width 0.6s cubic-bezier(.6,0,.2,1);
    }
    .sidebar-bottom a {
      color: #fff; font-weight: bold; font-size: 1.08rem;
      text-decoration: underline; margin-top: 7px;
    }
    .sidebar-bottom a:hover { color: #bbb; }
    @media (max-width: 800px) {
      #state-sidebar { width: 100vw; border-left: none; }
      .sidebar-content, .sidebar-bottom { padding: 24px 10px 12px 10px;}
    }
    #box-out-btn {
      display: none;
      position: absolute;
      top: 20px;
      right: 32px;
      z-index: 1100;
      background: #23272e;
      color: #fff;
      padding: 10px 22px;
      border: none;
      border-radius: 10px;
      font-size: 17px;
      font-weight: 800;
      box-shadow: 0 3px 18px #0008;
      cursor: pointer;
      transition: background 0.2s;
    }
    #box-out-btn:hover {
      background: #303540;
    }
  </style>
</head>
<body>
<div id="header">
  <div class="title">2000 Live Election Map</div>
  <div class="progress-container">
    <div class="candidate-labels">
      <span>Bush: <span id="bush-votes">0</span> EV</span>
      <span>Gore: <span id="gore-votes">0</span> EV</span>
    </div>
    <div class="progress-bar-container">
      <img src="images/George-W-Bush.jpg" alt="Bush" class="candidate-image">
      <div style="width: 100%; position: relative;">
        <div class="threshold-label">270 to Win</div>
        <div class="progress-bar-wrapper">
          <div class="threshold-marker"></div>
          <div class="progress-bar bush" id="bush-bar" style="width: 0%"></div>
          <div class="progress-bar gore" id="gore-bar" style="width: 0%"></div>
          <div class="vote-label" id="bush-label" style="left: 5px">0%</div>
          <div class="vote-label" id="gore-label" style="right: 5px">0%</div>
        </div>
      </div>
      <img src="images/Al_Gore.jpg" alt="Gore" class="candidate-image">
    </div>
  </div>
  <div class="candidate-stats">
    <div class="candidate-stat-left" id="bush-pv">Bush: <span id="bush-ev">0</span> EV</div>
    <div class="stat-box" id="reporting">Reporting: 0%</div>
    <div class="candidate-stat-right" id="gore-pv">Gore: <span id="gore-ev">0</span> EV</div>
  </div>
</div>
<div id="map"></div>
<button id="box-out-btn">Box Out</button>
<div id="state-sidebar">
  <div class="sidebar-content" id="sidebar-content"></div>
  <div class="sidebar-bottom" id="sidebar-bottom"></div>
</div>
<div id="projection-ticker-wrap">
  <div class="nyt-projection-title">Chance of Winning <span style="font-weight:400;">(Projection)</span></div>
  <div class="needle-svg-wrap" style="position: relative;">
    <img src="images/George-W-Bush.jpg" class="needle-img-candidate needle-img-bush" id="needle-img-bush" alt="Bush"/>
    <img src="images/Al_Gore.jpg" class="needle-img-candidate needle-img-gore" id="needle-img-gore" alt="Gore"/>
    <svg class="needle-checkmark" id="needle-check-bush" viewBox="0 0 53 53"><circle cx="26.5" cy="26.5" r="25" fill="#e74c3c"/><path d="M16 27.5l7 7 14-14" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round"/></svg>
    <svg class="needle-checkmark gore" id="needle-check-gore" viewBox="0 0 53 53"><circle cx="26.5" cy="26.5" r="25" fill="#3498db"/><path d="M16 27.5l7 7 14-14" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round"/></svg>
    <svg id="nyt-needle-svg" width="500" height="270" viewBox="0 0 500 270">
      <path id="arc-vl-bush" class="arc-very-likely-bush" fill="none" stroke-width="20"/>
      <path id="arc-l-bush" class="arc-likely-bush" fill="none" stroke-width="20"/>
      <path id="arc-le-bush" class="arc-lean-bush" fill="none" stroke-width="20"/>
      <path id="arc-tossup" class="arc-tossup" fill="none" stroke-width="20"/>
      <path id="arc-le-gore" class="arc-lean-gore" fill="none" stroke-width="20"/>
      <path id="arc-l-gore" class="arc-likely-gore" fill="none" stroke-width="20"/>
      <path id="arc-vl-gore" class="arc-very-likely-gore" fill="none" stroke-width="20"/>
      <g id="arc-labels-group"></g>
      <g id="needle-group">
        <polygon id="nyt-needle" class="needle-arrow" points="250,64 243,162 257,162"/>
        <circle id="needle-dot" class="needle-dot" cx="250" cy="154" r="16"/>
      </g>
    </svg>
    <div class="needle-candidate-labels">
      <span class="needle-bush-label">Bush</span>
      <span class="proj-big-num bush" id="nyt-proj-bush-big">--%</span>
      <span class="proj-divider">|</span>
      <span class="proj-big-num gore" id="nyt-proj-gore-big">--%</span>
      <span class="needle-gore-label">Gore</span>
    </div>
  </div>
</div>
<script>
// ... same setup code as previous, up to addCountiesLayer() ...
// --snip: for brevity, continue from addCountiesLayer and replace its content: --

function addCountiesLayer(stateName) {
  const stateFP = getStateFP(stateName);
  if (!stateFP) return;
  const filtered = {
    ...countiesGeoJSON,
    features: countiesGeoJSON.features.filter(f => f.properties.STATEFP === stateFP)
  };
  filtered.features.forEach(f => {
    const fips = f.properties.GEOID;
    const stats = countyElectionStats[fips];
    if (stats) {
      const total = stats.bush_votes + stats.gore_votes + stats.other_votes;
      const margin = total > 0 ? Math.abs(stats.bush_votes - stats.gore_votes) / total * 100 : 0;
      f.properties.winner = stats.winner;
      f.properties.margin = margin;
    } else {
      f.properties.winner = "Tied";
      f.properties.margin = 0;
    }
  });

  if (mainMap.getLayer('main-counties-fill')) mainMap.removeLayer('main-counties-fill');
  if (mainMap.getLayer('main-counties-outline')) mainMap.removeLayer('main-counties-outline');
  if (mainMap.getSource('main-counties')) mainMap.removeSource('main-counties');

  if (filtered.features.length > 0) {
    mainMap.addSource('main-counties', { type: 'geojson', data: filtered });
    mainMap.addLayer({
      id: 'main-counties-fill',
      type: 'fill',
      source: 'main-counties',
      paint: {
        'fill-color': [
          'case',
          ['==', ['get', 'winner'], 'Bush'],
          ['interpolate', ['linear'], ['get', 'margin'],
            0, '#f4a6a6',
            10, '#e74c3c',
            20, '#d12c0f'
          ],
          ['==', ['get', 'winner'], 'Gore'],
          ['interpolate', ['linear'], ['get', 'margin'],
            0, '#a6c8f4',
            10, '#3498db',
            20, '#0e47e6'
          ],
          '#b5b5b5'
        ],
        'fill-opacity': 0.85
      }
    });
    mainMap.addLayer({
      id: 'main-counties-outline',
      type: 'line',
      source: 'main-counties',
      paint: { 'line-color': '#ffffff', 'line-width': 0.5 }
    });

    let countyPopup = null;
    mainMap.on('mousemove', 'main-counties-fill', (e) => {
      mainMap.getCanvas().style.cursor = 'pointer';
      const f = e.features[0];
      const geoid = f.properties.GEOID;
      const stats = countyElectionStats[geoid];
      let html = `<strong>${f.properties.NAME} County</strong>`;
      if (stats) {
        html += `<br>Bush: ${stats.bush_votes.toLocaleString()}`;
        html += `<br>Gore: ${stats.gore_votes.toLocaleString()}`;
        if (stats.other_votes > 0) html += `<br>Other: ${stats.other_votes.toLocaleString()}`;
        html += `<br>Winner: <b style="color:${stats.winner==='Bush'?'#e74c3c':'#3498db'}">${stats.winner}${(stats.winner==='Bush'||stats.winner==='Gore')?' '+checkmarkSvg(stats.winner==='Bush'?'#e74c3c':'#3498db',18):''}</b>`;
      } else {
        html += `<br>No data.`;
      }
      if (countyPopup) countyPopup.remove();
      countyPopup = new mapboxgl.Popup({ closeButton: false, closeOnClick: false })
        .setLngLat(e.lngLat)
        .setHTML(html)
        .addTo(mainMap);
    });
    mainMap.on('mouseleave', 'main-counties-fill', () => {
      mainMap.getCanvas().style.cursor = '';
      if (countyPopup) countyPopup.remove();
      countyPopup = null;
    });
  }

  // ----- Sidebar NYT style -----
  const stateFeature = statesGeoJSON.features.find(f => {
    const nameKey = Object.keys(f.properties).find(key => key.toLowerCase().includes('name')) || 'name';
    return (f.properties[nameKey] || '').trim().toLowerCase() === stateName.trim().toLowerCase();
  });
  const electoralVotes = stateFeature ? stateFeature.properties.electoral_votes : 'N/A';

  // Gather candidate data for this state
  let stateGopVotes = 0, stateDemVotes = 0, stateOtherVotes = 0, stateTotalVotes = 0;
  filtered.features.forEach(c => {
    const countyFIPS = c.properties.GEOID;
    const stats = countyElectionStats[countyFIPS];
    if (stats) {
      stateGopVotes += stats.bush_votes || 0;
      stateDemVotes += stats.gore_votes || 0;
      stateOtherVotes += stats.other_votes || 0;
      stateTotalVotes += stats.bush_votes + stats.gore_votes + stats.other_votes;
    }
  });

  // Candidates for this state
  const candidates = [
    {
      name: "George W. Bush",
      party: "Republican",
      partyKey: "gop",
      votes: stateGopVotes,
      percent: stateTotalVotes ? (stateGopVotes / stateTotalVotes * 100) : 0,
      img: "images/George-W-Bush.jpg",
      color: "#e74c3c"
    },
    {
      name: "Al Gore",
      party: "Democratic",
      partyKey: "dem",
      votes: stateDemVotes,
      percent: stateTotalVotes ? (stateDemVotes / stateTotalVotes * 100) : 0,
      img: "images/Al_Gore.jpg",
      color: "#3498db"
    },
    {
      name: "Other",
      party: "Other",
      partyKey: "other",
      votes: stateOtherVotes,
      percent: stateTotalVotes ? (stateOtherVotes / stateTotalVotes * 100) : 0,
      img: "images/question.png", // Use your own question mark image or a placeholder
      color: "#bbb"
    }
  ];
  // Sort by votes descending
  candidates.sort((a, b) => b.votes - a.votes);

  // Compute lead info
  candidates.forEach((cand, i) => {
    if (i === 0 && candidates[1]) {
      cand.lead = cand.votes - candidates[1].votes;
    }
  });

  // Find winner
  let winner = candidates[0];
  if (candidates.filter(c=>c.votes>0).length < 2) winner = null;

  // Calculate reporting percent
  const reportingPct = stateTotalVotes > 0 ? Math.min(100, ((stateTotalVotes / (stateFeature?.properties?.total_votes || stateTotalVotes)) * 100)).toFixed(1) : "0.0";

  // --- Sidebar HTML ---
  const sidebarContent = `
    <span class="projected-winner" style="background:${winner?winner.color:'#e74c3c'};">${winner?'Projected Winner':''}</span>
    <h2>President: ${stateName}</h2>
    <div class="ev-summary">
      <span>${electoralVotes}</span> electoral votes
      <span style="margin-left:12px;">${winner?winner.name:''} ${winner?'<b>'+checkmarkSvg(winner.color, 18)+'</b>':''}</span>
    </div>
    <div class="cand-table">
      ${candidates.map((cand,i)=>`
        <div class="cand-row">
          <img class="cand-photo${cand.partyKey==='other'?' unknown':''}" src="${cand.img}" alt="${cand.name}" />
          <div class="cand-main">
            <span>${cand.name}</span>
            <span class="cand-party">${cand.party}</span>
            <div class="cand-bar-wrap">
              <div class="cand-bar ${cand.partyKey}" style="width:${stateTotalVotes ? (cand.votes / (candidates[0].votes||1) * 100) : 0}%;background:${cand.color}"></div>
            </div>
          </div>
          <div class="cand-results">
            <div class="cand-percent">${cand.percent.toFixed(1)}%</div>
            <div class="cand-votes">${cand.votes.toLocaleString()}</div>
            ${winner&&cand===winner?'<span class="cand-check">'+checkmarkSvg(cand.color, 20)+'</span>':''}
            ${cand.lead && cand.lead>0?`<div class="cand-lead">${cand.lead.toLocaleString()} ahead</div>`:""}
          </div>
        </div>
      `).join('')}
    </div>
  `;
  document.getElementById('sidebar-content').innerHTML = sidebarContent;

  document.getElementById('sidebar-bottom').innerHTML = `
    <div class="reporting-bar-label">Est. <b>${reportingPct}%</b> reporting</div>
    <div class="reporting-bar-wrap">
      <div class="reporting-bar" style="width:${reportingPct}%;"></div>
    </div>
    <a href="#" onclick="alert('Not implemented');return false;">See county results &rarr;</a>
    <div style="font-size:0.9rem;color:#777;margin-top:6px;">Updated: ${new Date().toLocaleString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true, timeZoneName: 'short' })}</div>
  `;

  // Sidebar overlay
  document.getElementById('state-sidebar').style.display = 'block';
  document.getElementById('header').style.display = 'none';
  document.getElementById('projection-ticker-wrap').style.display = 'none';
  document.getElementById('box-out-btn').style.display = 'block';
}

function removeCountiesLayer() {
  if (mainMap.getLayer('main-counties-fill')) mainMap.removeLayer('main-counties-fill');
  if (mainMap.getLayer('main-counties-outline')) mainMap.removeLayer('main-counties-outline');
  if (mainMap.getSource('main-counties')) mainMap.removeSource('main-counties');
  document.getElementById('state-sidebar').style.display = 'none';
  document.getElementById('header').style.display = 'flex';
  document.getElementById('projection-ticker-wrap').style.display = 'flex';
  enableStateHover();
}
document.getElementById('box-out-btn').onclick = () => {
  removeCountiesLayer();
  mainMap.flyTo({ center: [-98.5795, 39.8283], zoom: 3 });
  document.getElementById('box-out-btn').style.display = 'none';
  document.getElementById('header').style.display = 'flex';
  document.getElementById('projection-ticker-wrap').style.display = 'flex';
};
</script>
</body>
</html>
