<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2000 Live Election Map</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://api.mapbox.com/mapbox-gl-js/v2.9.1/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.9.1/mapbox-gl.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
</head>
<body>
  <div id="header">
    <div class="title">2000 Live Election Map</div>
    <div class="progress-container">
      <div class="candidate-labels">
        <div class="candidate-stat-left">
          <img src="images/George-W-Bush.jpg" alt="Bush" class="candidate-image">
          <div>Bush: <span id="bush-votes">0</span> EV</div>
        </div>
        <div class="candidate-stat-right">
          <img src="images/Al_Gore.jpg" alt="Gore" class="candidate-image">
          <div>Gore: <span id="gore-votes">0</span> EV</div>
        </div>
      </div>
      <div class="progress-bar-container">
        <div class="progress-bar-wrapper">
          <div class="progress-bar bush" id="bush-bar" style="width: 0%"></div>
          <div class="progress-bar gore" id="gore-bar" style="width: 0%"></div>
          <span class="vote-label" id="bush-label" style="left: 10px;">0%</span>
          <span class="vote-label" id="gore-label" style="right: 10px;">0%</span>
          <div class="threshold-marker"></div>
        </div>
      </div>
      <div class="threshold-label">270 to Win</div>
      <div class="stat-box" id="reporting">Reporting: 0%</div>
    </div>
  </div>

  <div id="map"></div>

  <div id="state-sidebar">
    <button id="close-sidebar-btn">Close</button>
    <h2 id="state-sidebar-title">President: State</h2>
    <p id="state-electoral-votes">0 electoral votes</p>
    <div class="separator"></div>
    <div id="candidate-stats"></div>
    <div class="separator"></div>
    <div class="reporting-bar">
      <div class="reporting-fill" id="reporting-fill" style="width: 0%"></div>
    </div>
    <p id="reporting-status">Reporting: 0%</p>
    <p id="last-updated">Updated: --</p>
  </div>

  <button id="box-out-btn">Box Out</button>

  <div id="projection-ticker-wrap">
    <h2 class="nyt-projection-title">Chance of Winning (Projection)</h2>
    <div class="needle-svg-wrap">
      <svg viewBox="0 0 500 308">
        <path id="arc-vl-bush" class="arc-very-likely-bush" stroke-width="20" fill="none"/>
        <path id="arc-l-bush" class="arc-likely-bush" stroke-width="20" fill="none"/>
        <path id="arc-le-bush" class="arc-lean-bush" stroke-width="20" fill="none"/>
        <path id="arc-tossup" class="arc-tossup" stroke-width="20" fill="none"/>
        <path id="arc-le-gore" class="arc-lean-gore" stroke-width="20" fill="none"/>
        <path id="arc-l-gore" class="arc-likely-gore" stroke-width="20" fill="none"/>
        <path id="arc-vl-gore" class="arc-very-likely-gore" stroke-width="20" fill="none"/>
        <text x="125" y="154" class="arc-label">Very likely Bush</text>
        <text x="175" y="84" class="arc-label">Likely Bush</text>
        <text x="225" y="44" class="arc-label">Lean Bush</text>
        <text x="250" y="34" class="arc-label-center">Tossup</text>
        <text x="275" y="44" class="arc-label">Lean Gore</text>
        <text x="325" y="84" class="arc-label">Likely Gore</text>
        <text x="375" y="154" class="arc-label">Very likely Gore</text>
        <g id="needle-group">
          <path class="needle-arrow" d="M 250 154 L 250 44 V 34 L 245 44 H 255 L 250 34 V 44 Z"/>
          <circle class="needle-dot" cx="250" cy="154" r="6"/>
        </g>
      </svg>
      <img src="images/George-W-Bush.jpg" alt="Bush" class="needle-img-candidate needle-img-bush">
      <img src="images/Al_Gore.jpg" alt="Gore" class="needle-img-candidate needle-img-gore">
      <img src="images/checkmark.png" alt="Bush Check" class="needle-checkmark" id="needle-check-bush">
      <img src="images/checkmark.png" alt="Gore Check" class="needle-checkmark gore" id="needle-check-gore">
    </div>
    <div class="needle-candidate-labels">
      <span class="needle-bush-label">Bush</span>
      <span class="needle-gore-label">Gore</span>
    </div>
    <div class="nyt-prob-row">
      <span class="proj-big-num bush" id="nyt-proj-bush-big">--%</span>
      <span class="proj-divider">|</span>
      <span class="proj-big-num gore" id="nyt-proj-gore-big">--%</span>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
