<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>2000 Live Election Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.13.0/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.13.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' fill='none'/></svg>">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Inter', Arial, sans-serif;
            background: #1a1f26;
            color: #fff;
            letter-spacing: 0.2px;
        }
        #header {
            background: linear-gradient(to bottom, #2a2f38, #222);
            padding: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .progress-container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .candidate-labels {
            display: flex;
            justify-content: space-between;
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .progress-bar-container {
            display: flex;
            align-items: center;
            width: 100%;
            gap: 20px;
        }
        .candidate-image {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        .progress-bar-outer {
            width: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .threshold-label {
            margin-bottom: 4px;
            font-size: 15px;
            font-weight: 800;
            color: #fff;
            z-index: 5;
            text-shadow: 0 0 5px #222;
            pointer-events: none;
            text-align: center;
            width: 100%;
        }
        .progress-bar-wrapper {
            display: flex;
            width: 100%;
            height: 24px;
            background: #3a404a;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }
        .progress-bar {
            height: 100%;
            position: relative;
            display: flex;
            align-items: center;
            transition: width 0.6s ease;
        }
        .progress-bar.bush {
            background: linear-gradient(to right, #e74c3c, #c0392b);
            border-radius: 12px 0 0 12px;
            order: 0;
        }
        .progress-bar.gore {
            background: linear-gradient(to right, #3498db, #2980b9);
            border-radius: 0 12px 12px 0;
            order: 1;
        }
        .vote-label {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            text-shadow: 0 0 2px rgba(0,0,0,0.7);
            z-index: 2;
            white-space: nowrap;
            pointer-events: none;
        }
        .vote-label.left {
            left: 12px;
            text-align: left;
        }
        .vote-label.right {
            right: 12px;
            text-align: right;
        }
        .threshold-marker {
            position: absolute;
            left: calc(270 / 538 * 100%);
            width: 2px;
            height: 100%;
            background: #fff;
            z-index: 10;
        }
        .candidate-stats {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 900px;
            font-size: 13px;
        }
        .title {
            font-size: 32px;
            font-weight: 900;
            text-shadow: 0 1px 4px rgba(0,0,0,0.2);
            margin-bottom: 12px;
        }
        .last-updated {
            font-size: 12px;
            color: #bbb;
            text-align: center;
        }
        @media (max-width: 700px) {
            .title { font-size: 24px; }
            .candidate-image { width: 60px; height: 60px; }
            .candidate-stats { font-size: 12px; flex-direction: column; align-items: center; gap: 10px; }
            .progress-bar-wrapper { height: 18px; }
        }
        #map {
            width: 100vw;
            height: 65vh;
            min-height: 400px;
            max-height: 75vh;
            z-index: 1;
            background: #2a2f38;
            border: 1px solid #333;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        #state-sidebar {
            display: none;
            position: fixed;
            top: 0;
            right: 0;
            width: 340px;
            height: 100%;
            background: #222;
            color: #fff;
            padding: 24px;
            z-index: 1000;
            overflow-y: auto;
            box-shadow: -4px 0 12px rgba(0,0,0,0.4);
            border-radius: 8px 0 0 8px;
            transform: translateX(100%);
            transition: transform 0.3s ease;
        }
        #state-sidebar.active {
            display: block;
            transform: translateX(0);
        }
        #close-sidebar-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            background: #2a2f38;
            color: #fff;
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        #close-sidebar-btn:hover {
            background: #e74c3c;
            transform: scale(1.05);
        }
        .candidate-row {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 12px 0;
        }
        .candidate-image-small {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 8px;
        }
        .bar-graph {
            width: 100%;
            height: 20px;
            background: #3a404a;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }
        .bar-fill {
            height: 100%;
            transition: width 0.6s ease;
        }
        .bar-fill.bush {
            background: #e74c3c;
        }
        .bar-fill.gore {
            background: #3498db;
        }
        .bar-fill.other {
            background: #bbb;
        }
        .candidate-details {
            margin-top: 8px;
            text-align: center;
            font-size: 14px;
            font-weight: 400;
        }
        .reporting-bar {
            width: 100%;
            height: 20px;
            background: #3a404a;
            border-radius: 10px;
            overflow: hidden;
            margin: 12px 0;
        }
        .reporting-fill {
            height: 100%;
            background: #4CAF50;
            transition: width 0.6s ease;
        }
        #county-mode-btn {
            position: absolute;
            top: 20px;
            right: 32px;
            z-index: 1100;
            background: #2a2f38;
            color: #fff;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            box-shadow: 0 3px 12px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            display: block;
        }
        #county-mode-btn:hover {
            background: #3498db;
            transform: scale(1.05);
        }
        /* ---- Upgraded Election Gauge ("projection-ticker-wrap") ---- */
        #projection-ticker-wrap {
            width: 100%;
            background: #191d22;
            padding: 48px 0 32px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 2;
            min-height: 390px;
            border-top: 2px solid #303540;
        }
        .nyt-projection-title {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 18px;
            letter-spacing: 0.1px;
            text-align: center;
            text-shadow: 0 0 8px #222;
        }
        .needle-svg-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            width: 100%;
            max-width: 540px;
            min-height: 270px;
        }
        .needle-candidate-wrap {
            position: absolute;
            top: 60px;
            width: 48px;
            height: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 20;
        }
        .needle-candidate-wrap.bush {
            left: 12px;
        }
        .needle-candidate-wrap.gore {
            right: 12px;
        }
        .needle-img-candidate {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2.5px solid #fff;
            background: #191d22;
            object-fit: cover;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .needle-checkmark {
            margin-top: 3px;
            width: 28px;
            height: 28px;
            display: none;
            z-index: 20;
        }
        .needle-checkmark.gore {
            /* nothing, just different color */
        }
        .arc {
            stroke-linecap: round;
        }
        .arc-vl-bush { stroke: #c0392b; }
        .arc-l-bush { stroke: #e74c3c; }
        .arc-le-bush { stroke: #f7a69a; }
        .arc-tossup { stroke: #bbbbbb; }
        .arc-le-gore { stroke: #97bbed; }
        .arc-l-gore { stroke: #3498db; }
        .arc-vl-gore { stroke: #215180; }
        #nyt-needle-svg {
            display: block;
            margin: 0 auto;
            width: 100%;
            max-width: 500px;
            height: 260px;
            background: none;
            z-index: 5;
            overflow: visible;
            position: relative;
        }
        .arc-label {
            font-size: 13px;
            fill: #bbb;
            text-anchor: middle;
            alignment-baseline: middle;
            font-weight: 600;
            pointer-events: none;
            opacity: 0.85;
        }
        .arc-label-center {
            font-weight: 900;
            fill: #fff;
            font-size: 16px;
        }
        .needle-arrow {
            fill: #777;
            stroke: #222;
            stroke-width: 1;
        }
        #needle-dot {
            fill: #fff;
            stroke: #888;
            stroke-width: 3;
        }
        .needle-candidate-labels {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: baseline;
            gap: 10px;
            margin-top: 6px;
            font-size: 17px;
            font-weight: 600;
            color: #eee;
            width: 100%;
            max-width: 370px;
        }
        .needle-bush-label, .needle-gore-label {
            font-size: 17px;
            font-weight: 900;
            padding: 0 6px;
        }
        .needle-bush-label { color: #e74c3c; }
        .needle-gore-label { color: #3498db; }
        .proj-big-num {
            font-size: 24px;
            font-weight: 900;
            min-width: 48px;
            display: inline-block;
            text-align: center;
        }
        .proj-big-num.bush { color: #e74c3c; }
        .proj-big-num.gore { color: #3498db; }
        .proj-divider {
            font-size: 19px;
            font-weight: 400;
            color: #bbb;
            padding: 0 10px;
            opacity: 0.7;
        }
        @media (max-width: 700px) {
            #projection-ticker-wrap { min-height: 310px; padding: 28px 0 18px 0; }
            .nyt-projection-title { font-size: 16px; margin-bottom: 10px; }
            .needle-candidate-wrap { width: 32px; height: 60px; top: 34px; }
            .needle-candidate-wrap.bush { left: 2px; }
            .needle-candidate-wrap.gore { right: 2px; }
            .needle-img-candidate { width: 32px; height: 32px; }
            .needle-checkmark { width: 17px; height: 17px; }
            #nyt-needle-svg { max-width: 99vw; height: 120px; }
            .needle-candidate-labels { font-size: 13px; max-width: 98vw; gap: 2px; }
            .proj-big-num { font-size: 14px; min-width: 22px; }
        }
    </style>
</head>
<body>
    <div id="header">
        <div class="title">2000 Live Election Map</div>
        <div class="progress-container">
            <div class="candidate-labels">

    <div id="projection-ticker-wrap">

                    <circle cx="14" cy="14" r="13" fill="#3498db"/>

                <path id="arc-le-gore" class="arc arc-le-gore" fill="none" stroke-width="20"/>
                <path id="arc-l-gore" class="arc arc-l-gore" fill="none" stroke-width="20"/>

                <g id="needle-group">
                    <polygon class="needle-arrow" points="250,64 243,64 243,162 257,162 257,64"/>

    <script>
        mapboxgl.accessToken = 'pk.eyJ1IjoiNW00Y2s3NyIsImEiOiJjbWI4eXFqeDkwbzY1MmpwcDFzZDIwMmVqIn0.6JGe7JWhk28z5D3TLIJQwg';
        const STATE_CSV_BASE_URL = 'https://docs.google.com/spreadsheets/d/10zbHap425MtnS4jgsELt__DhtEQbXI8GlnD-6vkB4yg/export?format=csv';
        const COUNTY_CSV_BASE_URL = 'https://docs.google.com/spreadsheets/d/1edopYcOoeeom30K3WsCmzVwvJ8rHcdYH7xB7B7QCQBI/export?format=csv';

        let countiesGeoJSON = null;
        let countyElectionStats = {};
        let statesGeoJSON = null;
        let stateStats = {};
        let mainMap = null;
        let statePopup = null;
        let countyPopup = null;
        let stateHoverHandlers = { mousemove: null, mouseleave: null };
        let countyHoverHandlers = { mousemove: null, mouseleave: null };
        let currentState = null;
        let isCountyMode = false;
        let lastRefreshTime = 'Unknown';

        const stateNameToFips = {
            "alabama": "01", "alaska": "02", "arizona": "04", "arkansas": "05", "california": "06",
            "colorado": "08", "connecticut": "09", "delaware": "10", "florida": "12", "georgia": "13",
            "hawaii": "15", "idaho": "16", "illinois": "17", "indiana": "18", "iowa": "19",
            "kansas": "20", "kentucky": "21", "louisiana": "22", "maine": "23", "maryland": "24",
            "massachusetts": "25", "michigan": "26", "minnesota": "27", "mississippi": "28", "missouri": "29",
            "montana": "30", "nebraska": "31", "nevada": "32", "new hampshire": "33", "new jersey": "34",
            "new mexico": "35", "new york": "36", "north carolina": "37", "north dakota": "38", "ohio": "39",
            "oklahoma": "40", "oregon": "41", "pennsylvania": "42", "rhode island": "44", "south carolina": "45",
            "south dakota": "46", "tennessee": "47", "texas": "48", "utah": "49", "vermont": "50",
            "virginia": "51", "washington": "53", "west virginia": "54", "wisconsin": "55", "wyoming": "56",
            "district of columbia": "11", "puerto rico": "72"
        };
        const stateFipsMap = { ...stateNameToFips };

        function showMapError(message) {
            const mapDiv = document.getElementById('map');
            const errorDiv = document.createElement('div');
            errorDiv.style.cssText = 'color: red; padding: 20px; text-align: center; font-size: 14px;';
            errorDiv.textContent = message;
            mapDiv.innerHTML = '';
            mapDiv.appendChild(errorDiv);
        }

        function getColumnKey(row, key) {
            const lowerKey = key.toLowerCase().trim();
            return Object.keys(row).find(k => k.toLowerCase().trim() === lowerKey) || key;
        }

        function populateCountyStatsFromCSV(rows) {
            console.log(`[${new Date().toLocaleString()}] County CSV rows received:`, rows);
            const newCountyStats = {};
            let nationalTotal = 0;
            const processedRows = new Set();

            for (const row of rows) {
                const stateKey = getColumnKey(row, 'state');
                const fipsKey = getColumnKey(row, 'county_fips');
                const partyKey = getColumnKey(row, 'party');
                const votesKey = getColumnKey(row, 'candidatevotes');
                const candidateKey = getColumnKey(row, 'candidate');
                const countyNameKey = getColumnKey(row, 'county_name');

                if (!row[stateKey] || !row[fipsKey] || !row[votesKey]) {
                    console.warn('Skipping row with missing state, FIPS, or votes:', row);
                    continue;
                }

                let fips = (row[fipsKey] || '').toString().trim().padStart(5, "0");
                if (!/^\d{5}$/.test(fips)) {
                    console.warn(`Invalid FIPS code: ${fips}, skipping row`, row);
                    continue;
                }

                let stateName = (row[stateKey] || '').trim().toLowerCase();
                let countyName = (row[countyNameKey] || 'Unknown').trim();
                let party = (row[partyKey] || "").trim().toUpperCase();
                let candidate = (row[candidateKey] || "").trim().toLowerCase();
                let votesRaw = row[votesKey] || "";
                let votes = parseInt(votesRaw.replace(/[,]/g, ''), 10);
                if (isNaN(votes) || votes < 0) {
                    console.warn(`Invalid vote count: ${votesRaw} for FIPS ${fips}, party ${party}, setting to 0`, row);
                    votes = 0;
                }

                const rowId = `${fips}-${candidate}-${party}-${votes}`;
                if (processedRows.has(rowId)) {
                    console.warn(`Duplicate row detected for FIPS ${fips}, candidate ${candidate}, votes ${votes}, skipping`, row);
                    continue;
                }
                processedRows.add(rowId);

                if (!newCountyStats[fips]) {
                    newCountyStats[fips] = {
                        state: stateName,
                        bush_votes: 0,
                        gore_votes: 0,
                        other_votes: 0,
                        winner: "Tied",
                        county_name: countyName,
                        totalvotes: 0
                    };
                }

                if (candidate.includes('bush') || party === "REPUBLICAN") {
                    newCountyStats[fips].bush_votes += votes;
                } else if (candidate.includes('gore') || party === "DEMOCRAT") {
                    newCountyStats[fips].gore_votes += votes;
                } else {
                    newCountyStats[fips].other_votes += votes;
                }

                newCountyStats[fips].totalvotes = newCountyStats[fips].bush_votes + newCountyStats[fips].gore_votes + newCountyStats[fips].other_votes;
                nationalTotal += votes;

                if (stateName === 'alabama' && fips === '01073') {
                    console.log(`[${new Date().toLocaleString()}] Jefferson County (FIPS 01073): Bush=${newCountyStats[fips].bush_votes.toLocaleString()}, Gore=${newCountyStats[fips].gore_votes.toLocaleString()}, Total=${newCountyStats[fips].totalvotes.toLocaleString()}`);
                }
            }

            console.log(`[${new Date().toLocaleString()}] Parsed countyElectionStats: ${Object.keys(newCountyStats).length} counties, national total votes: ${nationalTotal.toLocaleString()}`);
            if (nationalTotal > 120000000) {
                console.warn(`National vote total (${nationalTotal.toLocaleString()}) exceeds expected max (~105M for 2000 election)`);
            } else if (nationalTotal < 90000000) {
                console.warn(`National vote total (${nationalTotal.toLocaleString()}) is below expected min (~100M for 2000 election)`);
            }
            countyElectionStats = newCountyStats;
        }

        function populateStateStatsFromCSV(rows) {
            console.log(`[${new Date().toLocaleString()}] State CSV rows received:`, rows);
            const newStateStats = {};
            for (const row of rows) {
                const stateKey = getColumnKey(row, 'State');
                if (!row[stateKey]) {
                    console.warn('Skipping row with missing state name:', row);
                    continue;
                }
                let stateName = row[stateKey].trim().toLowerCase();

                const statusKey = getColumnKey(row, 'Election status (called, uncalled)');
                const winnerKey = getColumnKey(row, 'Winner');
                const evKey = getColumnKey(row, 'Electoral Votes');
                const reportingKey = getColumnKey(row, 'Reporting %');
                const repCandidateKey = getColumnKey(row, 'Republican Candidate');
                const demCandidateKey = getColumnKey(row, 'Democrat Candidate');
                const otherCandidateKey = getColumnKey(row, 'Other Candidate');

                let status = (row[statusKey] || 'Uncalled').trim();
                const statusLower = status.toLowerCase();
                if (statusLower.includes('called')) {
                    const winner = (row[winnerKey] || '').trim().toLowerCase();
                    if (winner.includes('bush')) status = 'Bush Win';
                    else if (winner.includes('gore')) status = 'Gore Win';
                    else {
                        console.warn(`Unexpected winner '${winner}' for state ${stateName}, setting to Uncalled`, row);
                        status = 'Uncalled';
                    }
                } else if (statusLower !== 'uncalled') {
                    console.warn(`Unexpected status '${status}' for state ${stateName}, setting to Uncalled`, row);
                    status = 'Uncalled';
                }

                let reporting = parseFloat(row[reportingKey] || "0");
                if (isNaN(reporting) || reporting < 0 || reporting > 100) {
                    console.warn(`Invalid reporting percentage: ${row[reportingKey]} for state ${stateName}, setting to 0`, row);
                    reporting = 0;
                }

                let electoralVotes = parseInt(row[evKey] || "0", 10);
                if (isNaN(electoralVotes) || electoralVotes < 0) {
                    console.warn(`Invalid electoral votes: ${row[evKey]} for state ${stateName}, setting to 0`, row);
                    electoralVotes = 0;
                }

                newStateStats[stateName] = {
                    state: row[stateKey],
                    electoral_votes: electoralVotes,
                    winner: (row[winnerKey] || '').trim(),
                    status: status,
                    reporting: reporting,
                    republican_candidate: row[repCandidateKey] || 'George W. Bush',
                    democrat_candidate: row[demCandidateKey] || 'Al Gore',
                    other_candidate: row[otherCandidateKey] || 'Other'
                };
            }
            console.log(`[${new Date().toLocaleString()}] Parsed stateStats:`, newStateStats);
            stateStats = newStateStats;
        }

        function populateStateFipsMapFromGeoJSON(statesGeoJSON) {
            if (statesGeoJSON?.features?.length > 0) {
                statesGeoJSON.features.forEach(f => {
                    const prop = f.properties || {};
                    const nameKey = Object.keys(prop).find(k => k.toLowerCase().includes('name')) || 'name';
                    const fipsKey = Object.keys(prop).find(k => k.toLowerCase().includes('statefp') || k.toLowerCase().includes('fips')) || 'STATEFP';
                    const name = (prop[nameKey] || '').trim().toLowerCase();
                    const fips = (prop[fipsKey] || '').toString().padStart(2, '0');
                    console.log(`[${new Date().toLocaleString()}] GeoJSON state: ${name}, properties:`, prop);
                    if (name && stateNameToFips[name]) {
                        const validFips = (fips && fips !== '00' && /^\d{2}$/.test(fips)) ? fips : stateNameToFips[name];
                        stateFipsMap[name] = validFips;
                    } else {
                        console.warn(`[${new Date().toLocaleString()}] No FIPS mapping for state: ${name}, GeoJSON FIPS: ${fips}`);
                    }
                });
            }
            console.log(`[${new Date().toLocaleString()}] State FIPS: `, stateFipsMap);
        }

        function updateGeoJSONAndMap() {
            if (!statesGeoJSON || !countiesGeoJSON) {
                console.warn(`[${new Date().toLocaleString()}] GeoJSON data not loaded yet`);
                return;
            }

            const stateVoteTotals = {};
            for (const fips in countyElectionStats) {
                const stats = countyElectionStats[fips];
                const stateName = stats.state.toLowerCase();
                if (!stateVoteTotals[stateName]) {
                    stateVoteTotals[stateName] = { bush_votes: 0, gore_votes: 0, other_votes: 0, total_votes: 0 };
                }
                stateVoteTotals[stateName].bush_votes += stats.bush_votes || 0;
                stateVoteTotals[stateName].gore_votes += stats.gore_votes || 0;
                stateVoteTotals[stateName].other_votes += stats.other_votes || 0;
                stateVoteTotals[stateName].total_votes += stats.totalvotes || 0;
            }

            let nationalTotal = 0;
            for (const state in stateVoteTotals) {
                nationalTotal += stateVoteTotals[state].total_votes;
                console.log(`[${new Date().toLocaleString()}] State ${state}: Total votes=${stateVoteTotals[state].total_votes.toLocaleString()}, Bush=${stateVoteTotals[state].bush_votes.toLocaleString()}, Gore=${stateVoteTotals[state].gore_votes.toLocaleString()}`);
            }
            console.log(`[${new Date().toLocaleString()}] National total votes: ${nationalTotal.toLocaleString()}`);
            if (nationalTotal > 120000000) {
                console.warn(`[${new Date().toLocaleString()}] National vote total (${nationalTotal.toLocaleString()}) exceeds expected max (~105M for 2000 election)`);
            }

            statesGeoJSON.features.forEach(f => {
                const nameKey = Object.keys(f.properties).find(key => key.toLowerCase().includes('name')) || 'name';
                const geoName = (f.properties[nameKey] || '').trim().toLowerCase();
                const stateData = stateStats[geoName] || {};
                const voteTotals = stateVoteTotals[geoName] || { bush_votes: 0, gore_votes: 0, other_votes: 0, total_votes: 0 };

                let status = stateData.status || 'Uncalled';
                if (!['Bush Win', 'Gore Win', 'Uncalled'].includes(status)) {
                    console.warn(`[${new Date().toLocaleString()}] Invalid status '${status}' for state ${geoName}, setting to Uncalled`);
                    status = 'Uncalled';
                }

                let winner = 'Tied';
                if (status === 'Bush Win') {
                    winner = 'Bush';
                } else if (status === 'Gore Win') {
                    winner = 'Gore';
                } else if (voteTotals.bush_votes > voteTotals.gore_votes) {
                    winner = 'Bush';
                } else if (voteTotals.gore_votes > voteTotals.bush_votes) {
                    winner = 'Gore';
                }

                console.log(`[${new Date().toLocaleString()}] State ${geoName}: Status=${status}, Winner=${winner}, EV=${stateData.electoral_votes || 0}`);

                f.properties = {
                    ...f.properties,
                    state: stateData.state || geoName,
                    electoral_votes: stateData.electoral_votes || 0,
                    votes_gop: voteTotals.bush_votes || 0,
                    votes_dem: voteTotals.gore_votes || 0,
                    votes_other: voteTotals.other_votes || 0,
                    total_votes: voteTotals.total_votes || 0,
                    winner: winner,
                    status: status,
                    reporting: stateData.reporting || 0,
                    republican_candidate: stateData.republican_candidate || 'George W. Bush',
                    democrat_candidate: stateData.democrat_candidate || 'Al Gore',
                    other_candidate: stateData.other_candidate || 'Other'
                };
            });

            countiesGeoJSON.features.forEach(f => {
                const fips = f.properties.GEOID || f.properties.county_fips;
                if (!fips) {
                    console.warn(`[${new Date().toLocaleString()}] Missing GEOID for county feature:`, f.properties);
                    return;
                }
                const stats = countyElectionStats[fips] || {
                    bush_votes: 0,
                    gore_votes: 0,
                    other_votes: 0,
                    totalvotes: 0,
                    winner: 'Tied',
                    county_name: f.properties.NAME || 'Unknown'
                };
                f.properties.bush_votes = stats.bush_votes || 0;
                f.properties.gore_votes = stats.gore_votes || 0;
                f.properties.other_votes = stats.other_votes || 0;
                f.properties.total_votes = stats.totalvotes || 0;
                f.properties.winner = stats.winner || 'Tied';
                f.properties.county_name = stats.county_name || f.properties.NAME || 'Unknown';
            });

            if (mainMap && mainMap.getSource('states')) {
                mainMap.getSource('states').setData(statesGeoJSON);
                if (currentState && !isCountyMode) {
                    addCountiesLayer(currentState);
                } else if (isCountyMode) {
                    toggleCountyMode(true);
                }
                mainMap.triggerRepaint();
            }
            updateUI();
        }

        function updateUI() {
            let ev_bush = 0, ev_gore = 0;
            let national_bush_votes = 0, national_gore_votes = 0, national_total_votes = 0;
            let totalReporting = 0, numStates = 0;

            if (!statesGeoJSON?.features) {
                console.warn(`[${new Date().toLocaleString()}] statesGeoJSON not initialized for UI update`);
                return;
            }

            statesGeoJSON.features.forEach(f => {
                const props = f.properties || {};
                const ev = props.electoral_votes || 0;
                const status = props.status || 'Uncalled';
                if (status === 'Bush Win') ev_bush += ev;
                else if (status === 'Gore Win') ev_gore += ev;

                national_bush_votes += props.votes_gop || 0;
                national_gore_votes += props.votes_dem || 0;
                national_total_votes += props.total_votes || 0;

                if (props.reporting) {
                    totalReporting += props.reporting;
                    numStates += 1;
                }
            });

            console.log(`[${new Date().toLocaleString()}] National totals: Bush=${national_bush_votes.toLocaleString()}, Gore=${national_gore_votes.toLocaleString()}, Total=${national_total_votes.toLocaleString()}`);
            if (national_total_votes > 120000000) {
                console.warn(`[${new Date().toLocaleString()}] National vote total (${national_total_votes.toLocaleString()}) exceeds expected max (~105M for 2000 election)`);
            }

            document.getElementById('bush-ev').textContent = ev_bush;
            document.getElementById('gore-ev').textContent = ev_gore;
            const totalEV = 538;
            const bushEVPerc = totalEV > 0 ? (ev_bush / totalEV * 100) : 0;
            const goreEVPerc = totalEV > 0 ? (ev_gore / totalEV * 100) : 0;
            
            document.getElementById('bush-bar').style.width = `${bushEVPerc}%`;
            document.getElementById('gore-bar').style.width = `${goreEVPerc}%`;
            
            document.getElementById('bush-label').textContent = bushEVPerc.toFixed(1) + '%';
            document.getElementById('gore-label').textContent = goreEVPerc.toFixed(1) + '%';

            document.getElementById('bush-pop').textContent = national_bush_votes.toLocaleString();
            document.getElementById('gore-pop').textContent = national_gore_votes.toLocaleString();

            const avgReporting = numStates > 0 ? (totalReporting / numStates).toFixed(1) : 0;
            document.getElementById('reporting').textContent = `Reporting: ${avgReporting}%`;

            const bushProj = ev_bush / 270;
            const goreProj = ev_gore / 270;
            let projBush = 0.5, projGore = 0.5;
            if (ev_bush >= 270) {
                projBush = 1;
                projGore = 0;
            } else if (ev_gore >= 270) {
                projBush = 0;
                projGore = 1;
            } else if (bushProj + goreProj > 0) {
                projBush = bushProj / (bushProj + goreProj);
                projGore = goreProj / (bushProj + goreProj);
            }
            const angle = -90 + 180 * projGore;
            document.getElementById('needle-group').setAttribute('transform', `rotate(${angle}, 250, 154)`);
            document.getElementById('nyt-proj-bush').textContent = `${Math.round(projBush * 100)}%`;
            document.getElementById('nyt-proj-gore').textContent = `${Math.round(projGore * 100)}%`;
            document.getElementById('needle-check-bush').style.display = projBush === 1 ? 'block' : 'none';
            document.getElementById('needle-check-gore').style.display = projGore === 1 ? 'block' : 'none';
        }

        const arcSegs = [
            { label: "Very Likely Bush Win", start: -90, end: -60 },
            { label: "Likely Bush Win", start: -60, end: -30 },
            { label: "Lean Bush", start: -30, end: -10 },
            { label: "Tossup", start: -10, end: 10 },
            { label: "Lean Gore", start: 10, end: 30 },
            { label: "Likely Gore Win", start: 30, end: 60 },
            { label: "Very Likely Gore Win", start: 60, end: 90 }
        ];
        const svgCx = 250, svgCy = 154, arcR = 110;
        function arcPath(cx, cy, r, startAngle, endAngle) {
            const start = polar(cx, cy, r, startAngle);
            const end = polar(cx, cy, r, endAngle);
            const arcSweep = endAngle - startAngle <= 180 ? "0" : "1";
            return `M ${start.x} ${start.y} A ${r} ${r} 0 ${arcSweep} 1 ${end.x} ${end.y}`;
        }
        function polar(cx, cy, r, angleDeg) {
            const angle = (angleDeg - 90) * Math.PI / 180;
            return { x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) };
        }
        function setArcSegs() {
            document.getElementById('arc-vl-bush').setAttribute('d', arcPath(svgCx, svgCy, arcR, -90, -60));
            document.getElementById('arc-l-bush').setAttribute('d', arcPath(svgCx, svgCy, arcR, -60, -30));
            document.getElementById('arc-le-bush').setAttribute('d', arcPath(svgCx, svgCy, arcR, -30, -10));
            document.getElementById('arc-tossup').setAttribute('d', arcPath(svgCx, svgCy, arcR, -10, 10));
            document.getElementById('arc-le-gore').setAttribute('d', arcPath(svgCx, svgCy, arcR, 10, 30));
            document.getElementById('arc-l-gore').setAttribute('d', arcPath(svgCx, svgCy, arcR, 30, 60));
            document.getElementById('arc-vl-gore').setAttribute('d', arcPath(svgCx, svgCy, arcR, 60, 90));
            const labelGroup = document.getElementById('arc-labels-group');
            labelGroup.innerHTML = '';
            arcSegs.forEach(seg => {
                const midAngle = (seg.start + seg.end) / 2;
                const pos = polar(svgCx, svgCy, arcR + 20, midAngle);
                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', pos.x);
                text.setAttribute('y', pos.y);
                text.setAttribute('class', midAngle === 0 ? 'arc-label arc-label-center' : 'arc-label');
                text.textContent = seg.label;
                labelGroup.appendChild(text);
            });
        }
        setArcSegs();

        function enableStateHover() {
            if (!mainMap || !mainMap.getLayer('states-fill')) {
                console.warn(`[${new Date().toLocaleString()}] Map or states-fill layer not ready`);
                return;
            }
            if (stateHoverHandlers.mousemove) {
                console.log(`[${new Date().toLocaleString()}] State hover already enabled`);
                return;
            }

            stateHoverHandlers.mousemove = e => {
                if (statePopup) {
                    statePopup.remove();
                    statePopup = null;
                }
                if (!e.features || !e.features[0]) return;
                const p = e.features[0].properties;
                const nameKey = Object.keys(p).find(key => key.toLowerCase().includes('name')) || 'name';
                const total = (p.votes_gop || 0) + (p.votes_dem || 0) + (p.votes_other || 0);
                const gopPerc = total > 0 ? ((p.votes_gop || 0) / total * 100).toFixed(1) : 0;
                const demPerc = total > 0 ? ((p.votes_dem || 0) / total * 100).toFixed(1) : 0;
                let winnerText = 'Uncalled';
                if (p.status === 'Bush Win') winnerText = 'Bush';
                else if (p.status === 'Gore Win') winnerText = 'Gore';
                else if (p.votes_gop > p.votes_dem) winnerText = 'Bush (leading)';
                else if (p.votes_dem > p.votes_gop) winnerText = 'Gore (leading)';
                else winnerText = 'Tied';

                statePopup = new mapboxgl.Popup({ closeButton: false })
                    .setLngLat(e.lngLat)
                    .setHTML(`
                        <div style="background: #fff; color: #333; padding: 10px; border-radius: 5px; font-size: 12px;">
                            <strong>${p[nameKey]}</strong><br/>
                            <b>Electoral Votes:</b> ${p.electoral_votes || 0}<br/>
                            <span style="color:#e74c3c">Bush:</span> ${(p.votes_gop || 0).toLocaleString()} (${gopPerc}%)<br/>
                            <span style="color:#3498db">Gore:</span> ${(p.votes_dem || 0).toLocaleString()} (${demPerc}%)<br/>
                            <b>Status:</b> ${winnerText}<br/>
                            <b>Reporting:</b> ${(p.reporting || 0).toFixed(1)}%
                        </div>
                    `)
                    .addTo(mainMap);
            };

            stateHoverHandlers.mouseleave = () => {
                if (statePopup) {
                    statePopup.remove();
                    statePopup = null;
                }
            };

            mainMap.on('mousemove', 'states-fill', stateHoverHandlers.mousemove);
            mainMap.on('mouseleave', 'states-fill', stateHoverHandlers.mouseleave);
            console.log(`[${new Date().toLocaleString()}] State hover enabled`);
        }

                const total = stats.totalvotes;
                const bushPerc = total > 0 ? ((stats.bush_votes / total) * 100).toFixed(1) : 0;
                const gorePerc = total > 0 ? ((stats.gore_votes / total) * 100).toFixed(1) : 0;
                console.log(`[${new Date().toLocaleString()}] Showing county popup for: ${stats.county_name}`);
                countyPopup = new mapboxgl.Popup({
                    closeButton: false
                })
                .setLngLat(e.lngLat)
                .setHTML(`
                    <div style="background: #fff; color: #333; padding: 10px; border-radius: 5px; font-size: 12px;">
                        <strong>${stats.county_name} County</strong><br/>
                        Bush: ${stats.bush_votes.toLocaleString()} (${bushPerc}%)<br/>
                        Gore: ${stats.gore_votes.toLocaleString()} (${gorePerc}%)<br/>
                        Winner: ${stats.winner}
                    </div>
                `)
                .addTo(mainMap);
            };

            countyHoverHandlers.mouseleave = () => {
                if (countyPopup) {
                    console.log(`[${new Date().toLocaleString()}] Removing county popup`);
                    countyPopup.remove();
                    countyPopup = null;
                }
            };

            mainMap.on('mousemove', 'counties-fill', countyHoverHandlers.mousemove);
            mainMap.on('mouseleave', 'counties-fill', countyHoverHandlers.mouseleave);
            console.log(`[${new Date().toLocaleString()}] County hover enabled`);
        }

        function disableCountyHover() {
            if (countyHoverHandlers.mousemove) {
                mainMap.off('mousemove', 'counties-fill', countyHoverHandlers.mousemove);
                console.log(`[${new Date().toLocaleString()}] Removed county mousemove handler`);
            }
            if (countyHoverHandlers.mouseleave) {
                mainMap.off('mouseleave', 'counties-fill', countyHoverHandlers.mouseleave);
                console.log(`[${new Date().toLocaleString()}] Removed county mouseleave handler`);
            }
            countyHoverHandlers.mousemove = null;
            countyHoverHandlers.mouseleave = null;
            if (countyPopup) {
                console.log(`[${new Date().toLocaleString()}] Removing county popup`);
                countyPopup.remove();
                countyPopup = null;
            }
            console.log(`[${new Date().toLocaleString()}] County hover disabled`);
        }

        function hideElectionTicker() {
            document.getElementById('projection-ticker-wrap').style.display = 'none';
        }
        function showElectionTicker() {
            document.getElementById('projection-ticker-wrap').style.display = 'flex';
        }

        function initializeMainMap() {
            try {
                mainMap = new mapboxgl.Map({
                    container: 'map',
                    style: 'mapbox://styles/mapbox/light-v10',
                    center: [-98.5795, 39.8283],
                    zoom: 3
                });
            } catch (err) {
                console.error(`[${new Date().toLocaleString()}] Failed to initialize Mapbox:`, err);
                showMapError('Failed to load map: Invalid Mapbox access token. Please set valid token in mapboxgl.accessToken.');
                return;
            }

            mainMap.on('load', () => {
                mainMap.addSource('states', {
                    type: 'geojson',
                    data: statesGeoJSON
                });
                mainMap.addLayer({
                    id: 'states-fill',
                    type: 'fill',
                    source: 'states',
                    paint: {
                        'fill-color': [
                            'match', ['get', 'status'],
                            'Bush Win', '#e74c3c',
                            'Gore Win', '#3498db',
                            'Uncalled', [
                                'case',
                                ['>', ['get', 'votes_gop'], ['get', 'votes_dem']], '#f4a6a0',
                                ['>', ['get', 'votes_dem'], ['get', 'votes_gop']], '#a6c8f4',
                                '#cccccc'
                            ],
                            '#ffffff'
                        ],
                        'fill-opacity': 0.9
                    }
                });
                mainMap.addLayer({
                    id: 'states-outline',
                    type: 'line',
                    source: 'states',
                    paint: {
                        'line-color': '#000000',
                        'line-width': 1
                    }
                });

                enableStateHover();

                mainMap.on('click', 'states-fill', e => {
                    if (isCountyMode) return;
                    const p = e.features[0].properties;
                    const nameKey = Object.keys(p).find(key => key.toLowerCase().includes('name')) || 'name';
                    const stateName = p[nameKey];
                    if (!stateName) return;
                    currentState = stateName;
                    document.getElementById('header').style.display = 'none';
                    document.getElementById('county-mode-btn').style.display = 'none';
                    hideElectionTicker();
                    disableStateHover();
                    addCountiesLayer(stateName);
                    document.getElementById('state-sidebar').classList.add('active');
                    document.getElementById('close-sidebar-btn').style.display = 'block';
                    document.getElementById('last-updated').textContent = `Data as of: ${lastRefreshTime}`;
                });
            });

            mainMap.on('error', err => {
                console.error(`[${new Date().toLocaleString()}] Mapbox error:`, err);
                showMapError(`Map failed to load: ${err.error.message}. Please check Mapbox token.`);
            });
        }

        function addCountiesLayer(stateName) {
            const stateFP = getStateFP(stateName);
            if (!stateFP) {
                console.warn(`[${new Date().toLocaleString()}] No FIPS code found for state: ${stateName}`);
                return;
            }
    
            const filtered = {
                type: 'FeatureCollection',
                features: countiesGeoJSON.features.filter(f => (f.properties.STATEFP || '').toString().padStart(2, '0') === stateFP)
            };
    
            if (filtered.features.length === 0) {
                console.warn(`[${new Date().toLocaleString()}] No counties found for state FIPS: ${stateFP}`);
            }
    
            if (mainMap.getSource('counties')) {
                if (mainMap.getLayer('counties-fill')) mainMap.removeLayer('counties-fill');
                if (mainMap.getLayer('counties-outline')) mainMap.removeLayer('counties-outline');
                mainMap.removeSource('counties');
            }
            mainMap.addSource('counties', {
                type: 'geojson',
                data: filtered
            });

            mainMap.addLayer({
                id: 'counties-fill',
                type: 'fill',
                source: 'counties',
                paint: {
                    'fill-color': [
                        'match', ['get', 'winner'],
                        'Bush', '#e74c3c',
                        'Gore', '#3498db',
                        '#cccccc'
                    ],
                    'fill-opacity': 0.85
                }
            });
            mainMap.addLayer({
                id: 'counties-outline',
                type: 'line',
                source: 'counties',
                paint: {
                    'line-color': '#ffffff',
                    'line-width': 0.5
                }
            });

            disableCountyHover();
            enableCountyHover();

            const bounds = getStateBounds(stateName);
            if (bounds) {
                mainMap.fitBounds(bounds, {
                    padding: 40,
                    duration: 1100
                });
            } else {
                console.warn(`[${new Date().toLocaleString()}] Failed to zoom to ${stateName}: No bounds found`);
            }

            try {
                const stateFeature = statesGeoJSON.features.find(f => {
                    const nameKey = Object.keys(f.properties).find(key => key.toLowerCase().includes('name')) || 'name';
                    return f.properties[nameKey].toLowerCase() === stateName.toLowerCase();
                });
                if (stateFeature) {
                    const p = stateFeature.properties;
                    const votesGop = Number.isFinite(p.votes_gop) ? p.votes_gop : 0;
                    const votesDem = Number.isFinite(p.votes_dem) ? p.votes_dem : 0;
                    const votesOther = Number.isFinite(p.votes_other) ? p.votes_other : 0;
                    const total = votesGop + votesDem + votesOther;
                    const bushPerc = total > 0 ? ((votesGop / total) * 100).toFixed(1) : 0;
                    const gorePerc = total > 0 ? ((votesDem / total) * 100).toFixed(1) : 0;
                    const otherPerc = total > 0 ? ((votesOther / total) * 100).toFixed(1) : 0;

                    console.log(`[${new Date().toLocaleString()}] Sidebar data for ${stateName}: Bush=${votesGop.toLocaleString()}, Gore=${votesDem.toLocaleString()}, Other=${votesOther.toLocaleString()}, Total=${total.toLocaleString()}`);

                    document.getElementById('state-sidebar-title').textContent = `President: ${p.state}`;
                    document.getElementById('state-electoral-votes').textContent = `${p.electoral_votes} Electoral Votes`;

                    const candidateStats = document.getElementById('candidate-stats');
                    candidateStats.innerHTML = `
                        <div class="candidate-row">
                            <img src="images/George-W-Bush.jpg" class="candidate-image-small" alt="Bush">
                            <div class="bar-graph">
                                <div class="bar-fill bush" style="width: ${bushPerc}%"></div>
                            </div>
                            <div class="candidate-details">Bush: ${votesGop.toLocaleString()} (${bushPerc}%)</div>
                        </div>
                        <div class="candidate-row">
                            <img src="images/Al_Gore.jpg" class="candidate-image-small" alt="Gore">
                            <div class="bar-graph">
                                <div class="bar-fill gore" style="width: ${gorePerc}%"></div>
                            </div>
                            <div class="candidate-details">Gore: ${votesDem.toLocaleString()} (${gorePerc}%)</div>
                        </div>
                        <div class="candidate-row">
                            <div class="bar-graph">
                                <div class="bar-fill other" style="width: ${otherPerc}%"></div>
                            </div>
                            <div class="candidate-details">Other: ${votesOther.toLocaleString()} (${otherPerc}%)</div>
                        </div>
                    `;
                    document.getElementById('reporting-fill').style.width = `${p.reporting || 0}%`;
                    document.getElementById('reporting-status').textContent = `${p.status} (${(p.reporting || 0).toFixed(1)}% reporting)`;
                } else {
                    console.warn(`[${new Date().toLocaleString()}] No state feature found for ${stateName}`);
                    document.getElementById('state-sidebar-title').textContent = `President: ${stateName}`;
                    document.getElementById('state-electoral-votes').textContent = '0 Electoral Votes';
                    document.getElementById('candidate-stats').innerHTML = '<p>No data available</p>';
                    document.getElementById('reporting-fill').style.width = '0%';
                    document.getElementById('reporting-status').textContent = 'Uncalled (0% reporting)';
                }
            } catch (err) {
                console.error(`[${new Date().toLocaleString()}] Error updating sidebar for ${stateName}:`, err);
            }
        }

        function getStateFP(stateName) {
            const normalized = stateName.toLowerCase().trim();
            const fips = stateFipsMap[normalized];
            if (!fips) {
                console.warn(`[${new Date().toLocaleString()}] No FIPS code found for state: ${stateName}`);
            }
            return fips;
        }

        function getStateBounds(stateName) {
            const stateFeature = statesGeoJSON.features.find(f => {
                const nameKey = Object.keys(f.properties).find(key => key.toLowerCase().includes('name')) || 'name';
                return f.properties[nameKey].toLowerCase() === stateName.toLowerCase();
            });
            if (!stateFeature) return null;

            const coordinates = stateFeature.geometry.type === 'Polygon'
                ? stateFeature.geometry.coordinates[0]
                : stateFeature.geometry.coordinates[0][0];
            const bounds = coordinates.reduce(([minX, minY, maxX, maxY], [x, y]) => [
                Math.min(minX, x), Math.min(minY, y),
                Math.max(maxX, x), Math.max(maxY, y)
            ], [Infinity, Infinity, -Infinity, -Infinity]);
            return [[bounds[0], bounds[1]], [bounds[2], bounds[3]]];
        }

        function toggleCountyMode(enable) {
            isCountyMode = enable;
            document.getElementById('county-mode-btn').textContent = enable ? 'State Mode' : 'County Mode';
            if (enable) {
                if (mainMap.getSource('counties')) {
                    mainMap.removeSource('counties');
                }
                mainMap.addSource('counties', {
                    type: 'geojson',
                    data: countiesGeoJSON
                });
                if (!mainMap.getLayer('counties-fill')) {
                    mainMap.addLayer({
                        id: 'counties-fill',
                        type: 'fill',
                        source: 'counties',
                        paint: {
                            'fill-color': [
                                'match', ['get', 'winner'],
                                'Bush', '#e74c3c',
                                'Gore', '#3498db',
                                '#cccccc'
                            ],
                            'fill-opacity': 0.85
                        }
                    });
                    mainMap.addLayer({
                        id: 'counties-outline',
                        type: 'line',
                        source: 'counties',
                        paint: {
                            'line-color': '#ffffff',
                            'line-width': 0.5
                        }
                    });
                }
                disableStateHover();
                enableCountyHover();
                mainMap.fitBounds([[-125.0011, 24.9493], [-66.9326, 49.5904]], {
                    padding: 40,
                    duration: 1100
                });
            } else {
                if (mainMap.getLayer('counties-fill')) {
                    mainMap.removeLayer('counties-fill');
                }
                if (mainMap.getLayer('counties-outline')) {
                    mainMap.removeLayer('counties-outline');
                }
                if (mainMap.getSource('counties')) {
                    mainMap.removeSource('counties');
                }
                disableCountyHover();
                enableStateHover();
                mainMap.fitBounds([[-125.0011, 24.9493], [-66.9326, 49.5904]], {
                    padding: 40,
                    duration: 1100
                });
            }
            console.log(`[${new Date().toLocaleString()}] Toggled to ${enable ? 'County' : 'State'} mode`);
        }

        document.getElementById('county-mode-btn').addEventListener('click', () => {
            toggleCountyMode(!isCountyMode);
        });

        document.getElementById('close-sidebar-btn').addEventListener('click', () => {
            document.getElementById('state-sidebar').classList.remove('active');
            document.getElementById('header').style.display = 'flex';
            document.getElementById('county-mode-btn').style.display = 'block';
            showElectionTicker();
            if (mainMap.getLayer('counties-fill')) {
                mainMap.removeLayer('counties-fill');
            }
            if (mainMap.getLayer('counties-outline')) {
                mainMap.removeLayer('counties-outline');
            }
            if (mainMap.getSource('counties')) {
                mainMap.removeSource('counties');
            }
            disableCountyHover();
            enableStateHover();
            mainMap.fitBounds([[-125.0011, 24.9493], [-66.9326, 49.5904]], {
                padding: 40,
                duration: 1100
            });
            currentState = null;
            console.log(`[${new Date().toLocaleString()}] Closed state sidebar`);
        });

        initializeMainMap();
    </script>
</body>
</html>
