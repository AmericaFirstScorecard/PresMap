<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>2000 Live Election Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Mapbox GL JS -->
  <script src="https://api.mapbox.com/mapbox-gl-js/v2.13.0/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.13.0/mapbox-gl.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css?family=Inter:400,600,700,900" rel="stylesheet">
  <style>
    html, body { height: 100%; margin: 0; padding: 0; font-family: 'Inter', Arial, sans-serif; background: #11161b;}
    body { overflow-x: hidden; }
    #header {
      background: #222; color: white; padding: 15px 20px;
      z-index: 1000; display: flex; flex-direction: column; align-items: center;
      position: relative;
    }
    .progress-container { width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 10px; }
    .progress-bar-wrapper {
      display: flex; align-items: center; position: relative;
      width: 100%; height: 20px; background: #444; border-radius: 10px; overflow: hidden;
    }
    .progress-bar { height: 100%; transition: width 0.5s ease-in-out; }
    .progress-bar.bush { background: #e74c3c; }
    .progress-bar.gore { background: #3498db; position: absolute; right: 0; }
    .vote-label { position: absolute; color: white; font-size: 12px; font-weight: bold; text-shadow: 0 0 2px rgba(0,0,0,0.7);}
    .threshold-marker { position: absolute; left: calc(270 / 538 * 100%); width: 2px; height: 100%; background: #fff; z-index: 10; }
    .threshold-label { position: relative; left: calc(270 / 538 * 100% - 20px); color: white; font-size: 12px; font-weight: bold; margin-bottom: 5px; text-align: left;}
    .candidate-labels { display: flex; justify-content: space-between; font-size: 14px; font-weight: bold; margin-bottom: 5px; }
    .stat-box { margin-top: 5px; font-size: 12px; }
    .candidate-image { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; }
    .progress-bar-container { display: flex; align-items: center; width: 100%; gap: 15px; }
    .candidate-stats { display: flex; justify-content: space-between; width: 100%; max-width: 800px; font-size: 12px;}
    .candidate-stat-left, .candidate-stat-right { text-align: center; width: 150px; }
    .title { font-size: 30px; font-weight: bold; margin-bottom: 10px; }
    #main { display: flex; }
    #map { position: relative; width: 100vw; height: 70vh; min-height: 400px; max-height: 80vh; z-index: 1; background: #ccc; }
    @media (max-width:1000px) { #main { flex-direction: column; } #map { width: 100vw !important; } #state-panel { width: 100vw !important; max-width: 100vw !important; } }
    @media (max-width:700px) { #map { min-height: 300px; } }

    #projection-ticker-wrap {
      width: 100%;
      background: #191d22;
      padding: 60px 0 60px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 2;
      min-height: 420px;
      border-top: 2px solid #303540;
      margin-top: 0;
    }
    .nyt-projection-title { color: #fff; font-size: 2.4rem; font-weight: 900; letter-spacing: 0.5px; margin-bottom: 22px; text-align: center; text-shadow: 0 2px 16px #000, 0 0 10px #111;}
    .needle-svg-wrap { width: 500px; max-width: 99vw; margin: 0 auto; position: relative; }
    .needle-img-candidate { position: absolute; width: 68px; height: 68px; border-radius: 50%; object-fit: cover; box-shadow: 0 3px 24px #000b, 0 1px 8px #222a; background: #fff; z-index: 2;}
    .needle-img-bush { left: 10px; top: 162px; }
    .needle-img-gore { right: 10px; top: 162px; }
    .needle-checkmark { position: absolute; width: 32px; height: 32px; top: 210px; left: 36px; background: none; display: none; z-index: 3; pointer-events: none;}
    .needle-checkmark.gore { left: auto; right: 36px;}
    .needle-candidate-labels { width: 100%; display: flex; justify-content: center; margin-top: 16px; font-size: 2.0rem; font-weight: 800; text-shadow: 0 2px 10px #000d; gap: 40px;}
    .needle-bush-label { color: #e74c3c; }
    .needle-gore-label { color: #3498db; }
    .nyt-prob-row { margin-top: 24px; text-align: center; font-size: 1.65rem; font-weight: 900; letter-spacing: 0.3px; text-shadow: 0 1px 4px #000b; display: flex; justify-content: center; align-items: center; gap: 16px;}
    .proj-big-num { font-size: 2.1rem; font-weight: 900; margin: 0 8px;}
    .proj-big-num.bush { color: #e74c3c;}
    .proj-big-num.gore { color: #3498db;}
    .proj-divider { font-size: 1.6rem; font-weight: 800; color: #fff; margin: 0 8px;}
    /* --- Side panel --- */
    #state-panel {
      display: none;
      position: absolute;
      right: 0; top: 90px;
      width: 370px; max-width: 100vw;
      min-height: 400px;
      background: #fff;
      color: #111;
      box-shadow: -4px 0 38px #000a, -1px 0 12px #aaa7;
      border-radius: 16px 0 0 16px;
      padding: 32px 24px 28px 30px;
      z-index: 9002;
      font-family: 'Inter', Arial, sans-serif;
      transition: box-shadow 0.3s;
    }
    @media (max-width:600px) { #state-panel { width: 100vw; left:0; right:0; border-radius:0;} }
    .panel-head { font-size: 1.1rem; color: #c00; letter-spacing: 1.1px; font-weight: bold; text-transform: uppercase; margin-bottom: 7px;}
    .panel-title { font-size: 2rem; font-weight: 900; margin-bottom: 8px; }
    .panel-votes-row { display: flex; align-items: center; font-size: 1.2rem; margin-bottom: 9px; gap: 12px;}
    .panel-ev { background:#f0f0f7; color:#c00; font-size:1.1rem; font-weight:900; border-radius:10px; padding:3px 13px; margin-left:6px;}
    .panel-party-winner { font-weight:900; border-radius:50%; padding:4px 9px 3px 9px; background:#e74c3c; color:#fff; font-size:1.3rem; margin-left:8px;}
    .panel-candidates-list { margin: 18px 0 5px 0; }
    .panel-cand-row { display:flex; align-items:center; padding:9px 0; border-radius: 6px; }
    .panel-cand-winner { font-weight: 900; color: #c00;}
    .panel-cand-img { width:36px; height:36px; border-radius:50%; margin-right:15px; object-fit:cover; }
    .panel-cand-bar-wrap { flex: 1; height: 17px; background: #eee; border-radius: 7px; margin: 0 12px;}
    .panel-cand-bar { height: 100%; border-radius: 7px;}
    .panel-cand-bar.bush { background: #e74c3c;}
    .panel-cand-bar.gore { background: #3498db;}
    .panel-cand-bar.other { background: #888;}
    .panel-cand-perc { width:45px; text-align:right; font-size: 1.2rem; margin-left:6px;}
    .panel-cand-votes { width:88px; text-align:right; font-size: 1.05rem; color:#555;}
    #boxout-btn {
      position: absolute; top: 13px; right: 16px;
      font-size: 1.7rem; color: #c00;
      background: none; border: none; font-weight: 900; cursor: pointer;
      border-radius: 50%; width: 40px; height: 40px; transition: background 0.13s;
    }
    #boxout-btn:hover { background: #eee; }
    .panel-turnout { margin-top: 17px; font-size: 1.06rem; color: #222;}
    .panel-county-link { margin-top: 15px; color: #1976d2; font-weight:700; font-size:1.1rem; display:inline-block;}
  </style>
</head>
<body>
<div id="header">
  <div class="title">2000 Live Election Map</div>
  <div class="progress-container">
    <div class="candidate-labels">
      <span>Bush: <span id="bush-votes">0</span></span>
      <span>Gore: <span id="gore-votes">0</span></span>
    </div>
    <div class="progress-bar-container">
      <img src="images/George-W-Bush.jpg" alt="Bush" class="candidate-image">
      <div style="width: 100%; position: relative;">
        <div class="threshold-label">270 to Win</div>
        <div class="progress-bar-wrapper">
          <div class="threshold-marker"></div>
          <div class="progress-bar bush" id="bush-bar" style="width: 0%"></div>
          <div class="progress-bar gore" id="gore-bar" style="width: 0%"></div>
          <div class="vote-label" id="bush-label" style="left: 5px">0</div>
          <div class="vote-label" id="gore-label" style="right: 5px">0</div>
        </div>
      </div>
      <img src="images/Al_Gore.jpg" alt="Gore" class="candidate-image">
    </div>
  </div>
  <div class="candidate-stats">
    <div class="candidate-stat-left" id="bush-pv">Bush: 0 (0%)</div>
    <div class="stat-box" id="reporting">Reporting: 0%</div>
    <div class="candidate-stat-right" id="gore-pv">Gore: 0 (0%)</div>
  </div>
</div>

<div id="main">
  <div id="map" style="flex:1;"></div>
  <!-- State Panel (hidden by default) -->
  <div id="state-panel"></div>
</div>

<!-- NYT-style ticker BELOW the map, scroll to see -->
<div id="projection-ticker-wrap">
  <div class="nyt-projection-title">Chance of Winning <span style="font-weight:400;">(Projection)</span></div>
  <div class="needle-svg-wrap" style="position: relative;">
    <!-- Bush Image -->
    <img src="images/George-W-Bush.jpg" class="needle-img-candidate needle-img-bush" id="needle-img-bush" alt="Bush"/>
    <!-- Gore Image -->
    <img src="images/Al_Gore.jpg" class="needle-img-candidate needle-img-gore" id="needle-img-gore" alt="Gore"/>
    <!-- Checkmarks -->
    <svg class="needle-checkmark" id="needle-check-bush" viewBox="0 0 53 53"><circle cx="26.5" cy="26.5" r="25" fill="#e74c3c"/><path d="M16 27.5l7 7 14-14" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round"/></svg>
    <svg class="needle-checkmark gore" id="needle-check-gore" viewBox="0 0 53 53"><circle cx="26.5" cy="26.5" r="25" fill="#3498db"/><path d="M16 27.5l7 7 14-14" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round"/></svg>
    <svg id="nyt-needle-svg" width="500" height="270" viewBox="0 0 500 270">
      <path id="arc-vl-bush" class="arc-very-likely-bush" fill="none" stroke-width="20"/>
      <path id="arc-l-bush" class="arc-likely-bush" fill="none" stroke-width="20"/>
      <path id="arc-le-bush" class="arc-lean-bush" fill="none" stroke-width="20"/>
      <path id="arc-tossup" class="arc-tossup" fill="none" stroke-width="20"/>
      <path id="arc-le-gore" class="arc-lean-gore" fill="none" stroke-width="20"/>
      <path id="arc-l-gore" class="arc-likely-gore" fill="none" stroke-width="20"/>
      <path id="arc-vl-gore" class="arc-very-likely-gore" fill="none" stroke-width="20"/>
      <g id="arc-labels-group"></g>
      <g id="needle-group">
        <polygon id="nyt-needle" class="needle-arrow" points="250,64 243,162 257,162"/>
        <circle id="needle-dot" class="needle-dot" cx="250" cy="154" r="16"/>
      </g>
    </svg>
    <div class="needle-candidate-labels">
      <span class="needle-bush-label">Bush</span>
      <span class="proj-big-num bush" id="nyt-proj-bush-big">--%</span>
      <span class="proj-divider">|</span>
      <span class="proj-big-num gore" id="nyt-proj-gore-big">--%</span>
      <span class="needle-gore-label">Gore</span>
    </div>
  </div>
</div>

<script>
mapboxgl.accessToken = 'pk.eyJ1IjoiNW00Y2s3NyIsImEiOiJjbWI4eXFqeDkwbzY1MmpwcDFzZDIwMmVqIn0.6JGe7JWhk28z5D3TLIJQwg';
let countiesGeoJSON = null;
let countyElectionStats = null;
let statesGeoJSON = null;
let stateStats = null;

Promise.all([
  fetch('data/county-geo.json').then(r => r.json()).then(data => { countiesGeoJSON = data; }),
  fetch('data/election-stats-county.json').then(r => r.json()).then(data => { countyElectionStats = data; }),
  fetch('data/us-states.geo.json').then(r => r.json()).then(data => { statesGeoJSON = data; }),
  fetch('data/election2000-stats.json').then(r => r.json()).then(data => { stateStats = data; })
]).then(() => initializeMainMap());

// NYT Needle arc math for new layout
const arcSegs = [
  { label: "Very likely Bush", start: -90, end: -60 },
  { label: "Likely Bush", start: -60, end: -30 },
  { label: "Lean Bush", start: -30, end: -10 },
  { label: "Tossup", start: -10, end: 10 },
  { label: "Lean Gore", start: 10, end: 30 },
  { label: "Likely Gore", start: 30, end: 60 },
  { label: "Very likely Gore", start: 60, end: 90 }
];
const svgCx = 250, svgCy = 154, arcR = 110;

function arcPath(cx, cy, r, startAngle, endAngle) {
  const start = polar(cx, cy, r, startAngle);
  const end = polar(cx, cy, r, endAngle);
  const arcSweep = endAngle - startAngle <= 180 ? "0" : "1";
  return [
    "M", start.x, start.y,
    "A", r, r, 0, arcSweep, 1, end.x, end.y
  ].join(" ");
}
function polar(cx, cy, r, angleDeg) {
  const angle = (angleDeg-90)*Math.PI/180;
  return { x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) };
}
function setArcSegs() {
  document.getElementById('arc-vl-bush').setAttribute('d', arcPath(svgCx,svgCy,arcR, -90, -60));
  document.getElementById('arc-l-bush').setAttribute('d', arcPath(svgCx,svgCy,arcR, -60, -30));
  document.getElementById('arc-le-bush').setAttribute('d', arcPath(svgCx,svgCy,arcR, -30, -10));
  document.getElementById('arc-tossup').setAttribute('d', arcPath(svgCx,svgCy,arcR, -10, 10));
  document.getElementById('arc-le-gore').setAttribute('d', arcPath(svgCx,svgCy,arcR, 10, 30));
  document.getElementById('arc-l-gore').setAttribute('d', arcPath(svgCx,svgCy,arcR, 30, 60));
  document.getElementById('arc-vl-gore').setAttribute('d', arcPath(svgCx,svgCy,arcR, 60, 90));
}
setArcSegs();

let mainMap = null;
let statePopup = null;
let statePanelActive = false;

function initializeMainMap() {
  mainMap = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/light-v10',
    center: [-98.5795, 39.8283],
    zoom: 3
  });

  mainMap.on('load', () => {
    // Color by winner/status
    statesGeoJSON.features.forEach(f => {
      const stateName = f.properties.name;
      const s = stateStats[stateName];
      if (s) Object.assign(f.properties, s);
    });

    mainMap.addSource('states', { type: 'geojson', data: statesGeoJSON });
    mainMap.addLayer({
      id: 'states-fill',
      type: 'fill',
      source: 'states',
      paint: {
        'fill-color': [
          'match',
          ['get', 'status'],
          'GOP Win', '#d12c0f',
          'DEM Win', '#0e47e6',
          'Lean GOP', '#f4a6a6',
          'Lean DEM', '#a6c8f4',
          'Uncalled', '#cccccc',
          '#ffffff'
        ],
        'fill-opacity': 1.0
      }
    });
    mainMap.addLayer({
      id: 'states-outline',
      type: 'line',
      source: 'states',
      paint: { 'line-color': '#000000', 'line-width': 2 }
    });

    // ---- ELECTION BAR + TICKER LOGIC ----
    let ev_bush = 0, ev_gore = 0, total_gop_votes = 0, total_dem_votes = 0, total_votes = 0;
    statesGeoJSON.features.forEach(f => {
      const s = f.properties;
      const gop = +s.votes_gop || 0;
      const dem = +s.votes_dem || 0;
      const reporting = +s.reporting || 0;
      const total = gop + dem;
      total_gop_votes += gop;
      total_dem_votes += dem;
      total_votes += total;
      if (reporting === 100) {
        if (gop > dem) ev_bush += +s.electoral_votes;
        else if (dem > gop) ev_gore += +s.electoral_votes;
      }
    });
    const total_registered = 105405100;
    const perc_gop = ((total_gop_votes / total_registered) * 100).toFixed(1);
    const perc_dem = ((total_dem_votes / total_registered) * 100).toFixed(1);
    const reporting_pct = ((total_votes / total_registered) * 100).toFixed(1);

    document.getElementById('bush-votes').textContent = ev_bush;
    document.getElementById('gore-votes').textContent = ev_gore;
    document.getElementById('bush-bar').style.width = `${(ev_bush / 538) * 100}%`;
    document.getElementById('gore-bar').style.width = `${(ev_gore / 538) * 100}%`;
    document.getElementById('bush-label').textContent = ev_bush;
    document.getElementById('gore-label').textContent = ev_gore;
    document.getElementById('bush-pv').textContent = `Bush: ${total_gop_votes.toLocaleString()} (${perc_gop}%)`;
    document.getElementById('gore-pv').textContent = `Gore: ${total_dem_votes.toLocaleString()} (${perc_dem}%)`;
    document.getElementById('reporting').textContent = `Reporting: ${reporting_pct}%`;

    // ------ NYT-STYLE PROJECTION NEEDLE LOGIC ------
    const bushProj = Math.min(ev_bush / 270, 1);
    const goreProj = Math.min(ev_gore / 270, 1);
    let projBush, projGore;
    if (ev_bush >= 270 && ev_bush > ev_gore) {
      projBush = 1; projGore = 0;
    } else if (ev_gore >= 270 && ev_gore > ev_bush) {
      projBush = 0; projGore = 1;
    } else if (bushProj + goreProj > 0) {
      projBush = bushProj / (bushProj + goreProj);
      projGore = goreProj / (bushProj + goreProj);
    } else {
      projBush = projGore = 0.5;
    }
    let angle;
    if (projBush === 1) angle = -90;
    else if (projGore === 1) angle = 90;
    else angle = -90 + 180 * projGore;
    document.getElementById('needle-group').setAttribute('transform', `rotate(${angle},250,154)`);
    document.getElementById('nyt-proj-bush-big').textContent = Math.round(projBush*100) + "%";
    document.getElementById('nyt-proj-gore-big').textContent = Math.round(projGore*100) + "%";
    document.getElementById('needle-check-bush').style.display = (projBush === 1) ? 'block' : 'none';
    document.getElementById('needle-check-gore').style.display = (projGore === 1) ? 'block' : 'none';

    // Hover popup for state
    mainMap.on('mousemove', 'states-fill', (e) => {
      const p = e.features[0].properties;
      const gop = +p.votes_gop || 0, dem = +p.votes_dem || 0, total = gop + dem;
      const gopPerc = total > 0 ? ((gop / total) * 100).toFixed(1) : 0;
      const demPerc = total > 0 ? ((dem / total) * 100).toFixed(1) : 0;
      const winner = p.winner || 'Uncalled';
      const gopName = p.gop_candidate || 'Bush';
      const demName = p.dem_candidate || 'Gore';
      const gopCheck = winner === gopName ? '✓ ' : '';
      const demCheck = winner === demName ? '✓ ' : '';

      if (statePopup) statePopup.remove();
      statePopup = new mapboxgl.Popup({ closeButton: false, closeOnClick: false })
        .setLngLat(e.lngLat)
        .setHTML(
          `<strong>${p.name}</strong><br/>
          <b>Electoral Votes:</b> ${p.electoral_votes}<br/>
          <b>Reporting:</b> ${p.reporting}%<br/>
          <b style="color:#d12c0f;">${gopCheck}${gopName}:</b> ${gop.toLocaleString()} (${gopPerc}%)<br/>
          <b style="color:#0e47e6;">${demCheck}${demName}:</b> ${dem.toLocaleString()} (${demPerc}%)<br/>
          <b>Winner:</b> ${winner}`
        )
        .addTo(mainMap);
    });
    mainMap.on('mouseleave', 'states-fill', () => { if (statePopup) statePopup.remove(); });

    // Click state = zoom, draw counties, show side panel
    mainMap.on('click', 'states-fill', (e) => {
      const p = e.features[0].properties;
      const stateName = p.name;
      const stateFP = p.STATEFP || p.statefp || p.STATEFP10;
      focusState(stateFP, stateName, p);
    });
  });
}

// Side Panel + State Focus
function focusState(stateFP, stateName, stateProps) {
  // Hide popup
  if (statePopup) statePopup.remove();
  // Remove county layer if present
  if (mainMap.getSource('counties')) {
    if (mainMap.getLayer('counties-fill')) mainMap.removeLayer('counties-fill');
    if (mainMap.getLayer('counties-outline')) mainMap.removeLayer('counties-outline');
    mainMap.removeSource('counties');
  }
  // Filter counties for that state
  const stateCounties = {
    ...countiesGeoJSON,
    features: countiesGeoJSON.features.filter(f => f.properties.STATEFP == stateFP)
  };
  // Color by winner
  stateCounties.features.forEach(f => {
    const stats = countyElectionStats[f.properties.GEOID];
    f.properties.winner = stats ? stats.winner : null;
    f.properties.bush = stats ? stats.bush_votes : 0;
    f.properties.gore = stats ? stats.gore_votes : 0;
  });
  // Add counties source/layer
  mainMap.addSource('counties', { type: 'geojson', data: stateCounties });
  mainMap.addLayer({
    id: 'counties-fill',
    type: 'fill',
    source: 'counties',
    paint: {
      'fill-color': [
        'match',
        ['get', 'winner'],
        'Bush', '#e74c3c',
        'Gore', '#3498db',
        '#b5b5b5'
      ],
      'fill-opacity': 0.83
    }
  });
  mainMap.addLayer({
    id: 'counties-outline',
    type: 'line',
    source: 'counties',
    paint: { 'line-color': '#23272e', 'line-width': 1 }
  });

  // Zoom to state bbox
  const bbox = turf.bbox(stateCounties); // Requires Turf.js
  mainMap.fitBounds([[bbox[0], bbox[1]], [bbox[2], bbox[3]]], { padding: 40, duration: 950 });

  // Build and show side panel
  showStatePanel(stateFP, stateName, stateProps);
}

// STATE SIDE PANEL DISPLAY
function showStatePanel(stateFP, stateName, stateProps) {
  const statePanel = document.getElementById('state-panel');
  statePanel.innerHTML = ""; // Clear old
  statePanel.style.display = "block";
  // Sample data, adapt for more candidates if needed
  const bushVotes = +stateProps.votes_gop || 0;
  const goreVotes = +stateProps.votes_dem || 0;
  const totalVotes = bushVotes + goreVotes;
  const bushPerc = totalVotes ? ((bushVotes/totalVotes)*100).toFixed(1) : "0";
  const gorePerc = totalVotes ? ((goreVotes/totalVotes)*100).toFixed(1) : "0";
  const winner = bushVotes > goreVotes ? "Bush" : "Gore";
  // Panel header
  statePanel.innerHTML += `<button id="boxout-btn" title="Close">&times;</button>
    <div class="panel-head">PROJECTED WINNER</div>
    <div class="panel-title">President: ${stateName}</div>
    <div class="panel-votes-row">
      <span>${stateProps.electoral_votes} electoral votes</span>
      <span class="panel-ev">${winner === "Bush" ? "Trump" : "Gore"} ${stateProps.electoral_votes}</span>
    </div>
    <div class="panel-candidates-list">
      <div class="panel-cand-row ${winner==="Bush"?"panel-cand-winner":""}">
        <img src="images/George-W-Bush.jpg" class="panel-cand-img">
        <div class="panel-cand-bar-wrap">
          <div class="panel-cand-bar bush" style="width:${bushPerc}%"></div>
        </div>
        <span class="panel-cand-perc">${bushPerc}%</span>
        <span class="panel-cand-votes">${bushVotes.toLocaleString()}</span>
      </div>
      <div class="panel-cand-row ${winner==="Gore"?"panel-cand-winner":""}">
        <img src="images/Al_Gore.jpg" class="panel-cand-img">
        <div class="panel-cand-bar-wrap">
          <div class="panel-cand-bar gore" style="width:${gorePerc}%"></div>
        </div>
        <span class="panel-cand-perc">${gorePerc}%</span>
        <span class="panel-cand-votes">${goreVotes.toLocaleString()}</span>
      </div>
    </div>
    <div class="panel-turnout">
      <b>Reporting:</b> ${stateProps.reporting || "?"}%<br>
      <b>Total votes:</b> ${totalVotes.toLocaleString()}
    </div>
    <a class="panel-county-link" href="#" onclick="alert('Coming soon: detailed county results!');return false;">See county results &rarr;</a>
  `;
  // Box out
  document.getElementById('boxout-btn').onclick = () => {
    statePanel.style.display = "none";
    // Remove county layers, zoom out to full US
    if (mainMap.getSource('counties')) {
      if (mainMap.getLayer('counties-fill')) mainMap.removeLayer('counties-fill');
      if (mainMap.getLayer('counties-outline')) mainMap.removeLayer('counties-outline');
      mainMap.removeSource('counties');
    }
    mainMap.flyTo({ center: [-98.5795, 39.8283], zoom: 3 });
  };
}

// Load Turf.js for bbox calculations
const turfScript = document.createElement('script');
turfScript.src = 'https://cdn.jsdelivr.net/npm/@turf/turf@6.5.0/turf.min.js';
document.head.appendChild(turfScript);
</script>
</body>
</html>
