<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>2000 Live Election Map</title>
  <meta name="viewport" content="width=600, initial-scale=1">
  <script src="https://api.mapbox.com/mapbox-gl-js/v2.13.0/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.13.0/mapbox-gl.css" rel="stylesheet" />
  <style>
    html, body { height: 100%; margin: 0; padding: 0; font-family: 'Inter', Arial, sans-serif; background: #11161b;}
    #header { background: #222; color: white; padding: 15px 20px; z-index: 1000; display: flex; flex-direction: column; align-items: center; }
    .progress-container { width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 10px; }
    #map { position: relative; width: 100vw; height: 70vh; min-height: 400px; z-index: 1; background: #ccc; }
    #projection-ticker-wrap { width: 100%; background: #191d22; padding: 60px 0 60px 0; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; z-index: 2; min-height: 420px; border-top: 2px solid #303540; margin-top: 0; }
    .nyt-projection-title { color: #fff; font-size: 2.4rem; font-weight: 900; letter-spacing: 0.5px; margin-bottom: 22px; text-align: center; text-shadow: 0 2px 16px #000, 0 0 10px #111; }
    .needle-svg-wrap { width: 500px; max-width: 99vw; margin: 0 auto; position: relative; }
    /* Candidate info below arc */
    .needle-candidate-row { display: flex; justify-content: space-between; align-items: center; width: 92%; margin: 0 auto 6px auto; position: relative;}
    .needle-candidate-block { display: flex; flex-direction: column; align-items: center; width: 120px; }
    .needle-candidate-img { width: 68px; height: 68px; border-radius: 50%; object-fit: cover; background: #fff; box-shadow: 0 2px 10px #000a; margin-bottom: 6px;}
    .needle-candidate-name { font-size: 1.45rem; font-weight: 900; color: #e74c3c; text-shadow: 0 1px 4px #000b; margin-bottom: 3px;}
    .needle-candidate-name.gore { color: #3498db;}
    .needle-checkmark { width: 28px; height: 28px; display: inline-block; vertical-align: middle; margin-left: 7px; }
    .needle-checkmark.gore { margin-right: 7px; margin-left:0; }
    .nyt-prob-row { text-align: center; font-size: 1.65rem; font-weight: 900; letter-spacing: 0.3px; text-shadow: 0 1px 4px #000b;}
    .proj-big-num { font-size: 2.2rem; font-weight: 900; margin: 0 8px;}
    .proj-big-num.bush { color: #e74c3c;}
    .proj-big-num.gore { color: #3498db;}
    .proj-divider { font-size: 1.7rem; font-weight: 800; color: #fff; margin: 0 12px;}
    /* Needle SVG */
    .nyt-needle-label { font-size: 16px; font-weight: 700; fill: #fff; text-shadow: 0 1px 6px #000b; dominant-baseline: middle; text-anchor: middle;}
    .nyt-needle-label.tossup { font-size: 18px; font-weight: 900; fill: #fff;}
    .needle-arrow { fill: #fff; stroke: #222; stroke-width: 2.2; filter: drop-shadow(0 2px 6px #0008);}
    .needle-dot { fill: #191d22; stroke: #fff; stroke-width: 3.5; filter: drop-shadow(0 1px 8px #000a);}
    .arc-very-likely-bush { stroke: #e74c3c; }
    .arc-likely-bush { stroke: #f7a49a; }
    .arc-lean-bush { stroke: #ffe5d2; }
    .arc-tossup { stroke: #cccccc; }
    .arc-lean-gore { stroke: #b8d8f8; }
    .arc-likely-gore { stroke: #74b0e7; }
    .arc-very-likely-gore { stroke: #3498db; }
    @media (max-width:700px) {
      .needle-svg-wrap { width: 99vw;}
      .needle-candidate-block { width: 80px;}
      .needle-candidate-img { width: 42px; height: 42px;}
      .needle-checkmark { width: 17px; height: 17px;}
      .nyt-needle-label { font-size: 10px;}
      .nyt-needle-label.tossup { font-size: 12px;}
    }
  </style>
</head>
<body>
<div id="header">
  <div class="title">2000 Live Election Map</div>
  <div class="progress-container">
    <div class="candidate-labels">
      <span>Bush: <span id="bush-votes">0</span></span>
      <span>Gore: <span id="gore-votes">0</span></span>
    </div>
    <div class="progress-bar-container">
      <img src="images/George-W-Bush.jpg" alt="Bush" class="candidate-image">
      <div style="width: 100%; position: relative;">
        <div class="threshold-label">270 to Win</div>
        <div class="progress-bar-wrapper">
          <div class="threshold-marker"></div>
          <div class="progress-bar bush" id="bush-bar" style="width: 0%"></div>
          <div class="progress-bar gore" id="gore-bar" style="width: 0%"></div>
          <div class="vote-label" id="bush-label" style="left: 5px">0</div>
          <div class="vote-label" id="gore-label" style="right: 5px">0</div>
        </div>
      </div>
      <img src="images/Al_Gore.jpg" alt="Gore" class="candidate-image">
    </div>
  </div>
  <div class="candidate-stats">
    <div class="candidate-stat-left" id="bush-pv">Bush: 0 (0%)</div>
    <div class="stat-box" id="reporting">Reporting: 0%</div>
    <div class="candidate-stat-right" id="gore-pv">Gore: 0 (0%)</div>
  </div>
</div>
<div id="map"></div>
<!-- NYT-style ticker BELOW the map, scroll to see -->
<div id="projection-ticker-wrap">
  <div class="nyt-projection-title">Chance of Winning <span style="font-weight:400;">(Projection)</span></div>
  <div class="needle-svg-wrap">
    <svg id="nyt-needle-svg" width="500" height="260" viewBox="0 0 500 260">
      <!-- Arc Segments -->
      <path id="arc-vl-bush" class="arc-very-likely-bush" fill="none" stroke-width="18"/>
      <path id="arc-l-bush" class="arc-likely-bush" fill="none" stroke-width="18"/>
      <path id="arc-le-bush" class="arc-lean-bush" fill="none" stroke-width="18"/>
      <path id="arc-tossup" class="arc-tossup" fill="none" stroke-width="18"/>
      <path id="arc-le-gore" class="arc-lean-gore" fill="none" stroke-width="18"/>
      <path id="arc-l-gore" class="arc-likely-gore" fill="none" stroke-width="18"/>
      <path id="arc-vl-gore" class="arc-very-likely-gore" fill="none" stroke-width="18"/>
      <!-- Arc Labels -->
      <g id="arc-labels-group"></g>
      <!-- Needle -->
      <g id="needle-group">
        <polygon id="nyt-needle" class="needle-arrow" points="250,70 244,146 256,146"/>
        <circle id="needle-dot" class="needle-dot" cx="250" cy="142" r="13"/>
      </g>
    </svg>
    <!-- Candidate/Checkmark row below arc -->
    <div class="needle-candidate-row">
      <div class="needle-candidate-block">
        <img src="images/George-W-Bush.jpg" class="needle-candidate-img" id="needle-img-bush" alt="Bush"/>
        <div>
          <span class="needle-candidate-name" id="needle-name-bush">Bush</span>
          <span id="needle-check-bush"></span>
        </div>
      </div>
      <div style="flex: 1;"></div>
      <div class="needle-candidate-block">
        <img src="images/Al_Gore.jpg" class="needle-candidate-img" id="needle-img-gore" alt="Gore"/>
        <div>
          <span class="needle-candidate-name gore" id="needle-name-gore">Gore</span>
          <span id="needle-check-gore"></span>
        </div>
      </div>
    </div>
    <div class="nyt-prob-row">
      <span id="nyt-proj-bush-big" class="proj-big-num bush">--%</span>
      <span class="proj-divider">|</span>
      <span id="nyt-proj-gore-big" class="proj-big-num gore">--%</span>
    </div>
  </div>
</div>
<script>
mapboxgl.accessToken = 'pk.eyJ1IjoiNW00Y2s3NyIsImEiOiJjbWI4eXFqeDkwbzY1MmpwcDFzZDIwMmVqIn0.6JGe7JWhk28z5D3TLIJQwg';
const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/light-v10',
  center: [-98.5795, 39.8283],
  zoom: 3
});
// NYT Needle arc math for new layout
const arcSegs = [
  { label: "Very likely", start: -90, end: -60 },
  { label: "Likely", start: -60, end: -30 },
  { label: "Lean", start: -30, end: -10 },
  { label: "Tossup", start: -10, end: 10 },
  { label: "Lean", start: 10, end: 30 },
  { label: "Likely", start: 30, end: 60 },
  { label: "Very likely", start: 60, end: 90 }
];
const svgCx = 250, svgCy = 142, arcR = 82, labelR = 58;
function arcPath(cx, cy, r, startAngle, endAngle) {
  const start = polar(cx, cy, r, startAngle);
  const end = polar(cx, cy, r, endAngle);
  const arcSweep = endAngle - startAngle <= 180 ? "0" : "1";
  return [
    "M", start.x, start.y,
    "A", r, r, 0, arcSweep, 1, end.x, end.y
  ].join(" ");
}
function polar(cx, cy, r, angleDeg) {
  const angle = (angleDeg-90)*Math.PI/180;
  return { x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) };
}
function setArcSegs() {
  document.getElementById('arc-vl-bush').setAttribute('d', arcPath(svgCx,svgCy,arcR, -90, -60));
  document.getElementById('arc-l-bush').setAttribute('d', arcPath(svgCx,svgCy,arcR, -60, -30));
  document.getElementById('arc-le-bush').setAttribute('d', arcPath(svgCx,svgCy,arcR, -30, -10));
  document.getElementById('arc-tossup').setAttribute('d', arcPath(svgCx,svgCy,arcR, -10, 10));
  document.getElementById('arc-le-gore').setAttribute('d', arcPath(svgCx,svgCy,arcR, 10, 30));
  document.getElementById('arc-l-gore').setAttribute('d', arcPath(svgCx,svgCy,arcR, 30, 60));
  document.getElementById('arc-vl-gore').setAttribute('d', arcPath(svgCx,svgCy,arcR, 60, 90));
}
function setArcLabels() {
  const labelsGroup = document.getElementById('arc-labels-group');
  labelsGroup.innerHTML = '';
  arcSegs.forEach((seg,i) => {
    const angle = (seg.start + seg.end) / 2;
    const pt = polar(svgCx, svgCy, labelR, angle);
    let lblClass = "nyt-needle-label";
    if (seg.label === "Tossup") lblClass += " tossup";
    let label = seg.label;
    // Only first (left) gets "Bush", last (right) gets "Gore"
    if (i === 0) label = "Very likely Bush";
    else if (i === 6) label = "Very likely Gore";
    labelsGroup.innerHTML +=
      `<text x="${pt.x}" y="${pt.y}" class="${lblClass}" text-anchor="middle" dominant-baseline="middle">${label}</text>`;
  });
}
setArcSegs(); setArcLabels();
// ---- Main election map and projection logic ----
map.on('load', async () => {
  try {
    const [states, stats] = await Promise.all([
      fetch('data/us-states.geojson').then(r => r.json()),
      fetch('data/election2000-stats.json').then(r => r.json())
    ]);
    let ev_bush = 0, ev_gore = 0, total_gop_votes = 0, total_dem_votes = 0, total_votes = 0;
    states.features.forEach(f => {
      const stateName = f.properties.name;
      const s = stats[stateName];
      if (!s) return;
      Object.assign(f.properties, s);
      const gop = +s.votes_gop || 0, dem = +s.votes_dem || 0, reporting = +s.reporting || 0, total = gop + dem;
      total_gop_votes += gop; total_dem_votes += dem; total_votes += total;
      if (reporting === 100) {
        if (gop > dem) ev_bush += +s.electoral_votes;
        else if (dem > gop) ev_gore += +s.electoral_votes;
      }
    });
    const total_registered = 105405100;
    const perc_gop = ((total_gop_votes / total_registered) * 100).toFixed(1);
    const perc_dem = ((total_dem_votes / total_registered) * 100).toFixed(1);
    const reporting_pct = ((total_votes / total_registered) * 100).toFixed(1);
    document.getElementById('bush-votes').textContent = ev_bush;
    document.getElementById('gore-votes').textContent = ev_gore;
    document.getElementById('bush-bar').style.width = `${(ev_bush / 538) * 100}%`;
    document.getElementById('gore-bar').style.width = `${(ev_gore / 538) * 100}%`;
    document.getElementById('bush-label').textContent = ev_bush;
    document.getElementById('gore-label').textContent = ev_gore;
    document.getElementById('bush-pv').textContent = `Bush: ${total_gop_votes.toLocaleString()} (${perc_gop}%)`;
    document.getElementById('gore-pv').textContent = `Gore: ${total_dem_votes.toLocaleString()} (${perc_dem}%)`;
    document.getElementById('reporting').textContent = `Reporting: ${reporting_pct}%`;
    // ------ NYT-STYLE PROJECTION NEEDLE LOGIC ------
    const bushProj = Math.min(ev_bush / 270, 1);
    const goreProj = Math.min(ev_gore / 270, 1);
    let projBush, projGore;
    if (ev_bush >= 270 && ev_bush > ev_gore) { projBush = 1; projGore = 0; }
    else if (ev_gore >= 270 && ev_gore > ev_bush) { projBush = 0; projGore = 1; }
    else if (bushProj + goreProj > 0) {
      projBush = bushProj / (bushProj + goreProj); projGore = goreProj / (bushProj + goreProj);
    } else { projBush = projGore = 0.5; }
    let angle;
    if (projBush === 1) angle = -90;
    else if (projGore === 1) angle = 90;
    else angle = -90 + 180 * projGore;
    document.getElementById('needle-group').setAttribute('transform', `rotate(${angle},250,142)`);
    document.getElementById('nyt-proj-bush-big').textContent = Math.round(projBush*100) + "%";
    document.getElementById('nyt-proj-gore-big').textContent = Math.round(projGore*100) + "%";
    // Show checkmark if 100%
    document.getElementById('needle-check-bush').innerHTML = (projBush === 1)
      ? `<svg class="needle-checkmark" viewBox="0 0 30 30"><circle cx="15" cy="15" r="15" fill="#e74c3c"/><path d="M7 15.5l5.5 5L23 11" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round"/></svg>` : "";
    document.getElementById('needle-check-gore').innerHTML = (projGore === 1)
      ? `<svg class="needle-checkmark gore" viewBox="0 0 30 30"><circle cx="15" cy="15" r="15" fill="#3498db"/><path d="M7 15.5l5.5 5L23 11" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round"/></svg>` : "";
    // ------ END NYT-STYLE PROJECTION ------
    map.addSource('states', { type: 'geojson', data: states });
    map.addLayer({
      id: 'states-fill',
      type: 'fill',
      source: 'states',
      paint: {
        'fill-color': [
          'match',
          ['get', 'status'],
          'GOP Win', '#d12c0f',
          'DEM Win', '#0e47e6',
          'Lean GOP', '#f4a6a6',
          'Lean DEM', '#a6c8f4',
          'Uncalled', '#cccccc',
          '#ffffff'
        ],
        'fill-opacity': 1.0
      }
    });
    map.addLayer({
      id: 'states-outline',
      type: 'line',
      source: 'states',
      paint: { 'line-color': '#000000', 'line-width': 2 }
    });
    map.on('click', 'states-fill', (e) => {
      const p = e.features[0].properties;
      const gop = +p.votes_gop || 0, dem = +p.votes_dem || 0, total = gop + dem;
      const gopPerc = total > 0 ? ((gop / total) * 100).toFixed(1) : 0;
      const demPerc = total > 0 ? ((dem / total) * 100).toFixed(1) : 0;
      const winner = p.winner || 'Uncalled';
      const gopName = p.gop_candidate || 'Bush';
      const demName = p.dem_candidate || 'Gore';
      const gopCheck = winner === gopName ? '✓ ' : '';
      const demCheck = winner === demName ? '✓ ' : '';
      new mapboxgl.Popup()
        .setLngLat(e.lngLat)
        .setHTML(`<strong>${p.name}</strong><br/>
          <b>Electoral Votes:</b> ${p.electoral_votes}<br/>
          <b>Reporting:</b> ${p.reporting}%<br/>
          <b style="color:#d12c0f;">${gopCheck}${gopName}:</b> ${gop.toLocaleString()} (${gopPerc}%)<br/>
          <b style="color:#0e47e6;">${demCheck}${demName}:</b> ${dem.toLocaleString()} (${demPerc}%)<br/>
          <b>Winner:</b> ${winner}`)
        .addTo(map);
    });
    map.on('mouseenter', 'states-fill', () => map.getCanvas().style.cursor = 'pointer');
    map.on('mouseleave', 'states-fill', () => map.getCanvas().style.cursor = '');
  } catch (error) {
    console.error('Map load error:', error);
    document.getElementById('map').innerHTML = '<p style="color: red; text-align: center;">Failed to load map. Please check your data file and internet connection.</p>';
  }
});
</script>
</body>
</html>
